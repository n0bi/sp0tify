<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spotify Car UI Remote</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --panel: rgba(18, 18, 20, 0.88);
      --panel-strong: rgba(26, 26, 30, 0.94);
      --line: rgba(255,255,255,0.12);
      --line-soft: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --muted-2: rgba(255,255,255,0.48);
      --green: #1ed760;
      --danger: #ff6a6a;
      --shadow: 0 28px 70px rgba(0,0,0,0.5);
      --radius: 28px;
      --card-radius: 24px;
      --control-size: clamp(58px, 8vw, 86px);
      --side-pad: clamp(18px, 3vw, 36px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.07), transparent 28%),
        linear-gradient(180deg, #111216 0%, #070708 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .screen {
      position: relative;
      width: min(100%, 1080px);
      aspect-ratio: 16 / 9;
      background: #070708;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .bg-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(38px) saturate(1.18);
      transform: scale(1.08);
      opacity: 0.42;
      pointer-events: none;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.4)),
        linear-gradient(90deg, rgba(10,10,12,0.78) 0%, rgba(10,10,12,0.52) 58%, rgba(10,10,12,0.86) 100%);
      pointer-events: none;
    }

    .frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(10px, 1.7vw, 18px);
      padding: clamp(14px, 2vw, 22px);
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      max-width: 100%;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(18,18,20,0.44);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(10px);
      color: var(--muted);
      font-size: clamp(12px, 1.5vw, 15px);
      font-weight: 600;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8b8f98;
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }

    .status-pill.good .status-dot { background: var(--green); }
    .status-pill.warn .status-dot { background: #f0c14b; }
    .status-pill.error .status-dot { background: #ff6a6a; }

    .icon-mini-btn {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: rgba(18,18,20,0.44);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.82);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .icon-mini-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .card {
      position: relative;
      align-self: stretch;
      width: 100%;
      height: 100%;
      padding: clamp(18px, 2.8vw, 34px);
      background: linear-gradient(180deg, rgba(72,58,76,0.84), rgba(55,40,62,0.84));
      border-radius: var(--card-radius);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr auto auto;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)),
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 34%);
      pointer-events: none;
    }

    .main-row {
      position: relative;
      display: grid;
      grid-template-columns: clamp(120px, 21vw, 250px) minmax(0, 1fr);
      gap: clamp(18px, 3vw, 34px);
      min-height: 0;
      align-items: center;
      padding-right: clamp(2px, 0.4vw, 8px);
    }

    .art-wrap {
      align-self: start;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-art {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 18px 36px rgba(0,0,0,0.26);
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(0,0,0,0.2);
    }

    .meta {
      min-width: 0;
      display: grid;
      gap: clamp(8px, 1.6vw, 14px);
      align-content: center;
    }

    .meta-top {
      font-size: clamp(15px, 2vw, 28px);
      color: rgba(255,255,255,0.74);
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-name {
      margin: 0;
      font-size: clamp(30px, 4.9vw, 74px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-wrap: balance;
    }

    .artist-name {
      margin: 0;
      font-size: clamp(20px, 2.8vw, 40px);
      font-weight: 600;
      line-height: 1.05;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-block {
      position: relative;
      display: grid;
      gap: 8px;
      padding-top: clamp(10px, 1.8vw, 16px);
      padding-bottom: clamp(10px, 1.4vw, 14px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,0.55);
      font-size: clamp(12px, 1.55vw, 18px);
      font-weight: 700;
      letter-spacing: 0.02em;
      min-height: 18px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 28px;
      background: transparent;
      margin: 0;
      padding: 0;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.96) var(--progress, 0%), rgba(255,255,255,0.22) var(--progress, 0%), rgba(255,255,255,0.22) 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      margin-top: -8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 0;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
    }

    input[type="range"]::-moz-range-progress {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 0;
      background: #ffffff;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(10px, 1.8vw, 20px);
      align-items: center;
      min-height: 0;
    }

    .ctrl {
      height: clamp(64px, 9vw, 94px);
      border: 0;
      border-radius: 18px;
      background: transparent;
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.18s ease, background 0.18s ease;
      padding: 0;
    }

    .ctrl:hover { background: rgba(255,255,255,0.06); }
    .ctrl:active { transform: scale(0.97); }
    .ctrl:disabled { opacity: 0.4; cursor: not-allowed; }

    .ctrl svg {
      width: clamp(28px, 4vw, 48px);
      height: clamp(28px, 4vw, 48px);
      display: block;
    }

    .ctrl.play svg {
      width: clamp(32px, 4.6vw, 54px);
      height: clamp(32px, 4.6vw, 54px);
    }

    .ctrl.heart.active { color: var(--green); }

    .bottom-tools {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      min-height: 0;
    }

    .secondary-btn {
      min-height: 40px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      background: rgba(18,18,20,0.42);
      color: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(10px);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
    }

    .secondary-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 5;
      background: rgba(3,3,4,0.48);
      backdrop-filter: blur(12px);
    }

    .overlay.show { display: flex; }

    .overlay-card {
      width: min(100%, 540px);
      padding: 20px;
      border-radius: 24px;
      background: rgba(19,19,22,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.42);
      display: grid;
      gap: 14px;
    }

    .overlay-title {
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0;
    }

    .overlay-copy {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 17px);
      line-height: 1.42;
    }

    .overlay-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .overlay-btn {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
      cursor: pointer;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .overlay-btn.primary {
      background: linear-gradient(180deg, #2ae06c, #19b856);
      color: #041008;
      border: 0;
    }

    .overlay-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      body { padding: 0; }
      .screen {
        width: 100vw;
        min-height: 100vh;
        aspect-ratio: auto;
        border-radius: 0;
      }
      .frame {
        min-height: 100vh;
      }
      .card {
        grid-template-rows: 1fr auto auto;
      }
      .main-row {
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 16px;
      }
      .track-name {
        -webkit-line-clamp: 4;
      }
      .overlay-actions {
        grid-template-columns: 1fr;
      }
      .bottom-tools {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Spotify remote dashboard">
    <img id="bgArt" class="bg-art" alt="" aria-hidden="true" />
    <div class="bg-vignette"></div>

    <div class="frame">
      <div class="statusbar">
        <div id="statusPill" class="status-pill warn">
          <span class="status-dot"></span>
          <span id="statusText">Waiting for Spotify</span>
        </div>
        <button id="signOutMiniBtn" class="icon-mini-btn hidden" type="button" aria-label="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <path d="M16 17l5-5-5-5"/>
            <path d="M21 12H9"/>
          </svg>
        </button>
      </div>

      <section class="card" aria-live="polite">
        <div class="main-row">
          <div class="art-wrap">
            <img id="albumArt" class="album-art" alt="Album art" />
          </div>

          <div class="meta">
            <div id="metaTop" class="meta-top">Spotify</div>
            <h1 id="trackName" class="track-name">Nothing playing</h1>
            <p id="artistName" class="artist-name">Sign in and start playback</p>
          </div>
        </div>

        <div class="timeline-block">
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
          <input id="timeline" type="range" min="0" max="1000" value="0" step="1" aria-label="Track timeline" />
        </div>

        <div class="controls" role="group" aria-label="Playback controls">
          <button id="prevBtn" class="ctrl prev" type="button" aria-label="Previous track" disabled>
            <svg viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
              <rect x="10" y="14" width="6" height="36" rx="2"></rect>
              <path d="M46 16.5v31L22 32z"></path>
            </svg>
          </button>

          <button id="playPauseBtn" class="ctrl play" type="button" aria-label="Play or pause" disabled>
            <svg id="playPauseIcon" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
              <rect x="18" y="14" width="9" height="36" rx="2"></rect>
              <rect x="37" y="14" width="9" height="36" rx="2"></rect>
            </svg>
          </button>

          <button id="nextBtn" class="ctrl next" type="button" aria-label="Next track" disabled>
            <svg viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
              <rect x="48" y="14" width="6" height="36" rx="2"></rect>
              <path d="M18 16.5v31L42 32z"></path>
            </svg>
          </button>

          <button id="heartBtn" class="ctrl heart" type="button" aria-label="Save to library" disabled>
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M32 50s-15-9.4-20.5-19.1C7.4 23.8 10.3 15 19.2 15c5.4 0 9.2 3 12.8 8 3.6-5 7.4-8 12.8-8 8.9 0 11.8 8.8 7.7 15.9C47 40.6 32 50 32 50z"></path>
            </svg>
          </button>
        </div>
      </section>

      <div class="bottom-tools">
        <button id="activateBtn" class="secondary-btn" type="button" disabled>Activate audio</button>
        <button id="useDeviceBtn" class="secondary-btn" type="button" disabled>Use this device</button>
      </div>
    </div>

    <div id="overlay" class="overlay show" aria-live="polite">
      <div class="overlay-card">
        <h2 id="overlayTitle" class="overlay-title">Connect Spotify</h2>
        <p id="overlayCopy" class="overlay-copy">Sign in once, then the dashboard keeps your session in this browser until you sign out, clear site data, or revoke the app.</p>
        <div class="overlay-actions">
          <button id="loginBtn" class="overlay-btn primary" type="button">Sign in</button>
          <button id="activateOverlayBtn" class="overlay-btn hidden" type="button">Activate audio</button>
          <button id="useDeviceOverlayBtn" class="overlay-btn hidden" type="button">Use this device</button>
          <button id="closeOverlayBtn" class="overlay-btn hidden" type="button">Close</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script>
    const APP_CONFIG = Object.freeze({
      CLIENT_ID: 'bfade0ed83a54868834c9c7a6cdb690f',
      DEVICE_NAME: 'Sp0tify',
      REDIRECT_URI: 'https://n0bi.github.io/sp0tify/'
    });

    const STORAGE_KEYS = {
      accessToken: 'spotify_car_ui_access_token',
      refreshToken: 'spotify_car_ui_refresh_token',
      expiresAt: 'spotify_car_ui_expires_at',
      codeVerifier: 'spotify_car_ui_code_verifier',
      oauthState: 'spotify_car_ui_oauth_state',
      overlayDismissed: 'spotify_car_ui_overlay_dismissed'
    };

    const SCOPES = [
      'streaming',
      'user-read-playback-state',
      'user-modify-playback-state',
      'user-read-currently-playing',
      'user-library-read',
      'user-library-modify'
    ];

    const DEFAULT_ART = `data:image/svg+xml;utf8,${encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
        <defs>
          <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop stop-color="#6b506f"/>
            <stop offset="1" stop-color="#1a1a1d"/>
          </linearGradient>
        </defs>
        <rect width="800" height="800" fill="url(#g)"/>
        <rect x="130" y="130" width="540" height="540" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
        <circle cx="400" cy="400" r="170" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.22)" stroke-width="16"/>
        <circle cx="400" cy="400" r="52" fill="#111" stroke="rgba(255,255,255,0.22)" stroke-width="10"/>
      </svg>
    `)}`;

    const els = {
      statusPill: document.getElementById('statusPill'),
      statusText: document.getElementById('statusText'),
      signOutMiniBtn: document.getElementById('signOutMiniBtn'),
      bgArt: document.getElementById('bgArt'),
      albumArt: document.getElementById('albumArt'),
      metaTop: document.getElementById('metaTop'),
      trackName: document.getElementById('trackName'),
      artistName: document.getElementById('artistName'),
      currentTime: document.getElementById('currentTime'),
      totalTime: document.getElementById('totalTime'),
      timeline: document.getElementById('timeline'),
      prevBtn: document.getElementById('prevBtn'),
      playPauseBtn: document.getElementById('playPauseBtn'),
      playPauseIcon: document.getElementById('playPauseIcon'),
      nextBtn: document.getElementById('nextBtn'),
      heartBtn: document.getElementById('heartBtn'),
      activateBtn: document.getElementById('activateBtn'),
      useDeviceBtn: document.getElementById('useDeviceBtn'),
      overlay: document.getElementById('overlay'),
      overlayTitle: document.getElementById('overlayTitle'),
      overlayCopy: document.getElementById('overlayCopy'),
      loginBtn: document.getElementById('loginBtn'),
      activateOverlayBtn: document.getElementById('activateOverlayBtn'),
      useDeviceOverlayBtn: document.getElementById('useDeviceOverlayBtn'),
      closeOverlayBtn: document.getElementById('closeOverlayBtn')
    };

    const state = {
      player: null,
      deviceId: null,
      sdkReady: false,
      ready: false,
      activated: false,
      playbackState: null,
      refreshPromise: null,
      likeRequest: null,
      currentUri: '',
      currentLiked: false,
      likeType: 'track',
      seeking: false,
      timelineTimer: null,
      lastPlayerSnapshotAt: 0,
      redirectMismatch: false
    };

    function setSaved(key, value) { localStorage.setItem(key, value); }
    function getSaved(key) { return localStorage.getItem(key) || ''; }
    function removeSaved(key) { localStorage.removeItem(key); }

    function hasTokens() {
      return !!getSaved(STORAGE_KEYS.accessToken) && !!getSaved(STORAGE_KEYS.refreshToken);
    }

    function formatTime(ms) {
      if (!Number.isFinite(ms) || ms < 0) return '0:00';
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function randomString(length = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);
      let output = '';
      for (let i = 0; i < bytes.length; i++) output += chars[bytes[i] % chars.length];
      return output;
    }

    async function sha256(message) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(message));
    }

    function base64UrlEncode(buffer) {
      const bytes = new Uint8Array(buffer);
      let text = '';
      for (let i = 0; i < bytes.length; i++) text += String.fromCharCode(bytes[i]);
      return btoa(text).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function updateRangeVisual(input) {
      const min = Number(input.min || 0);
      const max = Number(input.max || 100);
      const value = Number(input.value || 0);
      const percent = max > min ? ((value - min) / (max - min)) * 100 : 0;
      input.style.setProperty('--progress', `${percent}%`);
    }

    function normalizeUrl(rawUrl) {
      const url = new URL(rawUrl, location.origin);
      let path = url.pathname.replace(/index\.html$/i, '');
      if (!path.endsWith('/')) path += '/';
      return `${url.origin}${path}`;
    }

    function setStatus(message, tone = 'warn') {
      els.statusText.textContent = message;
      els.statusPill.classList.remove('good', 'warn', 'error');
      els.statusPill.classList.add(tone);
    }

    function setOverlay(mode) {
      const show = mode !== 'hidden';
      els.overlay.classList.toggle('show', show);

      els.loginBtn.classList.add('hidden');
      els.activateOverlayBtn.classList.add('hidden');
      els.useDeviceOverlayBtn.classList.add('hidden');
      els.closeOverlayBtn.classList.add('hidden');

      if (mode === 'signin') {
        els.overlayTitle.textContent = 'Connect Spotify';
        els.overlayCopy.textContent = 'Sign in once, then this browser can keep the session for quick access.';
        els.loginBtn.classList.remove('hidden');
      } else if (mode === 'activate') {
        els.overlayTitle.textContent = 'Activate audio';
        els.overlayCopy.textContent = 'This browser needs one tap so Spotify can transfer playback here cleanly.';
        els.activateOverlayBtn.classList.remove('hidden');
      } else if (mode === 'transfer') {
        els.overlayTitle.textContent = 'Use this device';
        els.overlayCopy.textContent = 'Spotify is ready. Transfer playback to this dashboard to control the current song here.';
        els.useDeviceOverlayBtn.classList.remove('hidden');
        els.closeOverlayBtn.classList.remove('hidden');
      }
    }

    function updateTransportButtons(enabled) {
      els.prevBtn.disabled = !enabled;
      els.playPauseBtn.disabled = !enabled;
      els.nextBtn.disabled = !enabled;
      els.timeline.disabled = !enabled;
      els.heartBtn.disabled = !enabled;
    }

    function updateAuxButtons() {
      const authed = hasTokens();
      els.signOutMiniBtn.classList.toggle('hidden', !authed);
      els.activateBtn.disabled = !authed || !state.player;
      els.useDeviceBtn.disabled = !authed || !state.deviceId;
    }

    function setPlayPauseVisual(isPaused) {
      if (isPaused) {
        els.playPauseIcon.innerHTML = '<path d="M22 14.5v35L48 32 22 14.5z" fill="currentColor"></path>';
      } else {
        els.playPauseIcon.innerHTML = '<rect x="18" y="14" width="9" height="36" rx="2"></rect><rect x="37" y="14" width="9" height="36" rx="2"></rect>';
      }
    }

    function setHeartVisual(active) {
      state.currentLiked = !!active;
      els.heartBtn.classList.toggle('active', !!active);
      const svg = els.heartBtn.querySelector('svg');
      if (active) {
        svg.setAttribute('fill', 'currentColor');
        svg.setAttribute('stroke', 'currentColor');
      } else {
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
      }
    }

    function clearTrack() {
      els.albumArt.src = DEFAULT_ART;
      els.bgArt.src = DEFAULT_ART;
      els.trackName.textContent = 'Nothing playing';
      els.artistName.textContent = 'Sign in and start playback';
      els.metaTop.textContent = 'Spotify';
      els.currentTime.textContent = '0:00';
      els.totalTime.textContent = '0:00';
      els.timeline.value = 0;
      updateRangeVisual(els.timeline);
      setHeartVisual(false);
      setPlayPauseVisual(true);
      updateTransportButtons(false);
    }

    function deriveNowPosition() {
      if (!state.playbackState) return 0;
      const duration = state.playbackState.duration || state.playbackState.track_window?.current_track?.duration_ms || 0;
      if (state.playbackState.paused) return Math.min(state.playbackState.position || 0, duration);
      const elapsed = Date.now() - state.lastPlayerSnapshotAt;
      return Math.min((state.playbackState.position || 0) + elapsed, duration);
    }

    function renderProgress() {
      const playback = state.playbackState;
      if (!playback) return;
      const duration = playback.duration || playback.track_window?.current_track?.duration_ms || 0;
      const position = deriveNowPosition();
      els.currentTime.textContent = formatTime(position);
      els.totalTime.textContent = formatTime(duration);
      if (!state.seeking) {
        els.timeline.max = duration > 0 ? String(duration) : '1000';
        els.timeline.value = String(Math.min(position, duration || 1000));
        updateRangeVisual(els.timeline);
      }
    }

    function startProgressLoop() {
      if (state.timelineTimer) clearInterval(state.timelineTimer);
      state.timelineTimer = setInterval(renderProgress, 250);
    }

    async function beginLogin() {
      const verifier = randomString(96);
      const challenge = base64UrlEncode(await sha256(verifier));
      const oauthState = randomString(24);

      setSaved(STORAGE_KEYS.codeVerifier, verifier);
      setSaved(STORAGE_KEYS.oauthState, oauthState);

      const params = new URLSearchParams({
        client_id: APP_CONFIG.CLIENT_ID,
        response_type: 'code',
        redirect_uri: APP_CONFIG.REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        scope: SCOPES.join(' '),
        state: oauthState,
        show_dialog: 'false'
      });

      location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const verifier = getSaved(STORAGE_KEYS.codeVerifier);
      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: APP_CONFIG.CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: APP_CONFIG.REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error_description || data.error || 'Token exchange failed');
      }

      setSaved(STORAGE_KEYS.accessToken, data.access_token);
      if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
      setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
      removeSaved(STORAGE_KEYS.codeVerifier);
      removeSaved(STORAGE_KEYS.oauthState);
    }

    async function refreshAccessToken() {
      if (state.refreshPromise) return state.refreshPromise;
      const refreshToken = getSaved(STORAGE_KEYS.refreshToken);
      if (!refreshToken) throw new Error('Missing refresh token');

      state.refreshPromise = fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: refreshToken,
          client_id: APP_CONFIG.CLIENT_ID
        })
      })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error_description || data.error || 'Token refresh failed');
        }
        setSaved(STORAGE_KEYS.accessToken, data.access_token);
        setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
        if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
        return data.access_token;
      })
      .finally(() => {
        state.refreshPromise = null;
      });

      return state.refreshPromise;
    }

    async function getValidToken() {
      const token = getSaved(STORAGE_KEYS.accessToken);
      const expiresAt = Number(getSaved(STORAGE_KEYS.expiresAt) || 0);
      if (token && Date.now() < expiresAt) return token;
      return refreshAccessToken();
    }

    async function spotifyFetch(path, options = {}) {
      const token = await getValidToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';

      const response = await fetch(`https://api.spotify.com${path}`, {
        ...options,
        headers
      });

      if (response.status === 204) return null;

      const text = await response.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) { data = text; }

      if (!response.ok) {
        const message = data?.error?.message || data?.error_description || `Spotify API error ${response.status}`;
        throw new Error(message);
      }

      return data;
    }

    async function syncLikedState(uri) {
      if (!uri) {
        setHeartVisual(false);
        els.heartBtn.disabled = true;
        return;
      }

      try {
        const result = await spotifyFetch(`/v1/me/library/contains?uris=${encodeURIComponent(uri)}`);
        const liked = Array.isArray(result) ? !!result[0] : false;
        setHeartVisual(liked);
        els.heartBtn.disabled = false;
      } catch (error) {
        setHeartVisual(false);
        setStatus(`Library check failed: ${error.message}`, 'error');
      }
    }

    async function toggleLike() {
      const uri = state.currentUri;
      if (!uri || state.likeRequest) return;

      state.likeRequest = (async () => {
        try {
          if (state.currentLiked) {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'DELETE' });
            setHeartVisual(false);
          } else {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'PUT' });
            setHeartVisual(true);
          }
        } catch (error) {
          setStatus(`Like update failed: ${error.message}`, 'error');
        } finally {
          state.likeRequest = null;
        }
      })();

      return state.likeRequest;
    }

    function updateTrackFromState(playbackState) {
      if (!playbackState || !playbackState.track_window?.current_track) return;
      const current = playbackState.track_window.current_track;
      const image = current.album?.images?.[0]?.url || DEFAULT_ART;
      const artist = (current.artists || []).map(artist => artist.name).join(', ');
      const contextName = playbackState.context?.metadata?.context_description || current.album?.name || 'Spotify';

      els.albumArt.src = image;
      els.bgArt.src = image;
      els.trackName.textContent = current.name || 'Unknown track';
      els.artistName.textContent = artist || 'Unknown artist';
      els.metaTop.textContent = contextName;
      setPlayPauseVisual(!!playbackState.paused);

      const newUri = current.uri || '';
      if (newUri && newUri !== state.currentUri) {
        state.currentUri = newUri;
        syncLikedState(newUri);
      }

      updateTransportButtons(true);
      renderProgress();
    }

    async function hydratePlaybackState() {
      if (!state.player) return;
      try {
        const playbackState = await state.player.getCurrentState();
        if (!playbackState) return;
        state.playbackState = playbackState;
        state.lastPlayerSnapshotAt = Date.now();
        updateTrackFromState(playbackState);
        setStatus('Ready', 'good');
      } catch (error) {
        console.error(error);
      }
    }

    async function activateAudio() {
      if (!state.player) return;
      try {
        await state.player.activateElement();
        state.activated = true;
        setStatus('Audio activated', 'good');
        setOverlay(state.deviceId ? 'transfer' : 'hidden');
      } catch (error) {
        setStatus(`Audio activation failed: ${error.message}`, 'error');
      }
    }

    async function transferPlayback() {
      if (!state.deviceId) {
        setStatus('Spotify device is not ready', 'warn');
        return;
      }
      try {
        await spotifyFetch('/v1/me/player', {
          method: 'PUT',
          body: JSON.stringify({ device_ids: [state.deviceId], play: true })
        });
        setStatus('Playback transferred', 'good');
        setOverlay('hidden');
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        await new Promise(resolve => setTimeout(resolve, 900));
        await hydratePlaybackState();
      } catch (error) {
        setStatus(`Transfer failed: ${error.message}`, 'error');
      }
    }

    function signOut() {
      [
        STORAGE_KEYS.accessToken,
        STORAGE_KEYS.refreshToken,
        STORAGE_KEYS.expiresAt,
        STORAGE_KEYS.codeVerifier,
        STORAGE_KEYS.oauthState,
        STORAGE_KEYS.overlayDismissed
      ].forEach(removeSaved);

      if (state.player) {
        try { state.player.disconnect(); } catch (_) {}
      }

      state.player = null;
      state.deviceId = null;
      state.ready = false;
      state.activated = false;
      state.playbackState = null;
      state.currentUri = '';
      state.currentLiked = false;
      updateAuxButtons();
      clearTrack();
      setOverlay('signin');
      setStatus('Signed out', 'warn');
    }

    function installPlayer() {
      if (!window.Spotify || state.player || !hasTokens()) {
        updateAuxButtons();
        return;
      }

      state.player = new Spotify.Player({
        name: APP_CONFIG.DEVICE_NAME,
        getOAuthToken: async (cb) => {
          try {
            cb(await getValidToken());
          } catch (error) {
            setStatus(`Token error: ${error.message}`, 'error');
          }
        },
        volume: 0.8,
        enableMediaSession: true
      });

      state.player.addListener('ready', async ({ device_id }) => {
        state.deviceId = device_id;
        state.ready = true;
        updateAuxButtons();
        setStatus('Spotify ready', 'good');

        if (!state.activated) {
          const dismissed = getSaved(STORAGE_KEYS.overlayDismissed) === '1';
          setOverlay(dismissed ? 'hidden' : 'activate');
        }

        try {
          await transferPlayback();
        } catch (_) {}
      });

      state.player.addListener('not_ready', () => {
        state.ready = false;
        updateAuxButtons();
        setStatus('Spotify device offline', 'warn');
      });

      state.player.addListener('player_state_changed', (playbackState) => {
        if (!playbackState) return;
        state.playbackState = playbackState;
        state.lastPlayerSnapshotAt = Date.now();
        updateTrackFromState(playbackState);
      });

      state.player.addListener('autoplay_failed', () => {
        setStatus('Tap Activate audio', 'warn');
        setOverlay('activate');
      });

      state.player.addListener('initialization_error', ({ message }) => setStatus(`Initialization error: ${message}`, 'error'));
      state.player.addListener('authentication_error', ({ message }) => setStatus(`Authentication error: ${message}`, 'error'));
      state.player.addListener('account_error', ({ message }) => setStatus(`Account error: ${message}`, 'error'));
      state.player.addListener('playback_error', ({ message }) => setStatus(`Playback error: ${message}`, 'error'));

      state.player.connect().then(success => {
        if (!success) {
          setStatus('Spotify player could not connect', 'error');
          return;
        }
        updateAuxButtons();
      });
    }

    async function maybeHandleAuthRedirect() {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const incomingState = params.get('state');
      const error = params.get('error');

      if (normalizeUrl(location.href) !== normalizeUrl(APP_CONFIG.REDIRECT_URI)) {
        state.redirectMismatch = true;
      }

      if (error) {
        setStatus(`Spotify login failed: ${error}`, 'error');
        if (state.redirectMismatch) {
          setStatus('Redirect URI mismatch: this page is not the configured callback', 'error');
        }
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      if (!code) {
        if (state.redirectMismatch && !hasTokens()) {
          setStatus('Redirect URI is hardcoded to a different page', 'warn');
        }
        return;
      }

      const expectedState = getSaved(STORAGE_KEYS.oauthState);
      if (!incomingState || incomingState !== expectedState) {
        setStatus('Spotify login failed: invalid state', 'error');
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      try {
        setStatus('Finishing Spotify login', 'warn');
        await exchangeCodeForToken(code);
        history.replaceState({}, document.title, location.pathname);
        setStatus('Spotify login complete', 'good');
        setSaved(STORAGE_KEYS.overlayDismissed, '0');
      } catch (error) {
        setStatus(`Spotify login failed: ${error.message}`, 'error');
        history.replaceState({}, document.title, location.pathname);
      }
    }

    function attachEvents() {
      els.loginBtn.addEventListener('click', beginLogin);
      els.activateBtn.addEventListener('click', activateAudio);
      els.activateOverlayBtn.addEventListener('click', activateAudio);
      els.useDeviceBtn.addEventListener('click', transferPlayback);
      els.useDeviceOverlayBtn.addEventListener('click', transferPlayback);
      els.closeOverlayBtn.addEventListener('click', () => {
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        setOverlay('hidden');
      });
      els.signOutMiniBtn.addEventListener('click', signOut);

      els.prevBtn.addEventListener('click', async () => {
        if (!state.player) return;
        try { await state.player.previousTrack(); } catch (error) { setStatus(`Previous failed: ${error.message}`, 'error'); }
      });

      els.playPauseBtn.addEventListener('click', async () => {
        if (!state.player) return;
        try { await state.player.togglePlay(); } catch (error) { setStatus(`Play or pause failed: ${error.message}`, 'error'); }
      });

      els.nextBtn.addEventListener('click', async () => {
        if (!state.player) return;
        try { await state.player.nextTrack(); } catch (error) { setStatus(`Next failed: ${error.message}`, 'error'); }
      });

      els.heartBtn.addEventListener('click', toggleLike);

      els.timeline.addEventListener('input', () => {
        state.seeking = true;
        updateRangeVisual(els.timeline);
        els.currentTime.textContent = formatTime(Number(els.timeline.value));
      });

      const finishSeek = async () => {
        if (!state.player || !state.seeking) return;
        state.seeking = false;
        try {
          await state.player.seek(Number(els.timeline.value));
          await hydratePlaybackState();
        } catch (error) {
          setStatus(`Seek failed: ${error.message}`, 'error');
        }
      };

      els.timeline.addEventListener('change', finishSeek);
      els.timeline.addEventListener('pointerup', finishSeek);
      els.timeline.addEventListener('touchend', finishSeek);
    }

    window.onSpotifyWebPlaybackSDKReady = () => {
      state.sdkReady = true;
      installPlayer();
    };

    (async function init() {
      clearTrack();
      updateRangeVisual(els.timeline);
      attachEvents();
      updateAuxButtons();
      startProgressLoop();
      await maybeHandleAuthRedirect();

      if (hasTokens()) {
        setStatus(state.redirectMismatch ? 'Stored session found' : 'Restoring session', 'warn');
        setOverlay('hidden');
      } else {
        setOverlay('signin');
      }

      if (window.Spotify) installPlayer();
    })();
  </script>
</body>
</html>
