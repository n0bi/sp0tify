<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>sp0tify</title>
  <style>
    :root {
      --bg: #080809;
      --line: rgba(255,255,255,0.1);
      --line-soft: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --muted-2: rgba(255,255,255,0.5);
      --green: #1ed760;
      --warn: #f0c14b;
      --danger: #ff6a6a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --pad-x: clamp(16px, 3.2vw, 40px);
      --pad-y: clamp(16px, 3.2vh, 34px);
      --art-size: clamp(142px, 28vw, 340px);
      --title-size: clamp(38px, 6.4vw, 98px);
      --artist-size: clamp(21px, 2.9vw, 44px);
      --title-line-height: 1.1;
      --artist-line-height: 1.24;
      --hero-gap: clamp(24px, 4vw, 52px);
      --hero-art-margin: clamp(10px, 1.2vw, 16px);
      --meta-size: clamp(15px, 1.6vw, 24px);
      --control-size: clamp(60px, 8.5vw, 96px);
      --icon-size: clamp(28px, 3.8vw, 48px);
      --play-icon-size: clamp(34px, 4.6vw, 56px);
      --pill-height: clamp(40px, 5.4vw, 50px);
      --radius: clamp(18px, 2.4vw, 28px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.07), transparent 28%),
        linear-gradient(180deg, #111216 0%, #070708 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    button, input {
      font: inherit;
    }

    .screen {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 18% 16%, rgba(116, 74, 156, 0.26), transparent 42%),
        linear-gradient(180deg, #111216 0%, #070708 100%);
      overflow: hidden;
      isolation: isolate;
    }

    .bg-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(4,4,7,0.08) 0%, rgba(4,4,7,0.24) 58%, rgba(3,3,5,0.68) 100%);
    }

    .frame {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) auto auto;
      grid-template-areas:
        "hero"
        "timeline"
        "transport";
      row-gap: clamp(12px, 1.8vh, 22px);
      align-items: stretch;
      padding:
        calc(var(--pad-y) + var(--safe-top))
        calc(max(10px, var(--pad-x) * 0.72) + var(--safe-right))
        calc(var(--pad-y) + var(--safe-bottom))
        calc(max(10px, var(--pad-x) * 0.72) + var(--safe-left));
    }

    .topbar {
      display: none;
    }

    .icon-mini-btn {
      display: none;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: rgba(18,18,20,0.34);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.82);
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .icon-mini-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .hero {
      grid-area: hero;
      display: grid;
      align-items: center;
      min-height: 0;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: minmax(142px, var(--art-size)) minmax(0, 1fr);
      gap: clamp(32px, 5vw, 72px);
      align-items: center;
      min-height: 0;
      height: 100%;
      width: 100%;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .art-wrap {
      width: 100%;
      max-width: var(--art-size);
      min-width: var(--art-size);
      justify-self: start;
      margin-inline-end: clamp(14px, 2vw, 22px);
    }

    .album-art {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: clamp(10px, 1.4vw, 16px);
      box-shadow: 0 18px 42px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(0,0,0,0.2);
      -webkit-user-drag: none;
      user-select: none;
      touch-action: none;
    }

    .meta {
      min-width: 0;
      display: grid;
      gap: clamp(12px, 1.5vh, 20px);
      align-content: center;
      align-self: stretch;
      padding-inline-start: clamp(8px, 1vw, 16px);
    }

    .meta-top {
      font-size: var(--meta-size);
      color: rgba(255,255,255,0.74);
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .track-name {
      margin: 0;
      font-size: var(--title-size);
      line-height: var(--title-line-height);
      min-height: calc(var(--title-size) * var(--title-line-height) * 2);
      font-weight: 900;
      letter-spacing: -0.055em;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-wrap: pretty;
      padding-bottom: 0.08em;
    }

    .artist-name {
      margin: 0;
      font-size: var(--artist-size);
      font-weight: 600;
      line-height: var(--artist-line-height);
      min-height: calc(var(--artist-size) * var(--artist-line-height));
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-section {
      grid-area: timeline;
      display: grid;
      gap: clamp(8px, 1.05vh, 14px);
      min-height: 0;
      width: 100%;
      padding-top: clamp(2px, 0.5vh, 10px);
    }

    .time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.62);
      font-size: clamp(13px, 1.4vw, 18px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-top: -2px;
    }

    .time-row span:first-child {
      justify-self: start;
    }

    .time-row span:last-child {
      justify-self: end;
      text-align: right;
    }

    input[type="range"] {
      --progress: 0%;
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 30px;
      background: transparent;
      margin: 0;
      padding: 0;
      touch-action: pan-y;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.96) var(--progress, 0%), rgba(255,255,255,0.22) var(--progress, 0%), rgba(255,255,255,0.22) 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      margin-top: -8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 0;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
    }

    input[type="range"]::-moz-range-progress {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 0;
      background: #ffffff;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .transport-row {
      grid-area: transport;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 28vw) auto;
      grid-template-areas: "controls volume utility";
      gap: clamp(14px, 2vw, 22px);
      align-items: center;
      min-height: 0;
      width: 100%;
      margin-top: clamp(2px, 0.6vh, 8px);
    }

    .controls {
      grid-area: controls;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: clamp(10px, 1.8vw, 20px);
      align-items: center;
      min-height: 0;
      width: min(100%, 920px);
    }

    .ctrl {
      height: clamp(64px, 9vw, 94px);
      border: 0;
      border-radius: 18px;
      background: transparent;
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.18s ease, background 0.18s ease;
      padding: 0;
    }

    .ctrl:hover { background: rgba(255,255,255,0.06); }
    .ctrl:active { transform: scale(0.97); }
    .ctrl:disabled { opacity: 0.4; cursor: not-allowed; }

    .ctrl svg {
      width: var(--icon-size);
      height: var(--icon-size);
      display: block;
    }

    .ctrl.play svg {
      width: var(--play-icon-size);
      height: var(--play-icon-size);
    }

    .ctrl.shuffle svg {
      transform: translateY(4px);
      transform-origin: center;
    }

    .ctrl.active { color: var(--green); }
    .ctrl.heart.active { color: var(--green); }

    .ctrl.recommend.loading svg {
      animation: spinPulse 0.9s linear infinite;
      transform-origin: center;
    }

    @keyframes spinPulse {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .volume-wrap {
      grid-area: volume;
      min-width: 0;
      width: 100%;
      max-width: none;
      justify-self: stretch;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-height: clamp(48px, 5vw, 58px);
      padding: 10px 18px 10px 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(18,18,20,0.32);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .volume-wrap input[type="range"] {
      height: 26px;
      width: calc(100% - 10px);
      justify-self: start;
    }

    .volume-wrap .volume-btn {
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.92);
      display: grid;
      place-items: center;
      padding: 0;
      cursor: pointer;
      border-radius: 999px;
    }

    .volume-wrap .volume-btn:hover {
      background: rgba(255,255,255,0.06);
    }

    .volume-wrap svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .utility-row {
      grid-area: utility;
      display: grid;
      grid-template-columns: repeat(4, auto);
      justify-content: end;
      align-items: center;
      gap: 10px;
      min-height: 0;
      align-self: stretch;
    }

    .secondary-btn {
      position: relative;
      width: clamp(50px, 5vw, 60px);
      height: clamp(50px, 5vw, 60px);
      min-height: 0;
      border-radius: 999px;
      padding: 0;
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(12px);
      background: rgba(18,18,20,0.34);
      color: rgba(255,255,255,0.92);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 26px rgba(0,0,0,0.16);
    }

    .secondary-btn svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .secondary-btn.audio-btn svg {
      width: 34px;
      height: 34px;
      display: block;
      margin: auto;
      flex: 0 0 auto;
    }

    .secondary-btn.remote-btn svg {
      width: 25px;
      height: 25px;
      display: block;
      margin: auto;
      flex: 0 0 auto;
    }

    .ctrl.recommend.active {
      color: var(--green);
    }

    .secondary-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .secondary-btn.active {
      color: #ffffff;
      border-color: rgba(46, 214, 100, 0.72);
      background: rgba(13, 27, 17, 0.7);
      box-shadow: 0 0 0 1.5px rgba(30, 215, 96, 0.3), inset 0 0 0 1px rgba(30, 215, 96, 0.12);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 5;
      background: rgba(3,3,4,0.52);
      backdrop-filter: blur(12px);
    }

    .overlay.show { display: flex; }

    .overlay-card {
      width: min(100%, 560px);
      padding: 20px;
      border-radius: 24px;
      background: rgba(19,19,22,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.42);
      display: grid;
      gap: 14px;
    }

    .overlay-title {
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0;
    }

    .overlay-copy {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 17px);
      line-height: 1.42;
    }

    .overlay-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .overlay-btn {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.01em;
      cursor: pointer;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .overlay-btn.primary {
      background: linear-gradient(180deg, #2ae06c, #19b856);
      color: #041008;
      border: 0;
    }

    .overlay-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .device-sheet {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 6;
      background: rgba(3,3,4,0.58);
      backdrop-filter: blur(12px);
    }

    .device-sheet.show { display: flex; }

    .device-card {
      width: min(100%, 432px);
      max-height: min(74dvh, 620px);
      overflow: hidden;
      padding: 12px;
      border-radius: 22px;
      background: rgba(19,19,22,0.96);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.42);
      display: grid;
      gap: 8px;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .device-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .device-tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .device-tool-btn svg {
      width: 18px;
      height: 18px;
      display: block;
      margin: auto;
      flex: 0 0 auto;
    }

    .device-tool-btn.refresh-btn svg {
      width: 30px;
      height: 30px;
      display: block;
      margin: auto;
      flex: 0 0 auto;
      transform: translateY(0.5px);
    }

    .device-list {
      display: grid;
      gap: 6px;
      overflow: auto;
      padding-right: 2px;
      min-height: 120px;
    }

    .device-item {
      width: 100%;
      text-align: left;
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
    }

    .device-item:hover { background: rgba(255,255,255,0.08); }

    .device-item.active {
      border-color: rgba(46,214,100,0.4);
      background: rgba(13,27,17,0.55);
    }

    .device-item:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .device-item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .device-item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .device-chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .device-chip.good {
      color: #d7ffe5;
      background: rgba(13,27,17,0.7);
      border-color: rgba(46,214,100,0.34);
    }

    .device-actions { display: none; }
    .device-btn { display: none; }
    .device-btn.primary { display: none; }

    .hidden { display: none !important; }

    @media (max-width: 900px), (orientation: portrait) {
      .frame {
        grid-template-rows: auto auto auto;
        row-gap: 14px;
      }

      .hero-inner {
        grid-template-columns: minmax(0, 1fr);
        justify-items: center;
        text-align: center;
      }

      .art-wrap {
        justify-self: center;
        margin-inline-end: 0;
      }

      .meta {
        justify-items: center;
        align-content: start;
        padding-inline-start: 0;
      }


      .transport-row {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "controls controls"
          "volume utility";
        column-gap: 12px;
        row-gap: 14px;
        align-items: center;
      }

      .controls {
        width: 100%;
      }

      .volume-wrap {
        width: 100%;
        max-width: none;
        justify-self: stretch;
      }

      .utility-row {
        justify-content: end;
        align-self: center;
      }
    }

    @media (max-width: 640px) {
      :root {
        --art-size: min(48vw, 248px);
        --title-size: clamp(32px, 8.8vw, 60px);
        --artist-size: clamp(20px, 5.6vw, 30px);
      }

      .frame {
        gap: 12px;
      }

      .track-name {
        -webkit-line-clamp: 2;
      }

      .controls {
        gap: 6px;
      }

      .ctrl {
        height: 64px;
      }

      .transport-row {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "controls controls"
          "volume utility";
      }

      .utility-row {
        gap: 8px;
      }

      .secondary-btn {
        width: 48px;
        height: 48px;
      }

      .overlay-actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      :root {
        --pad-y: 10px;
        --art-size: min(30vh, 212px);
        --title-size: clamp(31px, 7.6vh, 58px);
        --artist-size: clamp(18px, 4.9vh, 27px);
      }

      .frame {
        gap: 10px;
      }

      .hero-inner {
        grid-template-columns: minmax(100px, 24vh) minmax(0, 1fr);
        gap: clamp(32px, 5vw, 56px);
      }

      .art-wrap {
        margin-inline-end: clamp(14px, 2vw, 20px);
      }

      .meta {
        padding-inline-start: clamp(12px, 1.8vw, 20px);
      }

      .transport-row {
        grid-template-columns: minmax(0, 1fr) minmax(180px, 26vw) auto;
        gap: 10px;
      }

      .ctrl {
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <main id="screen" class="screen" aria-label="Spotify remote dashboard">
    <img id="bgArt" class="bg-art" alt="" aria-hidden="true" />
    <div class="bg-vignette"></div>
    <canvas id="paletteCanvas" class="sr-only" width="32" height="32" aria-hidden="true"></canvas>

    <div class="frame">
      <section class="hero" aria-live="polite">
        <div id="gestureZone" class="hero-inner">
          <div class="art-wrap">
            <img id="albumArt" class="album-art" alt="Album art" />
          </div>

          <div class="meta">
            <div id="metaTop" class="meta-top">sp0tify</div>
            <h1 id="trackName" class="track-name">Nothing playing</h1>
            <p id="artistName" class="artist-name">Sign in and start playback</p>
          </div>
        </div>
      </section>

      <section class="timeline-section" aria-label="Track timeline and progress">
        <input id="timeline" type="range" min="0" max="1000" value="0" step="1" aria-label="Track timeline" />
        <div class="time-row">
          <span id="currentTime">0:00</span>

        r = hue2rgb(p, q, h + 1/3);
        g = hue2rgb(p, q, h);
        b = hue2rgb(p, q, h - 1/3);
      }
      return {
        r: Math.round(r * 255),
        g: Math.round(g * 255),
        b: Math.round(b * 255)
      };
    }

    function tuneColor(color, { saturationBoost = 1, lightness = null, darken = 0 } = {}) {
      const hsl = rgbToHsl(color.r, color.g, color.b);
      const tuned = hslToRgb(
        hsl.h,
        clamp(hsl.s * saturationBoost, 0.16, 0.9),
        lightness == null ? clamp(hsl.l - darken, 0.08, 0.6) : clamp(lightness, 0.08, 0.6)
      );
      return tuned;
    }

    function averageColors(colors, fallback) {
      if (!colors.length) return fallback;
      let r = 0, g = 0, b = 0;
      for (const color of colors) {
        r += color.r;
        g += color.g;
        b += color.b;
      }
      return {
        r: Math.round(r / colors.length),
        g: Math.round(g / colors.length),
        b: Math.round(b / colors.length)
      };
    }


    function setBackgroundGradient(colors) {
      const screen = els.screen;
      if (!screen) return;
      const primary = tuneColor(colors.primary, { saturationBoost: 1.22, lightness: 0.24 });
      const secondary = tuneColor(colors.secondary, { saturationBoost: 1.08, lightness: 0.18 });
      const accent = tuneColor(colors.accent, { saturationBoost: 1.18, lightness: 0.3 });
      const gradient = `radial-gradient(circle at 18% 16%, ${rgbaFromColor(accent, 0.26)} 0%, transparent 42%), linear-gradient(160deg, ${rgbaFromColor(primary, 0.16)} 0%, ${rgbaFromColor(secondary, 0.12)} 38%, #09090b 78%)`;
      screen.style.background = gradient.replace(/\s+/g, ' ');
    }

    function setDefaultBackground() {
      setBackgroundGradient({
        primary: { r: 112, g: 78, b: 141 },
        secondary: { r: 58, g: 104, b: 150 },
        tertiary: { r: 104, g: 74, b: 82 },
        accent: { r: 140, g: 98, b: 165 }
      });
    }

    async function extractPaletteFromImage(src) {
      const canvas = els.paletteCanvas;
      const ctx = canvas?.getContext('2d', { willReadFrequently: true });
      if (!canvas || !ctx || !src) {
        setDefaultBackground();
        return;
      }
      try {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';
        await new Promise((resolve, reject) => {
          img.onload = () => resolve();
          img.onerror = reject;
          img.src = src;
        });

        const size = 24;
        canvas.width = size;
        canvas.height = size;
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        const { data } = ctx.getImageData(0, 0, size, size);

        const all = [];
        const bright = [];
        const dark = [];
        const saturated = [];

        for (let i = 0; i < data.length; i += 16) {
          const alpha = data[i + 3];
          if (alpha < 40) continue;
          const sample = { r: data[i], g: data[i + 1], b: data[i + 2] };
          const { s, l } = rgbToHsl(sample.r, sample.g, sample.b);
          if (l < 0.035) continue;
          all.push(sample);
          if (l > 0.52) bright.push(sample);
          if (l < 0.28) dark.push(sample);
          if (s > 0.3) saturated.push(sample);
        }

        const fallback = { r: 104, g: 84, b: 126 };
        const base = averageColors(all, fallback);
        const brightMix = averageColors(bright, base);
        const darkMix = averageColors(dark, base);
        const saturatedMix = averageColors(saturated, brightMix);

        setBackgroundGradient({
          primary: base,
          secondary: saturatedMix,
          tertiary: darkMix,
          accent: brightMix
        });
        state.gradientArtSrc = src;
      } catch (error) {
        console.warn('Background palette extraction failed', error);
        setDefaultBackground();
      }
    }

    function normalizeUrl(rawUrl) {
      const url = new URL(rawUrl, location.origin);
      let path = url.pathname.replace(/index\.html$/i, '');

      els.useDeviceBtn.classList.toggle('active', localSelected);

    function updateAuxButtons() {

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    function canRequestFullscreen() {
      const root = document.documentElement;
      return !!(document.fullscreenEnabled || document.webkitFullscreenEnabled || typeof root.requestFullscreen === 'function' || typeof root.webkitRequestFullscreen === 'function');
    }

    function getEnterFullscreenMarkup() {
      return '<path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 15v6h-6"></path><path d="M3 9V3h6"></path>';
    }

    function getExitFullscreenMarkup() {
      return '<path d="M21 9h-6V3"></path><path d="M3 9h6V3"></path><path d="M21 15h-6v6"></path><path d="M3 15h6v6"></path>';
    }

    function syncFullscreenButton() {
      if (!els.fullscreenBtn) return;
      const supported = canRequestFullscreen();
      const active = !!getFullscreenElement();
      els.fullscreenBtn.disabled = !supported;
      els.fullscreenBtn.classList.toggle('active', active);
      els.fullscreenBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
      els.fullscreenBtn.setAttribute('aria-label', active ? 'Exit full screen' : 'Enter full screen');
      els.fullscreenBtn.setAttribute('title', active ? 'Exit full screen' : 'Enter full screen');
      if (els.fullscreenIcon) {
        els.fullscreenIcon.innerHTML = active ? getExitFullscreenMarkup() : getEnterFullscreenMarkup();
      }
    }

    async function requestFullscreenCompat() {
      const root = document.documentElement;
      if (typeof root.requestFullscreen === 'function') {
        try {
          return await root.requestFullscreen({ navigationUI: 'hide' });
        } catch (error) {
          return await root.requestFullscreen();
        }
      }
      if (typeof root.webkitRequestFullscreen === 'function') {
        return await root.webkitRequestFullscreen();
      }
      throw new Error('Full screen is not available in this browser');
    }

    async function exitFullscreenCompat() {
      if (typeof document.exitFullscreen === 'function') {
        return await document.exitFullscreen();
      }
      if (typeof document.webkitExitFullscreen === 'function') {
        return await document.webkitExitFullscreen();
      }
      throw new Error('Full screen is not available in this browser');
    }

    async function toggleFullscreen() {

        return;

        if (getFullscreenElement()) {
          await exitFullscreenCompat();
        } else {
          await requestFullscreenCompat();
        }
      } catch (error) {
        setStatus(`Full screen failed: ${error.message}`, 'error');
      } finally {
        syncFullscreenButton();
      }
    }


    function setSelectedDevice(device = null, persist = true) {
      state.selectedDeviceId = device?.id || '';
      state.selectedDeviceName = device?.name || '';
      state.selectedDeviceSupportsVolume = device ? device.supports_volume !== false : true;
      if (persist) {
        if (state.selectedDeviceId) setSaved(STORAGE_KEYS.selectedDeviceId, state.selectedDeviceId);
        else removeSaved(STORAGE_KEYS.selectedDeviceId);
      }
      updateRemoteButton();
      updateTransportButtons(!!state.playbackState || !!state.ready);
    }

    function updatePlaybackDeviceInfo(device = null) {
      state.playbackDeviceId = device?.id || '';
      state.playbackDeviceName = device?.name || '';
      state.playbackDeviceSupportsVolume = device ? device.supports_volume !== false : true;
      const targetId = getCommandDeviceId();
      if (device && Number.isFinite(device.volume_percent) && (!targetId || device.id === targetId || (!state.selectedDeviceId && device.id === state.playbackDeviceId))) {
        syncVolumeFromPlaybackDevice(device, false);
      }
      if (!state.selectedDeviceId) updateTransportButtons(!!state.playbackState || !!state.ready);
      updateRemoteButton();
    }

    function normalizePlaybackState(input, source = 'sdk') {
      if (!input) return null;
      if (source === 'api') {
        if (!input.item) return null;
        const item = input.item;
        return {
          paused: !input.is_playing,
          position: input.progress_ms || 0,
          duration: item.duration_ms || 0,
          context: input.context ? { metadata: { context_description: item.album?.name || input.context.type || 'Spotify' } } : null,
          track_window: { current_track: {
            id: item.id,
            uri: item.uri,
            name: item.name,
            duration_ms: item.duration_ms,
            artists: item.artists || [],
            album: item.album || { images: [] }
          } },
          device: input.device || null
        };
      }
      return input;
    }

    async function fetchAvailableDevices(render = true) {
      const data = await spotifyFetch('/v1/me/player/devices');
      state.devices = Array.isArray(data?.devices) ? data.devices : [];
      const savedSelected = state.selectedDeviceId || getSaved(STORAGE_KEYS.selectedDeviceId);
      if (savedSelected) {
        const found = state.devices.find(device => device.id === savedSelected);
        if (found) {
          setSelectedDevice(found, false);
        } else if (state.selectedDeviceId) {
          setSelectedDevice(null);
        }
      }
      if (render) renderDeviceList();
      return state.devices;
    }

    function renderDeviceList() {
      if (!els.deviceList) return;
      if (!state.devices.length) {
        els.deviceList.innerHTML = '<div class="device-item" style="cursor:default"><div class="device-item-head"><span>No devices found</span></div><div class="device-item-meta"><span class="device-chip">Open Spotify on the device first, then refresh.</span></div></div>';
        return;
      }
      const activeId = state.playbackDeviceId;
      const selectedId = state.selectedDeviceId;
      els.deviceList.innerHTML = state.devices.map(device => {
        const isSelected = selectedId && device.id === selectedId;
        const isActive = activeId && device.id === activeId;
        const isLocal = state.deviceId && device.id === state.deviceId;
        const chips = [
          `<span class="device-chip">${device.type || 'device'}</span>`,
          isActive ? '<span class="device-chip good">Active</span>' : '',
          isLocal ? '<span class="device-chip">This browser</span>' : '',
          isSelected ? '<span class="device-chip good">Selected</span>' : '',
          device.supports_volume === false ? '<span class="device-chip">No volume API</span>' : '',
          device.is_restricted ? '<span class="device-chip">Restricted</span>' : ''
        ].filter(Boolean).join('');
        return `
          <button class="device-item ${isSelected ? 'active' : ''}" type="button" data-device-id="${device.id || ''}" ${device.is_restricted || !device.id ? 'disabled' : ''}>
            <div class="device-item-head">
              <span>${device.name || 'Unnamed device'}</span>
            </div>
            <div class="device-item-meta">${chips}</div>
          </button>
        `;
      }).join('');
      els.deviceList.querySelectorAll('[data-device-id]').forEach(button => {
        button.addEventListener('click', async () => {
          const deviceId = button.getAttribute('data-device-id') || '';
          const device = state.devices.find(entry => entry.id === deviceId);
          if (!device || device.is_restricted) return;
          try {
            setSelectedDevice(device);
            await spotifyFetch('/v1/me/player', {
              method: 'PUT',
              body: JSON.stringify({ device_ids: [device.id], play: false })
            });
            updatePlaybackDeviceInfo(device);
            syncVolumeFromPlaybackDevice(device, false);
            setStatus(`Now controlling ${device.name}`, 'good');
            closeDeviceSheet();
            await hydratePlaybackState();
            syncPlaybackFlags().catch(() => {});
          } catch (error) {
            setStatus(`Device selection failed: ${error.message}`, 'error');
          }
        });
      });
    }

    async function openDeviceSheet() {
      if (!hasTokens()) return;
      els.deviceSheet.classList.add('show');
      els.deviceSheet.setAttribute('aria-hidden', 'false');
      updateRemoteButton();
      els.deviceList.innerHTML = '<div class="device-item" style="cursor:default"><div class="device-item-head"><span>Loading…</span></div></div>';
      try {
        await fetchAvailableDevices(true);
      } catch (error) {
        els.deviceList.innerHTML = `<div class="device-item" style="cursor:default"><div class="device-item-head"><span>Could not load devices</span></div><div class="device-item-meta"><span class="device-chip">${error.message}</span></div></div>`;
        setStatus(`Could not load devices: ${error.message}`, 'error');
      }
    }

    function closeDeviceSheet() {
      els.deviceSheet.classList.remove('show');
      els.deviceSheet.setAttribute('aria-hidden', 'true');
      updateRemoteButton();
    }

    async function refreshDevices() {
      try {
        await fetchAvailableDevices(true);
        setStatus('Device list refreshed', 'good');
      } catch (error) {
        setStatus(`Could not refresh devices: ${error.message}`, 'error');
      }
    }

    function isInteractiveTarget(target) {
      return !!target?.closest('button, input, .overlay-card, a, label');
    }

    function clearGesture() {

          gesture.captureEl.releasePointerCapture(gesture.pointerId);
        } catch (error) {
          /* ignore capture release errors */
        }
      }

      gesture.pointerId = null;
      gesture.startX = 0;
      gesture.startY = 0;
      gesture.lastX = 0;
      gesture.lastY = 0;
      gesture.startTime = 0;
      gesture.tracking = false;
      gesture.active = false;
      gesture.pointerType = '';
      gesture.captureEl = null;
    }

    function clearTouchGesture() {
      touchGesture.identifier = null;
      touchGesture.startX = 0;
      touchGesture.startY = 0;
      touchGesture.lastX = 0;
      touchGesture.lastY = 0;
      touchGesture.startTime = 0;
      touchGesture.tracking = false;

    async function apiPlayerCommand(path, { method = 'POST', query = {}, body = null } = {}) {
      const params = new URLSearchParams(query);
      const targetId = getCommandDeviceId();
      if (targetId) params.set('device_id', targetId);
      const suffix = params.toString() ? `?${params.toString()}` : '';
      return spotifyFetch(`${path}${suffix}`, { method, ...(body ? { body: JSON.stringify(body) } : {}) });
    }

    async function refreshPlaybackSoon(delay = 220) {
      await new Promise(resolve => setTimeout(resolve, delay));
      await hydratePlaybackState();
      syncPlaybackFlags().catch(() => {});
    }

    async function commandPrevious() {
      if (isLocalCommandTarget() && state.player) return state.player.previousTrack();
      return apiPlayerCommand('/v1/me/player/previous');
    }

    async function commandNext() {
      if (isLocalCommandTarget() && state.player) return state.player.nextTrack();
      return apiPlayerCommand('/v1/me/player/next');
    }

    async function commandTogglePlay() {
      if (isLocalCommandTarget() && state.player && !state.selectedDeviceId) return state.player.togglePlay();
      if (state.playbackState?.paused) return apiPlayerCommand('/v1/me/player/play', { method: 'PUT' });
      return apiPlayerCommand('/v1/me/player/pause', { method: 'PUT' });
    }

    async function commandSeek(positionMs) {
      if (isLocalCommandTarget() && state.player) return state.player.seek(positionMs);
      return apiPlayerCommand('/v1/me/player/seek', { method: 'PUT', query: { position_ms: String(Math.max(0, Math.round(positionMs || 0))) } });
    }

    async function commandSetVolume(volume) {
      const bounded = Math.max(0, Math.min(1, Number.isFinite(volume) ? volume : 0));
      if (isLocalCommandTarget() && state.player && !state.selectedDeviceId) return syncPlayerVolume(bounded);
      if (!canControlVolume()) throw new Error('Volume is not available for this device');
      return apiPlayerCommand('/v1/me/player/volume', { method: 'PUT', query: { volume_percent: String(Math.round(bounded * 100)) } });
    }

    async function runGestureAction(direction) {
      if ((!state.player && !hasTokens()) || Date.now() < state.gestureCooldownUntil) return;
      state.gestureCooldownUntil = Date.now() + 360;

      try {
        if (direction === 'right') {
          await commandPrevious();
          setStatus('Previous track', 'good');
          refreshPlaybackSoon().catch(() => {});
        } else if (direction === 'left') {
          await commandNext();
          setStatus('Next track', 'good');
          refreshPlaybackSoon().catch(() => {});
        } else if (direction === 'up') {
          const nextVolume = Math.min(1, state.volume + 0.08);
          await applyVolume(nextVolume);
          setStatus(`Volume ${Math.round(nextVolume * 100)}%`, 'good');
        } else if (direction === 'down') {
          const nextVolume = Math.max(0, state.volume - 0.08);
          await applyVolume(nextVolume);
          setStatus(`Volume ${Math.round(nextVolume * 100)}%`, 'good');
        }
      } catch (error) {
        setStatus(`Gesture failed: ${error.message}`, 'error');
      }
    }

    function findTrackedTouch(touchList) {
      if (!touchList || touchGesture.identifier === null) return null;
      for (const touch of touchList) {
        if (touch.identifier === touchGesture.identifier) return touch;
      }
      return null;
    }

    function attachGestureEvents() {
      const zone = els.gestureZone;
      if (!zone) return;

      zone.addEventListener('pointerdown', (event) => {
        if (!canUseGestures()) return;
        if (!event.isPrimary) return;
        if (event.pointerType === 'mouse' && event.button !== 0) return;
        if (event.pointerType === 'touch') return;
        if (isInteractiveTarget(event.target)) return;

        gesture.pointerId = event.pointerId;
        gesture.startX = event.clientX;
        gesture.startY = event.clientY;
        gesture.lastX = event.clientX;
        gesture.lastY = event.clientY;
        gesture.startTime = performance.now();
        gesture.tracking = true;
        gesture.active = false;
        gesture.pointerType = event.pointerType || 'mouse';
        gesture.captureEl = zone;

        if (zone.setPointerCapture) {
          try {
            zone.setPointerCapture(event.pointerId);
          } catch (error) {

          }
        }
      }, { passive: true });

      zone.addEventListener('pointermove', (event) => {
        if (!gesture.tracking || event.pointerId !== gesture.pointerId) return;
        gesture.lastX = event.clientX;
        gesture.lastY = event.clientY;

        const dx = gesture.lastX - gesture.startX;
        const dy = gesture.lastY - gesture.startY;
        if (Math.hypot(dx, dy) > 18) gesture.active = true;
      }, { passive: true });

      const finishGesture = async (event) => {
        if (!gesture.tracking || event.pointerId !== gesture.pointerId) return;

        const dx = (typeof event.clientX === 'number' ? event.clientX : gesture.lastX) - gesture.startX;
        const dy = (typeof event.clientY === 'number' ? event.clientY : gesture.lastY) - gesture.startY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);

        const pointerType = gesture.pointerType;

        const verticalThreshold = pointerType === 'mouse' ? 100 : 64;

        touchGesture.startY = touch.clientY;
        touchGesture.lastX = touch.clientX;
        touchGesture.lastY = touch.clientY;
        touchGesture.startTime = performance.now();
        touchGesture.tracking = true;
      }, { passive: true });

      zone.addEventListener('touchmove', (event) => {
        if (!touchGesture.tracking) return;
        const touch = findTrackedTouch(event.changedTouches) || findTrackedTouch(event.touches);
        if (!touch) return;
        touchGesture.lastX = touch.clientX;
        touchGesture.lastY = touch.clientY;
        const dx = touchGesture.lastX - touchGesture.startX;
        const dy = touchGesture.lastY - touchGesture.startY;
        if (Math.hypot(dx, dy) > 14) {
          event.preventDefault();
        }
      }, { passive: false });

      const finishTouchGesture = async (event) => {
        if (!touchGesture.tracking) return;
        const touch = findTrackedTouch(event.changedTouches) || { clientX: touchGesture.lastX, clientY: touchGesture.lastY };
        const dx = touch.clientX - touchGesture.startX;
        const dy = touch.clientY - touchGesture.startY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        const duration = performance.now() - touchGesture.startTime;

        clearTouchGesture();

        const horizontalThreshold = 56;
        const verticalThreshold = 52;
        const dominance = 1.28;

        if (duration > 950) return;
        if (absX < horizontalThreshold && absY < verticalThreshold) return;

        event.preventDefault();

        if (absX >= horizontalThreshold && absX > absY * dominance) {
          await runGestureAction(dx > 0 ? 'right' : 'left');
          return;
        }

        if (absY >= verticalThreshold && absY > absX * dominance) {
          await runGestureAction(dy < 0 ? 'up' : 'down');
        }
      };

      zone.addEventListener('touchend', finishTouchGesture, { passive: false });
      zone.addEventListener('touchcancel', clearTouchGesture, { passive: true });
    }

    function setVolumeUI(volume, persist = true) {
      const bounded = Math.max(0, Math.min(1, Number.isFinite(volume) ? volume : 0.8));
      state.volume = bounded;
      els.volumeSlider.value = String(Math.round(bounded * 100));
      updateRangeVisual(els.volumeSlider);
      setVolumeIcon(bounded);

      if (bounded > 0.001 && persist) setSaved(STORAGE_KEYS.previousVolume, String(bounded));

    function syncVolumeFromPlaybackDevice(device = null, persist = false) {
      if (!device || !Number.isFinite(device.volume_percent)) return;
      const nextVolume = Math.max(0, Math.min(1, device.volume_percent / 100));
      setVolumeUI(nextVolume, persist);
      if (nextVolume > 0.001) state.previousVolume = nextVolume;

    function loadSavedVolume() {
      const savedVolume = Number(getSaved(STORAGE_KEYS.volume));
      const savedPrevious = Number(getSaved(STORAGE_KEYS.previousVolume));
      state.volume = Number.isFinite(savedVolume) && savedVolume >= 0 && savedVolume <= 1 ? savedVolume : 0.8;
      state.previousVolume = Number.isFinite(savedPrevious) && savedPrevious > 0 && savedPrevious <= 1 ? savedPrevious : Math.max(state.volume, 0.8);
      setVolumeUI(state.volume, false);

          setStatus(`Volume failed: ${error.message}`, 'error');

    function deriveNowPosition() {
      if (!state.playbackState) return 0;
      const duration = state.playbackState.duration || state.playbackState.track_window?.current_track?.duration_ms || 0;
      if (state.playbackState.paused) return Math.min(state.playbackState.position || 0, duration);
      const elapsed = Date.now() - state.lastPlayerSnapshotAt;
      return Math.min((state.playbackState.position || 0) + elapsed, duration);
    }

    function renderProgress() {
      const playback = state.playbackState;
      if (!playback) return;
      const duration = playback.duration || playback.track_window?.current_track?.duration_ms || 0;
      const position = deriveNowPosition();
      els.currentTime.textContent = formatTime(position);
      els.totalTime.textContent = formatTime(duration);
      if (!state.seeking) {
        els.timeline.max = duration > 0 ? String(duration) : '1000';
        els.timeline.value = String(Math.min(position, duration || 1000));
        updateRangeVisual(els.timeline);
      }
    }

    function startProgressLoop() {
      if (state.timelineTimer) clearInterval(state.timelineTimer);

    async function beginLogin() {
      const verifier = randomString(96);
      const challenge = base64UrlEncode(await sha256(verifier));
      const oauthState = randomString(24);

      setSaved(STORAGE_KEYS.codeVerifier, verifier);
      setSaved(STORAGE_KEYS.oauthState, oauthState);

      const params = new URLSearchParams({
        client_id: APP_CONFIG.CLIENT_ID,
        response_type: 'code',
        redirect_uri: APP_CONFIG.REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        scope: SCOPES.join(' '),
        state: oauthState,
        show_dialog: 'false'
      });

      location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const verifier = getSaved(STORAGE_KEYS.codeVerifier);
      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: APP_CONFIG.CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: APP_CONFIG.REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error_description || data.error || 'Token exchange failed');
      }

      setSaved(STORAGE_KEYS.accessToken, data.access_token);
      if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
      setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
      removeSaved(STORAGE_KEYS.codeVerifier);
      removeSaved(STORAGE_KEYS.oauthState);
    }

    async function refreshAccessToken() {
      if (state.refreshPromise) return state.refreshPromise;
      const refreshToken = getSaved(STORAGE_KEYS.refreshToken);
      if (!refreshToken) throw new Error('Missing refresh token');

      state.refreshPromise = fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: refreshToken,
          client_id: APP_CONFIG.CLIENT_ID
        })
      })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error_description || data.error || 'Token refresh failed');
        }
        setSaved(STORAGE_KEYS.accessToken, data.access_token);
        setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
        if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
        return data.access_token;
      })
      .finally(() => {
        state.refreshPromise = null;
      });

      return state.refreshPromise;
    }

    async function getValidToken() {
      const token = getSaved(STORAGE_KEYS.accessToken);
      const expiresAt = Number(getSaved(STORAGE_KEYS.expiresAt) || 0);
      if (token && Date.now() < expiresAt) return token;
      return refreshAccessToken();
    }

    async function spotifyFetch(path, options = {}) {
      const token = await getValidToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';

      const response = await fetch(`https://api.spotify.com${path}`, {
        ...options,
        headers
      });

      if (response.status === 204) return null;

      const text = await response.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) { data = text; }

      if (!response.ok) {
        const message = data?.error?.message || data?.error_description || `Spotify API error ${response.status}`;
        throw new Error(message);
      }

      return data;
    }

    async function syncPlaybackFlags() {
      try {
        const playback = await spotifyFetch('/v1/me/player');
        if (playback && typeof playback.shuffle_state === 'boolean') {
          setShuffleVisual(playback.shuffle_state);
        }
        if (playback?.device) {
          updatePlaybackDeviceInfo(playback.device);
          syncVolumeFromPlaybackDevice(playback.device, false);
        }
      } catch (error) {
        if (!/204/.test(String(error?.message || ''))) {
          console.error(error);
        }
      }
    }

    function extractId(uriOrId) {
      if (!uriOrId) return '';
      const raw = String(uriOrId);
      if (!raw.includes(':')) return raw;
      return raw.split(':').pop() || '';
    }

    function pickRandom(items, predicate = null) {
      const pool = (items || []).filter(Boolean).filter(item => predicate ? predicate(item) : true);
      if (!pool.length) return null;
      return pool[Math.floor(Math.random() * pool.length)] || null;
    }

    async function addItemToQueue(uri) {
      const params = new URLSearchParams({ uri });
      const targetId = getCommandDeviceId();
      if (targetId) params.set('device_id', targetId);
      await spotifyFetch(`/v1/me/player/queue?${params.toString()}`, { method: 'POST' });
    }

    async function fetchRecommendationCandidate(current) {
      const trackId = extractId(current?.id || current?.uri);
      const artistIds = (current?.artists || []).map(artist => extractId(artist.id || artist.uri)).filter(Boolean);
      if (!trackId) return null;

      try {
        const params = new URLSearchParams({ limit: '20', seed_tracks: trackId });
        if (artistIds[0]) params.set('seed_artists', artistIds[0]);
        const data = await spotifyFetch(`/v1/recommendations?${params.toString()}`);
        return pickRandom(data?.tracks, item => item && item.uri && item.uri !== current?.uri && item.id !== current?.id);
      } catch (error) {
        console.warn('Recommendations unavailable, falling back', error);
      }

      const primaryArtistId = artistIds[0];
      if (primaryArtistId) {
        try {
          const data = await spotifyFetch(`/v1/artists/${primaryArtistId}/top-tracks`);
          const topTrack = pickRandom(data?.tracks, item => item && item.uri && item.uri !== current?.uri && item.id !== current?.id);
          if (topTrack) return topTrack;
        } catch (error) {
          console.warn('Artist top tracks fallback failed', error);
        }
      }

      const albumId = extractId(current?.album?.id || current?.album?.uri);
      if (albumId) {
        try {
          const data = await spotifyFetch(`/v1/albums/${albumId}/tracks?limit=50`);
          const albumTrack = pickRandom(data?.items, item => item && item.uri && item.uri !== current?.uri && item.id !== current?.id);
          if (albumTrack) return albumTrack;
        } catch (error) {
          console.warn('Album fallback failed', error);
        }
      }

      return null;
    }

    async function queueDiscoveryTrack() {
      if (state.recommendRequest) return state.recommendRequest;
      const current = state.playbackState?.track_window?.current_track;
      if (!current?.uri) {
        setStatus('Play something first', 'warn');
        return;
      }

      state.recommendRequest = (async () => {
        els.recommendBtn.classList.add('loading');
        els.recommendBtn.classList.add('active');
        try {
          const candidate = await fetchRecommendationCandidate(current);
          if (!candidate?.uri) throw new Error('No discovery track found');
          await addItemToQueue(candidate.uri);
          setRecommendVisual(true);
          const artist = (candidate.artists || []).map(artist => artist.name).filter(Boolean).join(', ');
          setStatus(`Queued ${candidate.name}${artist ? ` — ${artist}` : ''}`, 'good');
        } catch (error) {
          setRecommendVisual(false);
          setStatus(`Discovery failed: ${error.message}`, 'error');
        } finally {
          els.recommendBtn.classList.remove('loading');
          state.recommendRequest = null;
        }
      })();

      return state.recommendRequest;
    }

    async function syncLikedState(uri) {
      if (!uri) {
        setHeartVisual(false);
        els.heartBtn.disabled = true;
        return;
      }

      try {
        const result = await spotifyFetch(`/v1/me/library/contains?uris=${encodeURIComponent(uri)}`);
        const liked = Array.isArray(result) ? !!result[0] : false;
        setHeartVisual(liked);
        els.heartBtn.disabled = false;
      } catch (error) {
        setHeartVisual(false);
        setStatus(`Library check failed: ${error.message}`, 'error');
      }
    }

    async function toggleShuffle() {
      if (state.shuffleRequest) return state.shuffleRequest;
      const nextState = !state.shuffleEnabled;
      const params = new URLSearchParams({ state: String(nextState) });
      const targetId = getCommandDeviceId();
      if (targetId) params.set('device_id', targetId);

      state.shuffleRequest = (async () => {
        try {
          await spotifyFetch(`/v1/me/player/shuffle?${params.toString()}`, { method: 'PUT' });
          setShuffleVisual(nextState);
          setStatus(nextState ? 'Shuffle on' : 'Shuffle off', 'good');
          setTimeout(() => { syncPlaybackFlags().catch(() => {}); }, 250);
        } catch (error) {
          setStatus(`Shuffle failed: ${error.message}`, 'error');
        } finally {
          state.shuffleRequest = null;
        }
      })();

      return state.shuffleRequest;
    }

    async function toggleLike() {
      const uri = state.currentUri;
      if (!uri || state.likeRequest) return;

      state.likeRequest = (async () => {
        try {
          if (state.currentLiked) {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'DELETE' });
            setHeartVisual(false);
          } else {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'PUT' });
            setHeartVisual(true);
          }
        } catch (error) {
          setStatus(`Like update failed: ${error.message}`, 'error');
        } finally {
          state.likeRequest = null;
        }
      })();

      return state.likeRequest;
    }

    function updateTrackFromState(playbackState) {
      if (!playbackState || !playbackState.track_window?.current_track) return;
      const current = playbackState.track_window.current_track;
      const image = current.album?.images?.[0]?.url || DEFAULT_ART;
      const artist = (current.artists || []).map(artist => artist.name).join(', ');
      const contextName = playbackState.context?.metadata?.context_description || current.album?.name || 'Spotify';

      els.albumArt.src = image;
      els.bgArt.src = image;
      if (image && image !== state.gradientArtSrc) {
        extractPaletteFromImage(image);
      }
      els.trackName.textContent = current.name || 'Unknown track';
      els.artistName.textContent = artist || 'Unknown artist';
      els.metaTop.textContent = contextName;
      setPlayPauseVisual(!!playbackState.paused);
      if (playbackState.device) updatePlaybackDeviceInfo(playbackState.device);

      const newUri = current.uri || '';
      if (newUri && newUri !== state.currentUri) {
        setRecommendVisual(false);
        state.currentUri = newUri;
        syncLikedState(newUri);
      }

      updateTransportButtons(true);
      renderProgress();
    }

    async function hydratePlaybackState() {
      try {
        const playback = await spotifyFetch('/v1/me/player');
        if (playback?.device) {
          updatePlaybackDeviceInfo(playback.device);
          syncVolumeFromPlaybackDevice(playback.device, false);
        }
        if (playback?.item) {
          const normalized = normalizePlaybackState(playback, 'api');
          if (normalized) {
            state.playbackState = normalized;
            state.lastPlayerSnapshotAt = Date.now();
            updateTrackFromState(normalized);
            setStatus('Ready', 'good');
            return;
          }
        }
      } catch (error) {
        console.error(error);
      }

      if (state.player) {
        try {
          const playbackState = await state.player.getCurrentState();
          if (!playbackState) return;
          const normalized = normalizePlaybackState(playbackState, 'sdk');
          state.playbackState = normalized;
          state.lastPlayerSnapshotAt = Date.now();
          updateTrackFromState(normalized);
          syncPlaybackFlags().catch(() => {});
          setStatus('Ready', 'good');
        } catch (error) {
          console.error(error);
        }
      }
    }

    async function activateAudio() {
      if (!state.player) return;
      try {
        await state.player.activateElement();
        state.activated = true;
        updateAudioButton();
        setStatus('Audio activated', 'good');
        if (els.overlay.classList.contains('show')) setOverlay('setup');
      } catch (error) {
        state.activated = false;
        updateAudioButton();
        setStatus(`Audio activation failed: ${error.message}`, 'error');
        if (els.overlay.classList.contains('show')) setOverlay('setup');
      }
    }

    async function transferPlayback() {
      if (!state.deviceId) {
        setStatus('Spotify device is not ready', 'warn');
        return;
      }
      try {
        await spotifyFetch('/v1/me/player', {
          method: 'PUT',
          body: JSON.stringify({ device_ids: [state.deviceId], play: true })
        });
        setSelectedDevice({ id: state.deviceId, name: APP_CONFIG.DEVICE_NAME, supports_volume: true });
        setStatus('Playback transferred', 'good');
        setOverlay('hidden');
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        await new Promise(resolve => setTimeout(resolve, 900));
        await hydratePlaybackState();
        syncPlaybackFlags().catch(() => {});
      } catch (error) {
        setStatus(`Transfer failed: ${error.message}`, 'error');
      }
    }

    function signOut() {
      [
        STORAGE_KEYS.accessToken,
        STORAGE_KEYS.refreshToken,
        STORAGE_KEYS.expiresAt,
        STORAGE_KEYS.codeVerifier,
        STORAGE_KEYS.oauthState,
        STORAGE_KEYS.overlayDismissed,
        STORAGE_KEYS.selectedDeviceId
      ].forEach(removeSaved);

      if (state.player) {
        try { state.player.disconnect(); } catch (_) {}
      }

      state.player = null;
      state.deviceId = null;
      state.ready = false;
      state.activated = false;
      state.playbackState = null;
      state.currentUri = '';
      state.currentLiked = false;
      state.shuffleEnabled = false;
      state.discoveryQueued = false;
      state.selectedDeviceId = '';
      state.selectedDeviceName = '';
      state.playbackDeviceId = '';
      state.playbackDeviceName = '';
      updateAuxButtons();
      clearTrack();
      updateAudioButton();
      setOverlay('signin');
      setStatus('Signed out', 'warn');
    }

    function installPlayer() {
      if (!window.Spotify || state.player || !hasTokens()) {
        updateAuxButtons();
        return;
      }

      state.player = new Spotify.Player({
        name: APP_CONFIG.DEVICE_NAME,
        getOAuthToken: async (cb) => {
          try {
            cb(await getValidToken());
          } catch (error) {
            setStatus(`Token error: ${error.message}`, 'error');
          }
        },
        volume: state.volume,
        enableMediaSession: true
      });

      state.player.addListener('ready', async ({ device_id }) => {
        state.deviceId = device_id;
        state.ready = true;
        updateAuxButtons();
        updateTransportButtons(true);
        updateAudioButton();
        setStatus('Spotify ready', 'good');
        fetchAvailableDevices(false).catch(() => {});
        syncPlaybackFlags().catch(() => {});
        await syncPlayerVolume(state.volume);

        if (!state.activated) {
          const dismissed = getSaved(STORAGE_KEYS.overlayDismissed) === '1';
          setOverlay(dismissed ? 'hidden' : 'setup');
        }
      });

      state.player.addListener('not_ready', () => {
        state.ready = false;
        updateAuxButtons();
        setStatus('Spotify device offline', 'warn');
      });

      state.player.addListener('player_state_changed', (playbackState) => {
        if (!playbackState) return;
        if (state.selectedDeviceId && state.selectedDeviceId !== state.deviceId) return;
        const normalized = normalizePlaybackState(playbackState, 'sdk');
        state.playbackState = normalized;
        state.lastPlayerSnapshotAt = Date.now();
        updateTrackFromState(normalized);
        syncPlaybackFlags().catch(() => {});
      });

      state.player.addListener('autoplay_failed', () => {
        setStatus('Tap Activate audio', 'warn');
        setOverlay('setup');
      });

      state.player.addListener('initialization_error', ({ message }) => setStatus(`Initialization error: ${message}`, 'error'));
      state.player.addListener('authentication_error', ({ message }) => setStatus(`Authentication error: ${message}`, 'error'));
      state.player.addListener('account_error', ({ message }) => setStatus(`Account error: ${message}`, 'error'));
      state.player.addListener('playback_error', ({ message }) => setStatus(`Playback error: ${message}`, 'error'));

      state.player.connect().then(success => {
        if (!success) {
          setStatus('Spotify player could not connect', 'error');
          return;
        }
        updateAuxButtons();
      });
    }

    async function maybeHandleAuthRedirect() {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const incomingState = params.get('state');
      const error = params.get('error');

      if (normalizeUrl(location.href) !== normalizeUrl(APP_CONFIG.REDIRECT_URI)) {
        state.redirectMismatch = true;
      }

      if (error) {
        setStatus(`Spotify login failed: ${error}`, 'error');
        if (state.redirectMismatch) {
          setStatus('Redirect URI mismatch: this page is not the configured callback', 'error');
        }
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      if (!code) {
        if (state.redirectMismatch && !hasTokens()) {
          setStatus('Redirect URI is hardcoded to a different page', 'warn');
        }
        return;
      }

      const expectedState = getSaved(STORAGE_KEYS.oauthState);
      if (!incomingState || incomingState !== expectedState) {
        setStatus('Spotify login failed: invalid state', 'error');
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      try {
        setStatus('Finishing Spotify login', 'warn');
        await exchangeCodeForToken(code);
        history.replaceState({}, document.title, location.pathname);
        setStatus('Spotify login complete', 'good');
        setSaved(STORAGE_KEYS.overlayDismissed, '0');
      } catch (error) {
        setStatus(`Spotify login failed: ${error.message}`, 'error');
        history.replaceState({}, document.title, location.pathname);
      }
    }

    function startPlaybackPolling() {
      if (state.playbackPollTimer) clearInterval(state.playbackPollTimer);
      state.playbackPollTimer = setInterval(() => {
        if (!hasTokens() || state.seeking) return;
        hydratePlaybackState().catch(() => {});
      }, 2600);
    }

    function attachEvents() {
      els.loginBtn.addEventListener('click', beginLogin);
      els.audioBtn.addEventListener('click', activateAudio);
      els.setupAudioBtn.addEventListener('click', activateAudio);
      els.useDeviceBtn.addEventListener('click', transferPlayback);
      els.setupDeviceBtn.addEventListener('click', transferPlayback);
      els.connectRemoteBtn.addEventListener('click', openDeviceSheet);
      els.refreshDevicesBtn.addEventListener('click', refreshDevices);
      els.closeDevicesBtn.addEventListener('click', closeDeviceSheet);
      els.deviceSheet.addEventListener('click', (event) => {
        if (event.target === els.deviceSheet) closeDeviceSheet();
      });
      els.fullscreenBtn.addEventListener('click', toggleFullscreen);
      els.closeOverlayBtn.addEventListener('click', () => {
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        setOverlay('hidden');
      });
      els.signOutMiniBtn.addEventListener('click', signOut);

      els.prevBtn.addEventListener('click', async () => {
        try {
          await commandPrevious();
          refreshPlaybackSoon().catch(() => {});
        } catch (error) { setStatus(`Previous failed: ${error.message}`, 'error'); }
      });

      els.playPauseBtn.addEventListener('click', async () => {
        try {
          await commandTogglePlay();
          refreshPlaybackSoon().catch(() => {});
        } catch (error) { setStatus(`Play or pause failed: ${error.message}`, 'error'); }
      });

      els.shuffleBtn.addEventListener('click', toggleShuffle);

      els.nextBtn.addEventListener('click', async () => {
        try {
          await commandNext();
          refreshPlaybackSoon().catch(() => {});
        } catch (error) { setStatus(`Next failed: ${error.message}`, 'error'); }
      });

      els.heartBtn.addEventListener('click', toggleLike);
      els.recommendBtn.addEventListener('click', queueDiscoveryTrack);

      els.timeline.addEventListener('input', () => {
        state.seeking = true;
        updateRangeVisual(els.timeline);
        els.currentTime.textContent = formatTime(Number(els.timeline.value));
      });

      const finishSeek = async () => {
        if (!state.seeking) return;
        state.seeking = false;
        try {
          await commandSeek(Number(els.timeline.value));
          await refreshPlaybackSoon(150);
        } catch (error) {
          setStatus(`Seek failed: ${error.message}`, 'error');
        }
      };

      els.timeline.addEventListener('change', finishSeek);
      els.timeline.addEventListener('pointerup', finishSeek);
      els.timeline.addEventListener('touchend', finishSeek);

      els.volumeSlider.addEventListener('input', () => {
        const volume = Number(els.volumeSlider.value) / 100;
        setVolumeUI(volume);
      });

      const finishVolume = async () => {
        const volume = Number(els.volumeSlider.value) / 100;
        await applyVolume(volume);
      };

      els.volumeSlider.addEventListener('change', finishVolume);
      els.volumeSlider.addEventListener('pointerup', finishVolume);
      els.volumeSlider.addEventListener('touchend', finishVolume);

      els.muteBtn.addEventListener('click', async () => {
        const target = state.volume > 0.001 ? 0 : (state.previousVolume > 0.001 ? state.previousVolume : 0.8);
        await applyVolume(target);
      });

      document.addEventListener('fullscreenchange', syncFullscreenButton);
      document.addEventListener('webkitfullscreenchange', syncFullscreenButton);
      document.addEventListener('fullscreenerror', () => setStatus('Full screen failed', 'error'));
      document.addEventListener('webkitfullscreenerror', () => setStatus('Full screen failed', 'error'));
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && els.deviceSheet.classList.contains('show')) closeDeviceSheet();
      });
    }

    window.onSpotifyWebPlaybackSDKReady = () => {
      state.sdkReady = true;
      installPlayer();
    };

    (async function init() {
      setDefaultBackground();
    loadSavedVolume();
      clearTrack();
      updateRangeVisual(els.timeline);
      updateRangeVisual(els.volumeSlider);
      attachEvents();
      attachGestureEvents();
      updateAuxButtons();
      updateAudioButton();
      syncFullscreenButton();
      startProgressLoop();
      startPlaybackPolling();
      const savedSelected = getSaved(STORAGE_KEYS.selectedDeviceId);
      if (savedSelected) state.selectedDeviceId = savedSelected;
      await maybeHandleAuthRedirect();

      if (hasTokens()) {
        setStatus(state.redirectMismatch ? 'Stored session found' : 'Restoring session', 'warn');
        setOverlay('hidden');
        hydratePlaybackState().catch(() => {});
        fetchAvailableDevices(false).catch(() => {});
      } else {
        setOverlay('signin');
      }

      if (window.Spotify) installPlayer();
    })();
  </script>
</body>
</html>
