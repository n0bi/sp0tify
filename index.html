<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Vintage Camera</title>
  <style>
    :root {
      --bg: #050507;
      --panel: rgba(14, 14, 18, 0.9);
      --line: rgba(255,255,255,.08);
      --text: #f5f5f7;
      --muted: rgba(255,255,255,.68);
      --shadow: 0 24px 60px rgba(0,0,0,.4);
      --radius: 30px;
      --button-shadow: 0 12px 30px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.06), transparent 25%),
        linear-gradient(180deg, #11131a, #050507 72%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body { padding: 10px; }

    .app {
      width: 100%;
      min-height: calc(100dvh - 20px);
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .camera-shell {
      width: min(100%, 980px);
      min-height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .viewer {
      position: relative;
      flex: 1 1 auto;
      min-height: min(76dvh, 960px);
      overflow: hidden;
      border-radius: var(--radius);
      background: #000;
      border: 1px solid rgba(255,255,255,.08);
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    video { display: none; }

    #preview,
    #output {
      object-fit: cover;
      image-rendering: auto;
    }

    #output {
      display: none;
      z-index: 1;
    }

    .viewer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0) 16%, rgba(0,0,0,.08) 100%);
      mix-blend-mode: screen;
      z-index: 3;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .mode-badge,
    .icon-btn,
    .toast {
      position: absolute;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 10px 30px rgba(0,0,0,.24);
      background: rgba(0,0,0,.4);
      color: rgba(255,255,255,.96);
    }

    .mode-badge {
      left: 12px;
      top: 12px;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      line-height: 1;
    }

    .icon-btn {
      right: 12px;
      top: 12px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      pointer-events: auto;
      display: grid;
      place-items: center;
      cursor: pointer;
      appearance: none;
      font: inherit;
    }

    .icon-btn:active { transform: scale(.98); }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toast {
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      white-space: nowrap;
      display: none;
      max-width: calc(100% - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 2px 2px 4px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .mode-row::-webkit-scrollbar { display: none; }

    .mode-chip,
    .pill-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 11px;
      font: inherit;
      font-size: 12px;
      letter-spacing: .02em;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
      white-space: nowrap;
      box-shadow: var(--button-shadow);
    }

    .mode-chip:active,
    .pill-btn:active { transform: scale(.98); }

    .mode-chip.active {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.22);
    }

    .capture-row {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .capture-btn {
      appearance: none;
      width: 74px;
      height: 74px;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,.92);
      background: transparent;
      padding: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      transition: transform .15s ease, opacity .15s ease;
    }

    .capture-btn::before {
      content: "";
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background: #ff3b30;
      box-shadow: inset 0 -10px 16px rgba(0,0,0,.14), inset 0 10px 14px rgba(255,255,255,.14);
    }

    .capture-btn.is-retake::after {
      content: "↻";
      position: absolute;
      color: rgba(255,255,255,.96);
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,.28);
      transform: translateY(-1px);
      pointer-events: none;
    }

    .capture-btn:active { transform: scale(.97); }
    .capture-btn:disabled { opacity: .55; cursor: wait; }

    .pill-btn:disabled {
      opacity: .42;
      cursor: not-allowed;
    }

    .save-btn {
      min-width: 86px;
      text-align: center;
    }

    @media (max-width: 720px) {
      body { padding: 0; }
      .app { min-height: 100dvh; }
      .camera-shell {
        width: 100%;
        border-radius: 0;
        min-height: 100dvh;
        padding: 8px;
      }
      .viewer {
        min-height: calc(100dvh - 154px);
        border-radius: 24px;
      }
      .mode-chip,
      .pill-btn {
        padding: 8px 10px;
        font-size: 11px;
      }
      .capture-btn {
        width: 76px;
        height: 76px;
      }
      .capture-btn::before {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <div class="camera-shell" id="cameraShell">
      <div class="viewer" id="viewer">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="preview"></canvas>
        <canvas id="output"></canvas>
        <div class="hud">
          <div id="modeBadge" class="mode-badge">Disposable</div>
          <button id="fullscreenBtn" class="icon-btn" type="button" aria-label="Toggle fullscreen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5"></path>
              <path d="M16 3h5v5"></path>
              <path d="M21 16v5h-5"></path>
              <path d="M8 21H3v-5"></path>
            </svg>
          </button>
          <div id="toast" class="toast"></div>
        </div>
      </div>

      <div class="controls">
        <div class="mode-row" id="modeRow" aria-label="Camera looks"></div>

        <div class="capture-row">
          <button id="captureBtn" class="capture-btn" type="button" aria-label="Capture photo" disabled></button>
          <button id="saveBtn" class="pill-btn save-btn" type="button" disabled>Save</button>
        </div>
      </div>
    </div>
  </div>

    const viewer = document.getElementById('viewer');
    const modeBadge = document.getElementById('modeBadge');
    const modeRow = document.getElementById('modeRow');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const toast = document.getElementById('toast');
    const appRoot = document.getElementById('appRoot');

    const MODES = {

      },
      vcr: {

        filePrefix: 'vga_cctv',

        profile: {

          blackLift: 4,

          noise: 5.2,

          vignette: 0.02,
          hotspot: 0,
          chromaShift: 0.16,
          sharpen: 0.14,
          blur: 0.07,
          flashBloom: 0,
          barrel: 0,
          edgeBlur: 0,
          edgeBlurStart: 0.7,

        }
      }
    };

    const STATE = {
      mode: 'disposable',
      stream: null,
      captured: false,
      lastBlobUrl: '',
      toastTimer: 0,
      previewRAF: 0,
      previewVideoFrameRequest: 0,
      lastPreviewTick: 0,
      previewFPS: 12,
      renderBusy: false,
      faceDetector: null,
      faceDetectorChecked: false,
      faceDetectorNoticeShown: false,
      latestFaces: [],
      faceDetectPending: null,
      lastFaceDetectAt: 0,
      vcrFieldPhase: 0
    };

    function clamp(value, min = 0, max = 255) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function fitSize(width, height, maxLongEdge) {
      const longEdge = Math.max(width, height);
      if (longEdge <= maxLongEdge) return { width, height };
      const scale = maxLongEdge / longEdge;
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale))
      };
    }

    function showToast(message, sticky = false) {
      toast.textContent = message;
      toast.style.display = 'block';
      clearTimeout(STATE.toastTimer);
      if (!sticky) {
        STATE.toastTimer = window.setTimeout(() => {
          toast.style.display = 'none';
        }, 1800);
      }
    }

    function hideToast() {
      clearTimeout(STATE.toastTimer);
      toast.style.display = 'none';
    }

    function getViewerAspect() {
      return viewer.clientWidth && viewer.clientHeight
        ? viewer.clientWidth / viewer.clientHeight
        : 4 / 3;
    }

    function getCoverCrop(srcWidth, srcHeight, targetAspect) {
      const srcAspect = srcWidth / srcHeight;
      let sx = 0;
      let sy = 0;
      let sw = srcWidth;
      let sh = srcHeight;

      if (srcAspect > targetAspect) {
        sw = srcHeight * targetAspect;
        sx = (srcWidth - sw) / 2;
      } else {
        sh = srcWidth / targetAspect;
        sy = (srcHeight - sh) / 2;
      }

      return { sx, sy, sw, sh };
    }

    function applyCenterZoomToCrop(crop, srcWidth, srcHeight, zoom = 1) {
      if (!zoom || zoom <= 1) return crop;

      const sw = crop.sw / zoom;
      const sh = crop.sh / zoom;
      const sx = Math.max(0, Math.min(srcWidth - sw, crop.sx + (crop.sw - sw) / 2));
      const sy = Math.max(0, Math.min(srcHeight - sh, crop.sy + (crop.sh - sh) / 2));

      return { sx, sy, sw, sh };
    }

    function sceneStats(data) {
      let lum = 0;
      let sat = 0;
      let samples = 0;

      for (let i = 0; i < data.length; i += 32) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);

        lum += 0.2126 * r + 0.7152 * g + 0.0722 * b;
        sat += max === 0 ? 0 : (max - min) / max;
        samples++;
      }

      return {
        luminance: lum / Math.max(1, samples),
        saturation: sat / Math.max(1, samples)
      };
    }

    function buildProfile(modeKey, stats) {
      const base = MODES[modeKey].profile;
      const lowLight = stats.luminance < 104;
      const darkAmount = clamp((122 - stats.luminance) / 90, 0, 1);
      const saturationBias = clamp((stats.saturation - 0.32) * 1.6, -0.12, 0.12);

      return {
        cropZoom: base.cropZoom || 1,
        contrast: base.contrast + (lowLight ? base.lowLightContrastBoost * darkAmount : 0),
        exposure: base.exposure + (lowLight ? base.lowLightExposureBoost * darkAmount : 0),
        saturation: base.saturation + saturationBias,
        warmthR: base.warmthR,
        warmthG: base.warmthG,
        warmthB: base.warmthB,
        blackLift: base.blackLift,
        highlightPush: base.highlightPush,
        noise: base.noise + (lowLight ? base.lowLightNoiseBoost * darkAmount : 0),
        colorNoise: base.colorNoise + (lowLight ? 1.2 * darkAmount : 0),
        vignette: base.vignette,
        hotspot: base.hotspot + (lowLight ? 0.03 * darkAmount : 0),
        chromaShift: base.chromaShift,
        sharpen: base.sharpen,
        blur: base.blur || 0,
        flashBloom: base.flashBloom + (lowLight ? base.lowLightBloomBoost * darkAmount : 0),
        barrel: base.barrel,
        edgeBlur: base.edgeBlur || 0,
        edgeBlurStart: base.edgeBlurStart || 0.6,
        blockiness: base.blockiness,
        haze: base.haze + (lowLight ? 0.03 * darkAmount : 0),
        magentaBoost: base.magentaBoost,
        coolBoost: base.coolBoost,
        edgeFade: base.edgeFade || 0,
        vcrStrength: base.vcrStrength || 0,
        lowLight
      };
    }

    function drawCoveredFrame(targetCanvas, longEdgeCap, cropZoom = 1) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;
      const aspect = getViewerAspect();
      const baseCrop = getCoverCrop(sourceWidth, sourceHeight, aspect);
      const crop = applyCenterZoomToCrop(baseCrop, sourceWidth, sourceHeight, cropZoom);
      const fitted = fitSize(crop.sw, crop.sh, longEdgeCap);

      targetCanvas.width = fitted.width;
      targetCanvas.height = fitted.height;

      const ctx = targetCanvas.getContext('2d', { willReadFrequently: true });
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(
        video,
        crop.sx, crop.sy, crop.sw, crop.sh,
        0, 0, fitted.width, fitted.height
      );

      return { ctx, crop, width: fitted.width, height: fitted.height };
    }

    function applyBarrelWarp(sourceCanvas, amount) {
      if (!amount) return sourceCanvas;

      const width = sourceCanvas.width;
      const height = sourceCanvas.height;
      const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
      const srcFrame = srcCtx.getImageData(0, 0, width, height);
      const src = srcFrame.data;

      const warpedCanvas = document.createElement('canvas');
      warpedCanvas.width = width;
      warpedCanvas.height = height;
      const dstCtx = warpedCanvas.getContext('2d', { willReadFrequently: true });
      const dstFrame = dstCtx.createImageData(width, height);
      const dst = dstFrame.data;

      const cx = width / 2;
      const cy = height / 2;
      const maxRadius = Math.sqrt(cx * cx + cy * cy);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = (x - cx) / maxRadius;
          const dy = (y - cy) / maxRadius;
          const r2 = dx * dx + dy * dy;
          const factor = 1 - amount * r2;
          const sx = Math.round(cx + (x - cx) * factor);
          const sy = Math.round(cy + (y - cy) * factor);
          const di = ((y * width) + x) * 4;

          if (sx < 0 || sy < 0 || sx >= width || sy >= height) {
            dst[di] = 0;
            dst[di + 1] = 0;
            dst[di + 2] = 0;
            dst[di + 3] = 255;
            continue;
          }

          const si = ((sy * width) + sx) * 4;
          dst[di] = src[si];
          dst[di + 1] = src[si + 1];
          dst[di + 2] = src[si + 2];
          dst[di + 3] = 255;
        }
      }

      dstCtx.putImageData(dstFrame, 0, 0);
      return warpedCanvas;
    }

    function downsampleSoft(ctx, sourceCanvas, width, height, scale = 0.76) {
      const softCanvas = document.createElement('canvas');
      softCanvas.width = Math.max(1, Math.round(width * scale));
      softCanvas.height = Math.max(1, Math.round(height * scale));
      const softCtx = softCanvas.getContext('2d');
      softCtx.imageSmoothingEnabled = true;
      softCtx.drawImage(sourceCanvas, 0, 0, softCanvas.width, softCanvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(softCanvas, 0, 0, softCanvas.width, softCanvas.height, 0, 0, width, height);
    }

    function blurPass(ctx, width, height, amount) {
      if (amount <= 0.005) return;

      const softCanvas = document.createElement('canvas');
      const softScale = Math.max(0.58, 1 - amount * 0.55);
      softCanvas.width = Math.max(1, Math.round(width * softScale));
      softCanvas.height = Math.max(1, Math.round(height * softScale));
      const sctx = softCanvas.getContext('2d');
      sctx.imageSmoothingEnabled = true;
      sctx.drawImage(ctx.canvas, 0, 0, softCanvas.width, softCanvas.height);

      ctx.save();
      ctx.globalAlpha = Math.min(0.42, 0.18 + amount * 0.85);
      ctx.filter = `blur(${Math.max(1.2, width * amount * 0.006)}px)`;
      ctx.drawImage(softCanvas, 0, 0, softCanvas.width, softCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function drawSoftEdgeFade(ctx, width, height, strength) {
      if (strength <= 0.01) return;

      const fade = ctx.createRadialGradient(
        width / 2, height / 2, Math.min(width, height) * 0.28,
        width / 2, height / 2, Math.max(width, height) * 0.82
      );
      fade.addColorStop(0, 'rgba(255,247,238,0)');
      fade.addColorStop(0.66, `rgba(255,247,238,${strength * 0.08})`);
      fade.addColorStop(1, `rgba(255,247,238,${strength * 0.34})`);
      ctx.save();
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function primaryColorPass(imageData, width, height, profile) {
      const data = imageData.data;
      const cx = width / 2;
      const cy = height / 2;
      const maxDist = Math.sqrt(cx * cx + cy * cy);

      for (let i = 0; i < data.length; i += 4) {
        const px = (i / 4) % width;
        const py = Math.floor((i / 4) / width);
        const dx = px - cx;
        const dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
        const radial = Math.min(1, dist);

        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];

        r = ((r - 128) * profile.contrast + 128) * profile.exposure;
        g = ((g - 128) * profile.contrast + 128) * profile.exposure;
        b = ((b - 128) * profile.contrast + 128) * profile.exposure;

        const lumaBeforeSat = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        r = lumaBeforeSat + (r - lumaBeforeSat) * profile.saturation;
        g = lumaBeforeSat + (g - lumaBeforeSat) * profile.saturation;
        b = lumaBeforeSat + (b - lumaBeforeSat) * profile.saturation;

        r = r * profile.warmthR + profile.blackLift + profile.magentaBoost;
        g = g * profile.warmthG + profile.blackLift * 0.84;
        b = b * profile.warmthB + profile.blackLift + profile.coolBoost;

        const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        const hot = profile.hotspot * Math.pow(1 - radial, 2.3);
        const vig = 1 - profile.vignette * Math.pow(radial, 1.85);

        if (luma > 170) {
          const bump = (luma - 170) * profile.highlightPush;
          r += bump;
          g += bump;
          b += bump;
        }

        if (profile.haze > 0) {
          const hazeGain = profile.haze * (1 - radial * 0.65);
          r = lerp(r, 233, hazeGain * 0.2);
          g = lerp(g, 231, hazeGain * 0.2);
          b = lerp(b, 228, hazeGain * 0.2);
        }

        const monoNoise = (Math.random() * 2 - 1) * profile.noise;
        const cNoiseR = (Math.random() * 2 - 1) * profile.colorNoise;
        const cNoiseG = (Math.random() * 2 - 1) * profile.colorNoise;
        const cNoiseB = (Math.random() * 2 - 1) * profile.colorNoise;

        r = (r + monoNoise + cNoiseR) * vig + hot * 255;
        g = (g + monoNoise + cNoiseG) * vig + hot * 249;
        b = (b + monoNoise + cNoiseB) * vig + hot * 244;

        data[i] = clamp(r);
        data[i + 1] = clamp(g);
        data[i + 2] = clamp(b);
      }

      return imageData;
    }

    function chromaticAberrationPass(imageData, width, height, profile) {
      const src = new Uint8ClampedArray(imageData.data);
      const data = imageData.data;
      const cx = width / 2;
      const cy = height / 2;
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      const index = (x, y) => ((y * width) + x) * 4;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
          if (dist < 0.18) continue;

          const shift = Math.max(0, Math.round(profile.chromaShift * dist));
          const rx = Math.max(0, Math.min(width - 1, x + Math.sign(dx || 1) * shift));
          const bx = Math.max(0, Math.min(width - 1, x - Math.sign(dx || 1) * shift));
          const ry = Math.max(0, Math.min(height - 1, y + Math.sign(dy || 1) * shift));
          const by = Math.max(0, Math.min(height - 1, y - Math.sign(dy || 1) * shift));

          const i = index(x, y);
          const ir = index(rx, ry);
          const ib = index(bx, by);

          data[i] = src[ir];
          data[i + 2] = src[ib + 2];
        }
      }

      return imageData;
    }

    function flashBloomPass(ctx, width, height, amount) {
      if (amount <= 0.01) return;

      const bloomCanvas = document.createElement('canvas');
      bloomCanvas.width = Math.max(1, Math.round(width * 0.3));
      bloomCanvas.height = Math.max(1, Math.round(height * 0.3));
      const bctx = bloomCanvas.getContext('2d');
      bctx.filter = `blur(${Math.max(7, Math.round(width * 0.012))}px) brightness(${1 + amount * 1.6})`;
      bctx.drawImage(ctx.canvas, 0, 0, bloomCanvas.width, bloomCanvas.height);

      ctx.save();
      ctx.globalAlpha = 0.18 + amount * 0.42;
      ctx.filter = `blur(${Math.max(6, Math.round(width * 0.005))}px)`;
      ctx.drawImage(bloomCanvas, 0, 0, bloomCanvas.width, bloomCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function sharpenPass(ctx, width, height, amount) {
      if (amount <= 0) return;

      const base = ctx.getImageData(0, 0, width, height);
      const blurredCanvas = document.createElement('canvas');
      blurredCanvas.width = Math.max(1, Math.round(width * 0.88));
      blurredCanvas.height = Math.max(1, Math.round(height * 0.88));
      const bctx = blurredCanvas.getContext('2d');
      bctx.drawImage(ctx.canvas, 0, 0, blurredCanvas.width, blurredCanvas.height);

      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = width;
      tmpCanvas.height = height;
      const tctx = tmpCanvas.getContext('2d');
      tctx.drawImage(blurredCanvas, 0, 0, blurredCanvas.width, blurredCanvas.height, 0, 0, width, height);

      const blur = tctx.getImageData(0, 0, width, height);
      const bd = base.data;
      const sd = blur.data;

      for (let i = 0; i < bd.length; i += 4) {
        bd[i] = clamp(bd[i] + (bd[i] - sd[i]) * amount);
        bd[i + 1] = clamp(bd[i + 1] + (bd[i + 1] - sd[i + 1]) * amount);
        bd[i + 2] = clamp(bd[i + 2] + (bd[i + 2] - sd[i + 2]) * amount);
      }

      ctx.putImageData(base, 0, 0);
    }

    function blockArtifactsPass(ctx, width, height, strength) {
      if (strength <= 0) return;

      const blockCanvas = document.createElement('canvas');
      const blockScale = 0.22 - Math.min(0.08, strength * 0.06);
      blockCanvas.width = Math.max(1, Math.round(width * blockScale));
      blockCanvas.height = Math.max(1, Math.round(height * blockScale));
      const bctx = blockCanvas.getContext('2d');
      bctx.imageSmoothingEnabled = true;
      bctx.drawImage(ctx.canvas, 0, 0, blockCanvas.width, blockCanvas.height);

      ctx.save();
      ctx.globalAlpha = 0.1 + strength * 0.18;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(blockCanvas, 0, 0, blockCanvas.width, blockCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function edgeBlurPass(ctx, width, height, amount, start) {
      if (amount <= 0.01) return;

      const overlay = document.createElement('canvas');
      overlay.width = width;
      overlay.height = height;
      const octx = overlay.getContext('2d');
      const blurRadius = Math.max(1.6, Math.min(8, width * amount * 0.012));

      octx.filter = `blur(${blurRadius}px)`;
      octx.drawImage(ctx.canvas, 0, 0, width, height);
      octx.filter = 'none';
      octx.globalCompositeOperation = 'destination-in';

      const gradient = octx.createRadialGradient(
        width / 2, height / 2, Math.min(width, height) * Math.max(0.12, start * 0.34),
        width / 2, height / 2, Math.max(width, height) * 0.76
      );
      gradient.addColorStop(0, 'rgba(255,255,255,0)');
      gradient.addColorStop(Math.max(0.01, Math.min(0.84, start)), 'rgba(255,255,255,0)');
      gradient.addColorStop(1, 'rgba(255,255,255,1)');
      octx.fillStyle = gradient;
      octx.fillRect(0, 0, width, height);
      octx.globalCompositeOperation = 'source-over';

      ctx.save();
      ctx.globalAlpha = Math.min(0.98, amount * 1.28);
      ctx.drawImage(overlay, 0, 0, width, height);
      ctx.restore();
    }

    function drawVignette(ctx, width, height, strength) {
      const gradient = ctx.createRadialGradient(
        width / 2, height / 2, Math.min(width, height) * 0.18,
        width / 2, height / 2, Math.max(width, height) * 0.72
      );
      gradient.addColorStop(0, 'rgba(0,0,0,0)');
      gradient.addColorStop(0.65, `rgba(0,0,0,${strength * 0.12})`);
      gradient.addColorStop(1, `rgba(0,0,0,${strength * 0.48})`);
      ctx.save();
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function drawAnalogFrameBorder(ctx, width, height, opacity = 0.18) {
      ctx.save();
      ctx.strokeStyle = `rgba(255,245,238,${opacity})`;
      ctx.lineWidth = Math.max(1, width * 0.0025);
      ctx.strokeRect(ctx.lineWidth / 2, ctx.lineWidth / 2, width - ctx.lineWidth, height - ctx.lineWidth);
      ctx.restore();
    }

    function compositeToCanvas(renderCanvas, targetCanvas) {
      targetCanvas.width = renderCanvas.width;
      targetCanvas.height = renderCanvas.height;
      const ctx = targetCanvas.getContext('2d');
      ctx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
      ctx.drawImage(renderCanvas, 0, 0);
    }

    function normalizeDetectedFaces(faceResults) {
      const detections = Array.isArray(faceResults)
        ? faceResults
        : (faceResults && Array.isArray(faceResults.detections) ? faceResults.detections : []);

      return detections.map((face) => {
        const box = face.boundingBox || face;
        return {
          x: box.originX ?? box.x ?? 0,
          y: box.originY ?? box.y ?? 0,
          width: box.width ?? 0,
          height: box.height ?? 0
        };
      }).filter((box) => box.width > 1 && box.height > 1);
    }

    async function ensureFaceDetector() {
      if (STATE.faceDetectorChecked) return STATE.faceDetector;
      STATE.faceDetectorChecked = true;

      try {
        showToast('Loading face mosaic model…', true);
        const { FaceDetector: MPFaceDetector, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/+esm');
        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
        );
        STATE.faceDetector = await MPFaceDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite',
            delegate: 'GPU'
          },
          runningMode: 'VIDEO',
          minDetectionConfidence: 0.42,
          minSuppressionThreshold: 0.28
        });
        STATE.faceDetectorNoticeShown = false;
        hideToast();
      } catch (gpuErr) {
        console.error(gpuErr);
        try {
          const { FaceDetector: MPFaceDetector, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/+esm');
          const vision = await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
          );
          STATE.faceDetector = await MPFaceDetector.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite',
              delegate: 'CPU'
            },
            runningMode: 'VIDEO',
            minDetectionConfidence: 0.42,
            minSuppressionThreshold: 0.28
          });
          STATE.faceDetectorNoticeShown = false;
          hideToast();
        } catch (cpuErr) {
          console.error(cpuErr);
          STATE.faceDetector = null;
          if (!STATE.faceDetectorNoticeShown) {
            STATE.faceDetectorNoticeShown = true;
            showToast('Face mosaic model could not load', true);
          }
        }
      }

      return STATE.faceDetector;
    }

    function getDetectionCanvas(sourceCanvas) {
      const detectCanvas = document.createElement('canvas');
      const maxLongEdge = 240;
      const fitted = fitSize(sourceCanvas.width, sourceCanvas.height, maxLongEdge);
      detectCanvas.width = fitted.width;
      detectCanvas.height = fitted.height;
      const dctx = detectCanvas.getContext('2d', { willReadFrequently: false });
      dctx.imageSmoothingEnabled = true;
      dctx.drawImage(sourceCanvas, 0, 0, detectCanvas.width, detectCanvas.height);
      return detectCanvas;
    }

    async function detectFacesOnCanvas(sourceCanvas, force = false) {
      const detector = await ensureFaceDetector();
      if (!detector) return STATE.latestFaces;

      const now = performance.now();
      if (!force && STATE.faceDetectPending) return STATE.latestFaces;
      if (!force && now - STATE.lastFaceDetectAt < 160) return STATE.latestFaces;

      STATE.lastFaceDetectAt = now;
      const scaleX = sourceCanvas.width;
      const scaleY = sourceCanvas.height;
      const detectionCanvas = getDetectionCanvas(sourceCanvas);
      const ratioX = scaleX / detectionCanvas.width;
      const ratioY = scaleY / detectionCanvas.height;

      const job = Promise.resolve().then(() => {
        const result = detector.detectForVideo(detectionCanvas, now);
        const faces = normalizeDetectedFaces(result).map((face) => ({
          x: face.x * ratioX,
          y: face.y * ratioY,
          width: face.width * ratioX,
          height: face.height * ratioY
        }));
        STATE.latestFaces = faces;
        return faces;
      }).catch((err) => {
        console.error(err);
        return STATE.latestFaces;
      }).finally(() => {
        STATE.faceDetectPending = null;
      });

      STATE.faceDetectPending = job;
      return force ? job : STATE.latestFaces;
    }

    function applyMosaicToFaces(ctx, faces, strength = 1) {
      if (!faces || !faces.length) return;
      const canvas = ctx.canvas;
      const scratch = document.createElement('canvas');
      const sctx = scratch.getContext('2d');

      faces.forEach((face) => {
        const padX = face.width * 0.1;
        const padY = face.height * 0.12;
        const x = Math.max(0, Math.floor(face.x - padX));
        const y = Math.max(0, Math.floor(face.y - padY));
        const w = Math.min(canvas.width - x, Math.ceil(face.width + padX * 2));
        const h = Math.min(canvas.height - y, Math.ceil(face.height + padY * 2));
        if (w < 4 || h < 4) return;

        const pixelSize = Math.max(3, Math.round(Math.min(w, h) / lerp(28, 18, strength)));
        const smallW = Math.max(1, Math.round(w / pixelSize));
        const smallH = Math.max(1, Math.round(h / pixelSize));
        scratch.width = smallW;
        scratch.height = smallH;
        sctx.imageSmoothingEnabled = true;
        sctx.clearRect(0, 0, smallW, smallH);
        sctx.drawImage(canvas, x, y, w, h, 0, 0, smallW, smallH);

        ctx.save();
        ctx.beginPath();
        ctx.ellipse(x + w / 2, y + h / 2, w * 0.46, h * 0.5, 0, 0, Math.PI * 2);
        ctx.clip();
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(scratch, 0, 0, smallW, smallH, x, y, w, h);
        ctx.globalAlpha = 0.05;
        ctx.fillStyle = '#111';
        ctx.fillRect(x, y, w, h);
        ctx.restore();
      });
    }

    function applyVcrPass(ctx, width, height, strength, phase = 0) {
      const lowCanvas = document.createElement('canvas');
      lowCanvas.width = Math.max(280, Math.round(width * lerp(0.74, 0.62, strength)));
      lowCanvas.height = Math.max(200, Math.round(height * lerp(0.74, 0.62, strength)));
      const lctx = lowCanvas.getContext('2d');
      lctx.imageSmoothingEnabled = true;
      lctx.filter = `blur(${Math.max(0.16, width * 0.00032)}px)`;
      lctx.drawImage(ctx.canvas, 0, 0, lowCanvas.width, lowCanvas.height);
      lctx.filter = 'none';

      ctx.save();
      ctx.clearRect(0, 0, width, height);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(lowCanvas, 0, 0, lowCanvas.width, lowCanvas.height, 0, 0, width, height);
      ctx.restore();

      const bleedCanvas = document.createElement('canvas');
      bleedCanvas.width = width;
      bleedCanvas.height = height;
      const bctx = bleedCanvas.getContext('2d');
      bctx.filter = `blur(${Math.max(0.28, width * 0.00065)}px)`;
      bctx.drawImage(ctx.canvas, 0, 0, width, height);
      bctx.filter = 'none';

      ctx.save();
      ctx.globalAlpha = 0.03 + strength * 0.03;
      ctx.drawImage(bleedCanvas, 1, 0);
      ctx.globalAlpha = 0.016 + strength * 0.02;
      ctx.drawImage(bleedCanvas, -1, 0);
      ctx.restore();

      const base = ctx.getImageData(0, 0, width, height);
      const data = base.data;
      const original = new Uint8ClampedArray(data);
      const globalShift = Math.sin(phase * 0.12) * (0.08 + strength * 0.12);
      for (let y = 0; y < height; y++) {
        const drift = Math.sin((y * 0.005) + phase * 0.03) * (0.04 + strength * 0.08);
        const microWobble = Math.sin((y * 0.018) + phase * 0.07) * (0.03 + strength * 0.05);
        const xShift = Math.round(globalShift + drift + microWobble);
        const rowLift = Math.sin((y * 0.013) + phase * 0.025) * (0.06 + strength * 0.11);
        const chromaJitter = Math.round(Math.sin((y * 0.015) + phase * 0.06) * (0.08 + strength * 0.14));
        for (let x = 0; x < width; x++) {
          const i = ((y * width) + x) * 4;
          const srcX = Math.max(0, Math.min(width - 1, x + xShift));
          const srcR = Math.max(0, Math.min(width - 1, srcX + chromaJitter));
          const srcB = Math.max(0, Math.min(width - 1, srcX - chromaJitter));
          const si = ((y * width) + srcX) * 4;
          const sri = ((y * width) + srcR) * 4;
          const sbi = ((y * width) + srcB) * 4;

          data[i] = clamp(original[sri] + rowLift + (Math.random() * 2 - 1) * (0.38 + strength * 0.34));
          data[i + 1] = clamp(original[si + 1] + rowLift * 0.58 + (Math.random() * 2 - 1) * (0.34 + strength * 0.28));
          data[i + 2] = clamp(original[sbi + 2] + rowLift * 0.72 + (Math.random() * 2 - 1) * (0.4 + strength * 0.36));
        }
      }
      ctx.putImageData(base, 0, 0);
    }

    async function processFrame(modeKey, longEdgeCap, options = {}) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;
      if (!sourceWidth || !sourceHeight) return null;

      const fastPreview = !!options.fastPreview;
      let profile;
      if (fastPreview && modeKey === 'vcr') {
        profile = { ...MODES[modeKey].profile, lowLight: false };
      } else {
        const statsCanvas = document.createElement('canvas');
        const initialFrame = drawCoveredFrame(statsCanvas, longEdgeCap);
        const scan = initialFrame.ctx.getImageData(0, 0, initialFrame.width, initialFrame.height);
        const stats = sceneStats(scan.data);
        profile = buildProfile(modeKey, stats);
      }

      let sourceCanvas = document.createElement('canvas');
      drawCoveredFrame(sourceCanvas, longEdgeCap, profile.cropZoom);

      if (profile.barrel) {
        sourceCanvas = applyBarrelWarp(sourceCanvas, profile.barrel);
      }

      const renderCanvas = document.createElement('canvas');
      renderCanvas.width = sourceCanvas.width;
      renderCanvas.height = sourceCanvas.height;
      const rctx = renderCanvas.getContext('2d', { willReadFrequently: true });

      rctx.clearRect(0, 0, renderCanvas.width, renderCanvas.height);
      downsampleSoft(rctx, sourceCanvas, renderCanvas.width, renderCanvas.height, modeKey === 'vcr' ? 0.88 : 0.76);

      let frame = rctx.getImageData(0, 0, renderCanvas.width, renderCanvas.height);
      frame = primaryColorPass(frame, renderCanvas.width, renderCanvas.height, profile);
      frame = chromaticAberrationPass(frame, renderCanvas.width, renderCanvas.height, profile);
      rctx.putImageData(frame, 0, 0);

      flashBloomPass(rctx, renderCanvas.width, renderCanvas.height, profile.flashBloom);
      blurPass(rctx, renderCanvas.width, renderCanvas.height, profile.blur);
      edgeBlurPass(rctx, renderCanvas.width, renderCanvas.height, profile.edgeBlur, profile.edgeBlurStart);
      sharpenPass(rctx, renderCanvas.width, renderCanvas.height, profile.sharpen);
      blockArtifactsPass(rctx, renderCanvas.width, renderCanvas.height, profile.blockiness);
      drawVignette(rctx, renderCanvas.width, renderCanvas.height, profile.vignette);
      drawSoftEdgeFade(rctx, renderCanvas.width, renderCanvas.height, profile.edgeFade);

      if (modeKey === 'instant' || modeKey === 'instax') {
        drawAnalogFrameBorder(rctx, renderCanvas.width, renderCanvas.height, modeKey === 'instant' ? 0.17 : 0.12);
      }

      if (modeKey === 'vcr') {
        const faces = await detectFacesOnCanvas(sourceCanvas, !!options.forceFaceDetection);
        applyVcrPass(rctx, renderCanvas.width, renderCanvas.height, profile.vcrStrength, STATE.vcrFieldPhase);
        applyMosaicToFaces(rctx, faces, 0.8);
      }

      return {
        canvas: renderCanvas,
        profile
      };
    }

    function updateCaptureUi() {
      captureBtn.setAttribute('aria-label', STATE.captured ? 'Retake photo' : 'Capture photo');
      captureBtn.classList.toggle('is-retake', STATE.captured);
      saveBtn.disabled = !STATE.captured;
    }

    function syncPreviewCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.4);
      const width = Math.max(1, Math.round(viewer.clientWidth * dpr));
      const height = Math.max(1, Math.round(viewer.clientHeight * dpr));
      if (preview.width !== width || preview.height !== height) {
        preview.width = width;
        preview.height = height;
      }
    }

    async function renderPreview(now = 0) {
      if (STATE.captured || STATE.renderBusy) return;
      if (video.readyState < 2) return;

      const frameInterval = 1000 / STATE.previewFPS;
      if (now - STATE.lastPreviewTick < frameInterval) return;

      STATE.lastPreviewTick = now;
      STATE.renderBusy = true;
      syncPreviewCanvas();

      const modeKey = STATE.mode;
      const mode = MODES[modeKey];
      try {
        const result = await processFrame(modeKey, mode.previewLongEdge, { fastPreview: true });
        if (result && !STATE.captured && modeKey === STATE.mode) {
          const pctx = preview.getContext('2d');
          pctx.clearRect(0, 0, preview.width, preview.height);
          pctx.imageSmoothingEnabled = true;
          pctx.drawImage(result.canvas, 0, 0, preview.width, preview.height);
          STATE.vcrFieldPhase = (STATE.vcrFieldPhase + 1) % 2;
        }
      } catch (err) {
        console.error(err);
      } finally {
        STATE.renderBusy = false;
      }
    }

    function requestNextPreviewFrame() {
      if (video.requestVideoFrameCallback) {
        STATE.previewVideoFrameRequest = video.requestVideoFrameCallback((now) => {
          requestNextPreviewFrame();
          renderPreview(now);
        });
      } else {
        STATE.previewRAF = requestAnimationFrame((now) => {
          requestNextPreviewFrame();
          renderPreview(now);
        });
      }
    }

    function startPreviewLoop() {
      cancelAnimationFrame(STATE.previewRAF);
      if (video.cancelVideoFrameCallback && STATE.previewVideoFrameRequest) {
        video.cancelVideoFrameCallback(STATE.previewVideoFrameRequest);
      }
      STATE.previewVideoFrameRequest = 0;
      STATE.lastPreviewTick = 0;
      requestNextPreviewFrame();
    }

    async function setMode(modeKey) {
      STATE.mode = modeKey;
      const mode = MODES[modeKey];
      modeBadge.textContent = mode.badge;

      Array.from(modeRow.querySelectorAll('.mode-chip')).forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === modeKey);
      });

      if (modeKey === 'vcr') {
        await ensureFaceDetector();
      }

      if (!STATE.captured && video.readyState >= 2 && !STATE.renderBusy) {
        syncPreviewCanvas();
        STATE.renderBusy = true;
        try {
          const result = await processFrame(STATE.mode, mode.previewLongEdge, { fastPreview: true });
          if (result && modeKey === STATE.mode && !STATE.captured) {
            const pctx = preview.getContext('2d');
            pctx.clearRect(0, 0, preview.width, preview.height);
            pctx.drawImage(result.canvas, 0, 0, preview.width, preview.height);
          }
        } catch (err) {
          console.error(err);
        } finally {
          STATE.renderBusy = false;
        }
      }
    }

    function buildModeButtons() {
      const fragment = document.createDocumentFragment();
      Object.entries(MODES).forEach(([key, value]) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'mode-chip';
        button.textContent = value.label;
        button.dataset.mode = key;
        button.addEventListener('click', () => {
          if (STATE.captured) return;
          setMode(key);
        });
        fragment.appendChild(button);
      });
      modeRow.appendChild(fragment);
      setMode(STATE.mode);
      updateCaptureUi();
    }

    async function capturePhoto() {
      if (STATE.captured || video.readyState < 2) return;

      captureBtn.disabled = true;
      showToast('Processing…', true);

      const modeKey = STATE.mode;
      const mode = MODES[modeKey];

      try {
        const result = await processFrame(modeKey, mode.maxLongEdge, { forceFaceDetection: modeKey === 'vcr' });
        if (!result) {
          captureBtn.disabled = false;
          showToast('Could not capture frame');
          return;
        }

        compositeToCanvas(result.canvas, output);
        preview.style.display = 'none';
        output.style.display = 'block';

        STATE.captured = true;
        updateCaptureUi();
        hideToast();
        showToast('Tap save to download');
      } catch (err) {
        console.error(err);
        showToast('Could not capture frame');
      } finally {
        captureBtn.disabled = false;
      }
    }

    function retake() {
      output.style.display = 'none';
      preview.style.display = 'block';
      STATE.captured = false;
      updateCaptureUi();
      hideToast();
      setMode(STATE.mode);
    }

    async function saveCurrentImage() {
      const quality = MODES[STATE.mode].outputQuality;
      const blob = await new Promise(resolve => output.toBlob(resolve, 'image/jpeg', quality));
      if (!blob) return;

      if (STATE.lastBlobUrl) URL.revokeObjectURL(STATE.lastBlobUrl);
      STATE.lastBlobUrl = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = STATE.lastBlobUrl;
      a.download = `${MODES[STATE.mode].filePrefix}_${Date.now()}.jpg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      showToast('Saved');
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('Camera not available in this browser', true);
        return;
      }

      const preferred = {
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 960 }
        }
      };

      const fallback = { audio: false, video: true };

      try {
        STATE.stream = await navigator.mediaDevices.getUserMedia(preferred);
      } catch (err) {
        try {
          STATE.stream = await navigator.mediaDevices.getUserMedia(fallback);
        } catch (err2) {
          console.error(err2);
          showToast('Camera permission denied or no camera found', true);
          return;
        }
      }

      video.srcObject = STATE.stream;

      try {
        await video.play();
      } catch (err) {
        console.error(err);
        showToast('Could not start camera preview', true);
        return;
      }

      captureBtn.disabled = false;
      hideToast();
      updateCaptureUi();
      syncPreviewCanvas();
      startPreviewLoop();
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await appRoot.requestFullscreen();
        }
      } catch (err) {
        console.error(err);
        showToast('Fullscreen blocked by this browser');
      }
    }

    captureBtn.addEventListener('click', () => {
      if (STATE.captured) {
        retake();
      } else {
        capturePhoto();
      }
    });
    saveBtn.addEventListener('click', saveCurrentImage);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.style.opacity = document.fullscreenElement ? '0.92' : '1';
      setTimeout(() => {
        syncPreviewCanvas();
      }, 80);
    });

    window.addEventListener('resize', () => {
      syncPreviewCanvas();
      if (!STATE.captured && video.readyState >= 2 && !STATE.renderBusy) {
        setMode(STATE.mode);
      }
    });

    window.addEventListener('beforeunload', () => {
      cancelAnimationFrame(STATE.previewRAF);
      if (video.cancelVideoFrameCallback && STATE.previewVideoFrameRequest) {
        video.cancelVideoFrameCallback(STATE.previewVideoFrameRequest);
      }
      if (STATE.stream) STATE.stream.getTracks().forEach(track => track.stop());
      if (STATE.lastBlobUrl) URL.revokeObjectURL(STATE.lastBlobUrl);
    });

    buildModeButtons();
    startCamera();
  </script>

</body>
</html>
