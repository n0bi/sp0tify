<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spotify Car UI Remote</title>
  <style>
    :root {
      --bg: #090506;
      --bg-2: #14090a;
      --panel: rgba(31, 12, 14, 0.84);
      --panel-2: rgba(48, 20, 24, 0.84);
      --panel-soft: rgba(24, 10, 12, 0.76);
      --text: #f0e4d2;
      --muted: #c6b29a;
      --muted-2: #9d8a78;
      --line: rgba(240, 228, 210, 0.16);
      --line-strong: rgba(240, 228, 210, 0.34);
      --grid: rgba(240, 228, 210, 0.055);
      --green: #7ee08e;
      --warn: #f0c14b;
      --danger: #ff8a73;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --pad-x: clamp(16px, 3vw, 42px);
      --pad-y: clamp(16px, 3vh, 36px);
      --art-size: clamp(132px, 23vw, 280px);
      --title-size: clamp(32px, 5.5vw, 80px);
      --artist-size: clamp(16px, 2.2vw, 30px);
      --meta-size: clamp(11px, 1.05vw, 15px);
      --icon-size: clamp(26px, 3.4vw, 42px);
      --play-icon-size: clamp(34px, 4.3vw, 52px);
      --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(112, 36, 42, 0.18), transparent 30%),
        radial-gradient(circle at 100% 100%, rgba(112, 36, 42, 0.14), transparent 28%),
        linear-gradient(180deg, #060304 0%, #0b0506 50%, #120708 100%);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body { min-height: 100dvh; }
    button, input { font: inherit; }

    .screen {
      position: relative;
      width: 100vw;
      min-height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
        repeating-linear-gradient(0deg, transparent 0 23px, var(--grid) 23px 24px),
        repeating-linear-gradient(90deg, transparent 0 23px, var(--grid) 23px 24px),
        radial-gradient(circle at top, rgba(109, 26, 30, 0.18), transparent 42%),
        linear-gradient(180deg, #080405 0%, #0a0506 56%, #130708 100%);
    }

    .screen::before,
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .screen::before {
      opacity: 0.12;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0) 24%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 4px);
      mix-blend-mode: screen;
    }

    .screen::after {
      opacity: 0.22;
      background:
        radial-gradient(circle at 15% 18%, rgba(240,228,210,0.12) 0 1px, transparent 1.5px) 0 0 / 14px 14px,
        radial-gradient(circle at 82% 76%, rgba(240,228,210,0.07) 0 1px, transparent 1.5px) 0 0 / 18px 18px;
      mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.45) 16%, rgba(0,0,0,0.9) 100%);
    }

    .bg-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(48px) saturate(0.35) brightness(0.4);
      transform: scale(1.08);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 34%, rgba(141, 40, 47, 0.18), transparent 28%),
        radial-gradient(circle at 76% 16%, rgba(255, 238, 223, 0.06), transparent 18%),
        linear-gradient(180deg, rgba(7,3,4,0.42), rgba(7,3,4,0.78)),
        linear-gradient(90deg, rgba(8,4,5,0.86) 0%, rgba(8,4,5,0.48) 52%, rgba(8,4,5,0.86) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .frame {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(86px, 10vw, 112px);
      grid-template-rows: minmax(0, 1fr) auto auto;
      grid-template-areas:
        "hero utility"
        "timeline utility"
        "transport utility";
      column-gap: clamp(18px, 2.8vw, 34px);
      row-gap: clamp(12px, 1.8vh, 22px);
      align-items: stretch;
      padding:
        calc(var(--pad-y) + var(--safe-top))
        calc(var(--pad-x) + var(--safe-right))
        calc(var(--pad-y) + var(--safe-bottom))
        calc(var(--pad-x) + var(--safe-left));
    }

    .frame::before {
      content: "WEB PLAYBACK // SP0TIFY";
      position: absolute;
      top: calc(var(--pad-y) * 0.35 + var(--safe-top));
      right: calc(var(--pad-x) + var(--safe-right));
      color: var(--muted-2);
      font: 600 clamp(10px, 0.9vw, 12px)/1 var(--mono);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.8;
      pointer-events: none;
    }

    .topbar { display: none; }
    .icon-mini-btn { display: none !important; }

    .hero,
    .timeline-section,
    .transport-row,
    .utility-row {
      position: relative;
      min-width: 0;
    }

    .hero::before,
    .timeline-section::before,
    .transport-row::before,
    .utility-row::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.015), 0 0 0 1px rgba(0,0,0,0.25);
      z-index: -1;
    }

    .hero::after,
    .timeline-section::after,
    .transport-row::after,
    .utility-row::after {
      content: "";
      position: absolute;
      inset: 8px;
      pointer-events: none;
      border: 1px solid rgba(240,228,210,0.05);
      z-index: -1;
    }

    .hero {
      grid-area: hero;
      display: grid;
      align-items: stretch;
    }

    .hero-inner {
      position: relative;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(128px, var(--art-size)) minmax(0, 1fr);
      gap: clamp(18px, 3vw, 34px);
      align-items: center;
      background:
        linear-gradient(180deg, rgba(66, 26, 30, 0.15), transparent 34%),
        linear-gradient(180deg, rgba(35, 14, 16, 0.92), rgba(18, 8, 10, 0.92));
      padding: clamp(18px, 2.5vw, 30px);
      overflow: hidden;
    }

    .hero-inner::before {
      content: "[ NOW PLAYING ]";
      position: absolute;
      top: 16px;
      left: 18px;
      color: var(--muted-2);
      font: 700 clamp(10px, 0.95vw, 12px)/1 var(--mono);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.86;
    }

    .hero-inner::after {
      content: "";
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: clamp(88px, 12vw, 128px);
      height: clamp(88px, 12vw, 128px);
      background: radial-gradient(circle, rgba(240,228,210,0.16) 0 1px, transparent 1.5px) 0 0 / 10px 10px;
      opacity: 0.18;
      mask-image: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0.85));
      pointer-events: none;
    }

    .art-wrap {
      width: 100%;
      max-width: var(--art-size);
      justify-self: start;
      position: relative;
      isolation: isolate;
    }

    .art-wrap::before,
    .art-wrap::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--line-strong);
      border-style: solid;
      pointer-events: none;
      z-index: 2;
    }

    .art-wrap::before {
      top: -10px;
      left: -10px;
      border-width: 1px 0 0 1px;
    }

    .art-wrap::after {
      right: -10px;
      bottom: -10px;
      border-width: 0 1px 1px 0;
    }

    .album-art {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 0;
      border: 1px solid var(--line-strong);
      background: rgba(0,0,0,0.22);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .meta {
      min-width: 0;
      display: grid;
      gap: clamp(10px, 1.35vh, 18px);
      align-content: center;
      align-self: stretch;
      padding-top: clamp(16px, 1.5vh, 22px);
    }

    .meta-top {
      font: 700 var(--meta-size)/1 var(--mono);
      color: var(--muted-2);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .track-name {
      margin: 0;
      font-size: var(--title-size);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.055em;
      max-width: min(100%, 13ch);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-wrap: balance;
      text-shadow: 0 0 24px rgba(255, 242, 230, 0.05);
    }

    .artist-name {
      margin: 0;
      font-size: var(--artist-size);
      font-weight: 600;
      line-height: 1.1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .timeline-section {
      grid-area: timeline;
      display: grid;
      gap: 10px;
      padding: 16px clamp(18px, 2.3vw, 28px) 18px;
      background:
        linear-gradient(180deg, rgba(55, 21, 25, 0.12), transparent 40%),
        linear-gradient(180deg, rgba(27, 10, 12, 0.92), rgba(18, 8, 10, 0.92));
    }

    .timeline-section::after {
      content: "TRACK POSITION";
      inset: auto auto 12px 18px;
      border: 0;
      color: var(--muted-2);
      font: 700 clamp(9px, 0.85vw, 11px)/1 var(--mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font: 700 clamp(12px, 1vw, 14px)/1 var(--mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding-top: 2px;
    }

    .time-row span:first-child { justify-self: start; }
    .time-row span:last-child { justify-self: end; text-align: right; }

    input[type="range"] {
      --progress: 0%;
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
      margin: 0;
      padding: 0;
      touch-action: pan-y;
    }

    .timeline-section input[type="range"] { height: 24px; }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: linear-gradient(90deg, rgba(240,228,210,0.96) 0%, rgba(240,228,210,0.96) var(--progress, 0%), rgba(240,228,210,0.18) var(--progress, 0%), rgba(240,228,210,0.18) 100%);
      border-radius: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35), 0 0 0 1px rgba(240,228,210,0.07);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      margin-top: -7px;
      width: 18px;
      height: 18px;
      border-radius: 0;
      background: var(--text);
      border: 1px solid rgba(0,0,0,0.52);
      box-shadow: 0 0 0 1px rgba(240,228,210,0.22);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      background: rgba(240,228,210,0.18);
      border-radius: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
    }

    input[type="range"]::-moz-range-progress {
      height: 4px;
      background: rgba(240,228,210,0.96);
      border-radius: 0;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 0;
      border: 1px solid rgba(0,0,0,0.52);
      background: var(--text);
      box-shadow: 0 0 0 1px rgba(240,228,210,0.22);
    }

    .transport-row {
      grid-area: transport;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, auto);
      gap: clamp(16px, 2.2vw, 28px);
      align-items: center;
      padding: 16px clamp(18px, 2.3vw, 28px) 18px;
      background:
        linear-gradient(180deg, rgba(55, 21, 25, 0.12), transparent 40%),
        linear-gradient(180deg, rgba(27, 10, 12, 0.92), rgba(18, 8, 10, 0.92));
    }

    .transport-row::after {
      content: "TRANSPORT // ANALOG CTRL";
      inset: auto auto 12px 18px;
      border: 0;
      color: var(--muted-2);
      font: 700 clamp(9px, 0.85vw, 11px)/1 var(--mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(56px, 96px));
      gap: clamp(10px, 1.3vw, 16px);
      align-items: center;
      min-height: 0;
      width: min(100%, 520px);
    }

    .ctrl {
      position: relative;
      height: clamp(58px, 8vw, 86px);
      border: 1px solid var(--line);
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(36, 16, 18, 0.86), rgba(21, 9, 11, 0.92));
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      padding: 0;
      overflow: hidden;
    }

    .ctrl::before,
    .volume-wrap::before,
    .secondary-btn::before,
    .overlay-card::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(240,228,210,0.05);
      pointer-events: none;
    }

    .ctrl:hover,
    .volume-wrap .volume-btn:hover,
    .secondary-btn:hover {
      border-color: var(--line-strong);
      background-color: rgba(255,255,255,0.02);
    }

    .ctrl:active { transform: scale(0.985); }
    .ctrl:disabled { opacity: 0.36; cursor: not-allowed; }

    .ctrl svg {
      width: var(--icon-size);
      height: var(--icon-size);
      display: block;
    }

    .ctrl.play {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(56, 21, 25, 0.96), rgba(28, 11, 13, 0.98));
    }

    .ctrl.play svg {
      width: var(--play-icon-size);
      height: var(--play-icon-size);
    }

    .ctrl.heart.active {
      color: var(--green);
      border-color: rgba(126, 224, 142, 0.42);
    }

    .volume-wrap {
      position: relative;
      min-width: min(34vw, 280px);
      max-width: 360px;
      justify-self: end;
      display: grid;
      grid-template-columns: auto minmax(140px, 1fr);
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(36, 16, 18, 0.86), rgba(21, 9, 11, 0.92));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.015);
    }

    .volume-wrap::after {
      content: "GAIN";
      position: absolute;
      top: 10px;
      right: 12px;
      color: var(--muted-2);
      font: 700 10px/1 var(--mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .volume-wrap input[type="range"] { height: 24px; }

    .volume-wrap .volume-btn {
      position: relative;
      width: 44px;
      height: 44px;
      border: 1px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 0;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .volume-wrap svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .utility-row {
      grid-area: utility;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 10px;
      background:
        linear-gradient(180deg, rgba(55, 21, 25, 0.12), transparent 40%),
        linear-gradient(180deg, rgba(27, 10, 12, 0.92), rgba(18, 8, 10, 0.92));
      padding: 12px;
      align-self: stretch;
    }

    .utility-row::after {
      content: "STATE";
      inset: auto auto 12px 12px;
      border: 0;
      color: var(--muted-2);
      font: 700 10px/1 var(--mono);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .secondary-btn {
      position: relative;
      width: 100%;
      height: clamp(52px, 8vw, 72px);
      min-height: 0;
      border-radius: 0;
      padding: 0;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(36, 16, 18, 0.86), rgba(21, 9, 11, 0.92));
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.015);
    }

    .secondary-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .secondary-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .secondary-btn.active {
      color: var(--text);
      border-color: rgba(126, 224, 142, 0.45);
    }

    .secondary-btn .mini-dot {
      position: absolute;
      right: 8px;
      bottom: 8px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(240,228,210,0.25);
      box-shadow: 0 0 0 2px rgba(15,8,9,0.8);
      transition: background 0.18s ease, box-shadow 0.18s ease;
      pointer-events: none;
    }

    .secondary-btn.active .mini-dot {
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(18,8,10,0.85), 0 0 14px rgba(126, 224, 142, 0.24);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 5;
      background:
        radial-gradient(circle at 50% 18%, rgba(146, 45, 51, 0.12), transparent 24%),
        rgba(5, 3, 4, 0.76);
      backdrop-filter: blur(10px);
    }

    .overlay.show { display: flex; }

    .overlay-card {
      position: relative;
      width: min(100%, 560px);
      padding: 22px;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(60, 22, 27, 0.15), transparent 38%),
        linear-gradient(180deg, rgba(27, 10, 12, 0.96), rgba(18, 8, 10, 0.98));
      border: 1px solid var(--line);
      box-shadow: 0 18px 50px rgba(0,0,0,0.42), inset 0 0 0 1px rgba(255,255,255,0.015);
      display: grid;
      gap: 16px;
    }

    .overlay-title {
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      margin: 0;
      color: var(--text);
    }

    .overlay-copy {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 17px);
      line-height: 1.48;
      max-width: 42ch;
    }

    .overlay-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .overlay-btn {
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 0;
      font: 700 13px/1 var(--mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(36, 16, 18, 0.86), rgba(21, 9, 11, 0.92));
    }

    .overlay-btn.primary {
      border-color: rgba(126, 224, 142, 0.45);
      color: #dcf7e2;
      background:
        linear-gradient(180deg, rgba(126,224,142,0.12), rgba(126,224,142,0) 42%),
        linear-gradient(180deg, rgba(24, 35, 21, 0.9), rgba(14, 23, 15, 0.94));
    }

    .overlay-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hidden { display: none !important; }

    @media (max-width: 960px), (orientation: portrait) {
      :root { --art-size: min(48vw, 240px); }

      .frame {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        grid-template-areas:
          "hero"
          "timeline"
          "transport"
          "utility";
        row-gap: 14px;
      }

      .frame::before {
        top: calc(var(--pad-y) * 0.16 + var(--safe-top));
      }

      .hero-inner {
        grid-template-columns: minmax(0, 1fr);
        justify-items: center;
        text-align: center;
        padding-top: 38px;
      }

      .art-wrap { justify-self: center; }

      .meta {
        justify-items: center;
        align-content: start;
      }

      .track-name { max-width: min(100%, 12ch); }

      .meta-top,
      .artist-name {
        white-space: normal;
        text-overflow: initial;
      }

      .transport-row { grid-template-columns: minmax(0, 1fr); }

      .controls {
        width: 100%;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .volume-wrap {
        width: 100%;
        max-width: none;
        justify-self: stretch;
      }

      .utility-row {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        padding-bottom: 28px;
      }

      .secondary-btn { width: clamp(56px, 18vw, 72px); }
    }

    @media (max-width: 640px) {
      :root {
        --title-size: clamp(28px, 8vw, 48px);
        --artist-size: clamp(15px, 4.7vw, 22px);
      }

      .screen::after { opacity: 0.14; }
      .frame { gap: 12px; }
      .track-name { -webkit-line-clamp: 4; }
      .controls { gap: 8px; }
      .ctrl { height: 62px; }
      .utility-row { gap: 8px; }
      .secondary-btn { height: 54px; }
      .overlay-actions { grid-template-columns: 1fr; }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      :root {
        --pad-y: 10px;
        --art-size: min(28vh, 178px);
        --title-size: clamp(28px, 7vh, 50px);
        --artist-size: clamp(14px, 3.8vh, 20px);
      }

      .frame { gap: 10px; }
      .ctrl { height: 54px; }
      .secondary-btn { height: 50px; }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Spotify remote dashboard">
    <img id="bgArt" class="bg-art" alt="" aria-hidden="true" />
    <div class="bg-vignette"></div>

    <div class="frame">
      <section class="hero" aria-live="polite">
        <div class="hero-inner">
          <div class="art-wrap">
            <img id="albumArt" class="album-art" alt="Album art" />
          </div>

          <div class="meta">
            <div id="metaTop" class="meta-top">Spotify</div>
            <h1 id="trackName" class="track-name">Nothing playing</h1>
            <p id="artistName" class="artist-name">Sign in and start playback</p>
          </div>
        </div>
      </section>

      <section class="timeline-section" aria-label="Track timeline and progress">
        <input id="timeline" type="range" min="0" max="1000" value="0" step="1" aria-label="Track timeline" />
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </section>

      <section class="transport-row" aria-label="Playback controls and volume">
        <div class="controls" role="group" aria-label="Playback controls">
          <button id="prevBtn" class="ctrl prev" type="button" aria-label="Previous track" disabled>
            <svg viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
              <rect x="10" y="14" width="6" height="36" rx="2"></rect>
              <path d="M46 16.5v31L22 32z"></path>
            </svg>
          </button>

          <button id="playPauseBtn" class="ctrl play" type="button" aria-label="Play or pause" disabled>
            <svg id="playPauseIcon" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
              <rect x="18" y="14" width="9" height="36" rx="2"></rect>
              <rect x="37" y="14" width="9" height="36" rx="2"></rect>
            </svg>
          </button>

          <button id="nextBtn" class="ctrl next" type="button" aria-label="Next track" disabled>
            <svg viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
              <rect x="48" y="14" width="6" height="36" rx="2"></rect>
              <path d="M18 16.5v31L42 32z"></path>
            </svg>
          </button>

          <button id="heartBtn" class="ctrl heart" type="button" aria-label="Save to library" disabled>
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M32 50s-15-9.4-20.5-19.1C7.4 23.8 10.3 15 19.2 15c5.4 0 9.2 3 12.8 8 3.6-5 7.4-8 12.8-8 8.9 0 11.8 8.8 7.7 15.9C47 40.6 32 50 32 50z"></path>
            </svg>
          </button>
        </div>

        <div class="volume-wrap" aria-label="Volume controls">
          <button id="muteBtn" class="volume-btn" type="button" aria-label="Mute or restore volume">
            <svg id="volumeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
            </svg>
          </button>
          <input id="volumeSlider" type="range" min="0" max="100" value="80" step="1" aria-label="Volume" />
        </div>
      </section>

      <section class="utility-row" aria-label="Playback actions">
        <button id="audioBtn" class="secondary-btn" type="button" aria-label="Audio" title="Audio" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          </svg>
          <span class="mini-dot" aria-hidden="true"></span>
        </button>
        <button id="useDeviceBtn" class="secondary-btn" type="button" aria-label="Use this device" title="Use this device" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2v10"></path>
            <path d="M6.2 5.8a8 8 0 1 0 11.6 0"></path>
          </svg>
        </button>
        <button id="fullscreenBtn" class="secondary-btn" type="button" aria-label="Toggle full screen" title="Toggle full screen">
          <svg id="fullscreenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3H3v5"></path>
            <path d="M16 3h5v5"></path>
            <path d="M21 16v5h-5"></path>
            <path d="M3 16v5h5"></path>
          </svg>
        </button>
        <div id="statusLive" class="sr-only" aria-live="polite">Waiting for Spotify</div>
      </section>
    </div>

    <div id="overlay" class="overlay show" aria-live="polite">
      <div class="overlay-card">
        <h2 id="overlayTitle" class="overlay-title">Connect Spotify</h2>
        <p id="overlayCopy" class="overlay-copy">Sign in once, then the dashboard keeps your session in this browser until you sign out, clear site data, or revoke the app.</p>
        <div class="overlay-actions">
          <button id="loginBtn" class="overlay-btn primary" type="button">Sign in</button>
          <button id="activateOverlayBtn" class="overlay-btn hidden" type="button">Activate audio</button>
          <button id="useDeviceOverlayBtn" class="overlay-btn hidden" type="button">Use this device</button>
          <button id="closeOverlayBtn" class="overlay-btn hidden" type="button">Close</button>
        </div>
      </div>
    </div>
  </main>

  <button id="signOutMiniBtn" class="icon-mini-btn hidden" type="button" aria-label="Sign out" hidden></button>
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script>
    const APP_CONFIG = Object.freeze({
      CLIENT_ID: 'bfade0ed83a54868834c9c7a6cdb690f',
      DEVICE_NAME: 'Sp0tify',
      REDIRECT_URI: 'https://n0bi.github.io/sp0tify/'
    });

    const STORAGE_KEYS = {
      accessToken: 'spotify_car_ui_access_token',
      refreshToken: 'spotify_car_ui_refresh_token',
      expiresAt: 'spotify_car_ui_expires_at',
      codeVerifier: 'spotify_car_ui_code_verifier',
      oauthState: 'spotify_car_ui_oauth_state',
      overlayDismissed: 'spotify_car_ui_overlay_dismissed',
      volume: 'spotify_car_ui_volume',
      previousVolume: 'spotify_car_ui_previous_volume'
    };

    const SCOPES = [
      'streaming',
      'user-read-playback-state',
      'user-modify-playback-state',
      'user-read-currently-playing',
      'user-library-read',
      'user-library-modify'
    ];

    const DEFAULT_ART = `data:image/svg+xml;utf8,${encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
        <defs>
          <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop stop-color="#4a2327"/>
            <stop offset="1" stop-color="#120809"/>
          </linearGradient>
        </defs>
        <rect width="800" height="800" fill="url(#g)"/>
        <rect x="130" y="130" width="540" height="540" rx="18" fill="rgba(240,228,210,0.06)" stroke="rgba(240,228,210,0.22)"/>
        <circle cx="400" cy="400" r="170" fill="rgba(0,0,0,0.2)" stroke="rgba(240,228,210,0.22)" stroke-width="16"/>
        <circle cx="400" cy="400" r="52" fill="#111" stroke="rgba(240,228,210,0.22)" stroke-width="10"/>
      </svg>
    `)}`;

    const els = {
      statusLive: document.getElementById('statusLive'),
      signOutMiniBtn: document.getElementById('signOutMiniBtn'),
      bgArt: document.getElementById('bgArt'),
      albumArt: document.getElementById('albumArt'),
      metaTop: document.getElementById('metaTop'),
      trackName: document.getElementById('trackName'),
      artistName: document.getElementById('artistName'),
      currentTime: document.getElementById('currentTime'),
      totalTime: document.getElementById('totalTime'),
      timeline: document.getElementById('timeline'),
      prevBtn: document.getElementById('prevBtn'),
      playPauseBtn: document.getElementById('playPauseBtn'),
      playPauseIcon: document.getElementById('playPauseIcon'),
      nextBtn: document.getElementById('nextBtn'),
      heartBtn: document.getElementById('heartBtn'),
      muteBtn: document.getElementById('muteBtn'),
      volumeIcon: document.getElementById('volumeIcon'),
      volumeSlider: document.getElementById('volumeSlider'),
      audioBtn: document.getElementById('audioBtn'),
      useDeviceBtn: document.getElementById('useDeviceBtn'),
      fullscreenBtn: document.getElementById('fullscreenBtn'),
      fullscreenIcon: document.getElementById('fullscreenIcon'),
      overlay: document.getElementById('overlay'),
      overlayTitle: document.getElementById('overlayTitle'),
      overlayCopy: document.getElementById('overlayCopy'),
      loginBtn: document.getElementById('loginBtn'),
      activateOverlayBtn: document.getElementById('activateOverlayBtn'),
      useDeviceOverlayBtn: document.getElementById('useDeviceOverlayBtn'),
      closeOverlayBtn: document.getElementById('closeOverlayBtn')
    };

    const state = {
      player: null,
      deviceId: null,
      sdkReady: false,
      ready: false,
      activated: false,
      playbackState: null,
      refreshPromise: null,
      likeRequest: null,
      currentUri: '',
      currentLiked: false,
      seeking: false,
      timelineTimer: null,
      lastPlayerSnapshotAt: 0,
      redirectMismatch: false,
      volumeSyncPending: null,
      volume: 0.8,
      previousVolume: 0.8
    };

    function setSaved(key, value) { localStorage.setItem(key, value); }
    function getSaved(key) { return localStorage.getItem(key) || ''; }
    function removeSaved(key) { localStorage.removeItem(key); }

    function hasTokens() {
      return !!getSaved(STORAGE_KEYS.accessToken) && !!getSaved(STORAGE_KEYS.refreshToken);
    }

    function formatTime(ms) {
      if (!Number.isFinite(ms) || ms < 0) return '0:00';
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function randomString(length = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);
      let output = '';
      for (let i = 0; i < bytes.length; i++) output += chars[bytes[i] % chars.length];
      return output;
    }

    async function sha256(message) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(message));
    }

    function base64UrlEncode(buffer) {
      const bytes = new Uint8Array(buffer);
      let text = '';
      for (let i = 0; i < bytes.length; i++) text += String.fromCharCode(bytes[i]);
      return btoa(text).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function updateRangeVisual(input) {
      const min = Number(input.min || 0);
      const max = Number(input.max || 100);
      const value = Number(input.value || 0);
      const percent = max > min ? ((value - min) / (max - min)) * 100 : 0;
      input.style.setProperty('--progress', `${percent}%`);
    }

    function normalizeUrl(rawUrl) {
      const url = new URL(rawUrl, location.origin);
      let path = url.pathname.replace(/index\.html$/i, '');
      if (!path.endsWith('/')) path += '/';
      return `${url.origin}${path}`;
    }

    function setStatus(message, tone = 'warn') {
      if (els.statusLive) els.statusLive.textContent = message;
      if (els.audioBtn) {
        els.audioBtn.dataset.statusTone = tone;
        els.audioBtn.title = message;
      }
    }

    function setOverlay(mode) {
      const show = mode !== 'hidden';
      els.overlay.classList.toggle('show', show);

      els.loginBtn.classList.add('hidden');
      els.activateOverlayBtn.classList.add('hidden');
      els.useDeviceOverlayBtn.classList.add('hidden');
      els.closeOverlayBtn.classList.add('hidden');

      if (mode === 'signin') {
        els.overlayTitle.textContent = 'Connect Spotify';
        els.overlayCopy.textContent = 'Sign in once, then this browser can keep the session for quick access.';
        els.loginBtn.classList.remove('hidden');
      } else if (mode === 'activate') {
        els.overlayTitle.textContent = 'Activate audio';
        els.overlayCopy.textContent = 'This browser needs one tap so Spotify can transfer playback here cleanly.';
        els.activateOverlayBtn.classList.remove('hidden');
      } else if (mode === 'transfer') {
        els.overlayTitle.textContent = 'Use this device';
        els.overlayCopy.textContent = 'Spotify is ready. Transfer playback to this dashboard to control the current song here.';
        els.useDeviceOverlayBtn.classList.remove('hidden');
        els.closeOverlayBtn.classList.remove('hidden');
      }
    }

    function updateTransportButtons(enabled) {
      els.prevBtn.disabled = !enabled;
      els.playPauseBtn.disabled = !enabled;
      els.nextBtn.disabled = !enabled;
      els.timeline.disabled = !enabled;
      els.heartBtn.disabled = !enabled;
      els.volumeSlider.disabled = !enabled || !state.player;
      els.muteBtn.disabled = !enabled || !state.player;
    }

    function updateAudioButton() {
      if (!els.audioBtn) return;
      els.audioBtn.classList.toggle('active', !!state.activated);
      els.audioBtn.setAttribute('aria-pressed', state.activated ? 'true' : 'false');
      els.audioBtn.setAttribute('title', state.activated ? 'Audio active' : 'Activate audio');
    }

    function updateAuxButtons() {
      const authed = hasTokens();
      els.signOutMiniBtn.classList.toggle('hidden', !authed);
      els.audioBtn.disabled = !authed || !state.player;
      els.useDeviceBtn.disabled = !authed || !state.deviceId;
      updateAudioButton();
    }

    function syncFullscreenButton() {
      if (!els.fullscreenBtn) return;
      const supported = !!document.fullscreenEnabled && typeof document.documentElement.requestFullscreen === 'function';
      els.fullscreenBtn.disabled = !supported;
      els.fullscreenBtn.setAttribute('aria-label', document.fullscreenElement ? 'Exit full screen' : 'Enter full screen');
      els.fullscreenBtn.setAttribute('title', document.fullscreenElement ? 'Exit full screen' : 'Enter full screen');
      if (els.fullscreenIcon) {
        els.fullscreenIcon.innerHTML = document.fullscreenElement
          ? '<path d="M9 9H4V4"></path><path d="M15 9h5V4"></path><path d="M15 15h5v5"></path><path d="M9 15H4v5"></path>'
          : '<path d="M8 3H3v5"></path><path d="M16 3h5v5"></path><path d="M21 16v5h-5"></path><path d="M3 16v5h5"></path>';
      }
    }

    async function toggleFullscreen() {
      if (!document.fullscreenEnabled || typeof document.documentElement.requestFullscreen !== 'function') {
        setStatus('Full screen is not available in this browser', 'warn');
        return;
      }

      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen?.();
        } else {
          await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
        }
      } catch (error) {
        setStatus(`Full screen failed: ${error.message}`, 'error');
      } finally {
        syncFullscreenButton();
      }
    }

    function setPlayPauseVisual(isPaused) {
      if (isPaused) {
        els.playPauseIcon.innerHTML = '<path d="M22 14.5v35L48 32 22 14.5z" fill="currentColor"></path>';
      } else {
        els.playPauseIcon.innerHTML = '<rect x="18" y="14" width="9" height="36" rx="2"></rect><rect x="37" y="14" width="9" height="36" rx="2"></rect>';
      }
    }

    function setHeartVisual(active) {
      state.currentLiked = !!active;
      els.heartBtn.classList.toggle('active', !!active);
      const svg = els.heartBtn.querySelector('svg');
      if (active) {
        svg.setAttribute('fill', 'currentColor');
        svg.setAttribute('stroke', 'currentColor');
      } else {
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
      }
    }

    function setVolumeIcon(volume) {
      if (volume <= 0.001) {
        els.volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
      } else if (volume < 0.5) {
        els.volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path>';
      } else {
        els.volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path>';
      }
    }

    function setVolumeUI(volume, persist = true) {
      const bounded = Math.max(0, Math.min(1, Number.isFinite(volume) ? volume : 0.8));
      state.volume = bounded;
      els.volumeSlider.value = String(Math.round(bounded * 100));
      updateRangeVisual(els.volumeSlider);
      setVolumeIcon(bounded);
      if (persist) setSaved(STORAGE_KEYS.volume, String(bounded));
      if (bounded > 0.001 && persist) setSaved(STORAGE_KEYS.previousVolume, String(bounded));
    }

    function loadSavedVolume() {
      const savedVolume = Number(getSaved(STORAGE_KEYS.volume));
      const savedPrevious = Number(getSaved(STORAGE_KEYS.previousVolume));
      state.volume = Number.isFinite(savedVolume) && savedVolume >= 0 && savedVolume <= 1 ? savedVolume : 0.8;
      state.previousVolume = Number.isFinite(savedPrevious) && savedPrevious > 0 && savedPrevious <= 1 ? savedPrevious : Math.max(state.volume, 0.8);
      setVolumeUI(state.volume, false);
    }

    async function syncPlayerVolume(volume) {
      if (!state.player) return;
      if (state.volumeSyncPending) return state.volumeSyncPending = state.volumeSyncPending.then(() => state.player.setVolume(volume)).catch(() => state.player.setVolume(volume));
      state.volumeSyncPending = state.player.setVolume(volume)
        .catch((error) => {
          setStatus(`Volume failed: ${error.message}`, 'error');
        })
        .finally(() => {
          state.volumeSyncPending = null;
        });
      return state.volumeSyncPending;
    }

    async function applyVolume(volume) {
      setVolumeUI(volume);
      if (volume > 0.001) state.previousVolume = volume;
      if (state.player) await syncPlayerVolume(state.volume);
    }

    function clearTrack() {
      els.albumArt.src = DEFAULT_ART;
      els.bgArt.src = DEFAULT_ART;
      els.trackName.textContent = 'Nothing playing';
      els.artistName.textContent = 'Sign in and start playback';
      els.metaTop.textContent = 'Spotify';
      els.currentTime.textContent = '0:00';
      els.totalTime.textContent = '0:00';
      els.timeline.value = 0;
      updateRangeVisual(els.timeline);
      setHeartVisual(false);
      setPlayPauseVisual(true);
      updateTransportButtons(false);
    }

    function deriveNowPosition() {
      if (!state.playbackState) return 0;
      const duration = state.playbackState.duration || state.playbackState.track_window?.current_track?.duration_ms || 0;
      if (state.playbackState.paused) return Math.min(state.playbackState.position || 0, duration);
      const elapsed = Date.now() - state.lastPlayerSnapshotAt;
      return Math.min((state.playbackState.position || 0) + elapsed, duration);
    }

    function renderProgress() {
      const playback = state.playbackState;
      if (!playback) return;
      const duration = playback.duration || playback.track_window?.current_track?.duration_ms || 0;
      const position = deriveNowPosition();
      els.currentTime.textContent = formatTime(position);
      els.totalTime.textContent = formatTime(duration);
      if (!state.seeking) {
        els.timeline.max = duration > 0 ? String(duration) : '1000';
        els.timeline.value = String(Math.min(position, duration || 1000));
        updateRangeVisual(els.timeline);
      }
    }

    function startProgressLoop() {
      if (state.timelineTimer) clearInterval(state.timelineTimer);
      state.timelineTimer = setInterval(renderProgress, 250);
    }

    async function beginLogin() {
      const verifier = randomString(96);
      const challenge = base64UrlEncode(await sha256(verifier));
      const oauthState = randomString(24);

      setSaved(STORAGE_KEYS.codeVerifier, verifier);
      setSaved(STORAGE_KEYS.oauthState, oauthState);

      const params = new URLSearchParams({
        client_id: APP_CONFIG.CLIENT_ID,
        response_type: 'code',
        redirect_uri: APP_CONFIG.REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        scope: SCOPES.join(' '),
        state: oauthState,
        show_dialog: 'false'
      });

      location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const verifier = getSaved(STORAGE_KEYS.codeVerifier);
      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: APP_CONFIG.CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: APP_CONFIG.REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error_description || data.error || 'Token exchange failed');
      }

      setSaved(STORAGE_KEYS.accessToken, data.access_token);
      if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
      setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
      removeSaved(STORAGE_KEYS.codeVerifier);
      removeSaved(STORAGE_KEYS.oauthState);
    }

    async function refreshAccessToken() {
      if (state.refreshPromise) return state.refreshPromise;
      const refreshToken = getSaved(STORAGE_KEYS.refreshToken);
      if (!refreshToken) throw new Error('Missing refresh token');

      state.refreshPromise = fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: refreshToken,
          client_id: APP_CONFIG.CLIENT_ID
        })
      })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error_description || data.error || 'Token refresh failed');
        }
        setSaved(STORAGE_KEYS.accessToken, data.access_token);
        setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
        if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
        return data.access_token;
      })
      .finally(() => {
        state.refreshPromise = null;
      });

      return state.refreshPromise;
    }

    async function getValidToken() {
      const token = getSaved(STORAGE_KEYS.accessToken);
      const expiresAt = Number(getSaved(STORAGE_KEYS.expiresAt) || 0);
      if (token && Date.now() < expiresAt) return token;
      return refreshAccessToken();
    }

    async function spotifyFetch(path, options = {}) {
      const token = await getValidToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';

      const response = await fetch(`https://api.spotify.com${path}`, {
        ...options,
        headers
      });

      if (response.status === 204) return null;

      const text = await response.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) { data = text; }

      if (!response.ok) {
        const message = data?.error?.message || data?.error_description || `Spotify API error ${response.status}`;
        throw new Error(message);
      }

      return data;
    }

    async function syncLikedState(uri) {
      if (!uri) {
        setHeartVisual(false);
        els.heartBtn.disabled = true;
        return;
      }

      try {
        const result = await spotifyFetch(`/v1/me/library/contains?uris=${encodeURIComponent(uri)}`);
        const liked = Array.isArray(result) ? !!result[0] : false;
        setHeartVisual(liked);
        els.heartBtn.disabled = false;
      } catch (error) {
        setHeartVisual(false);
        setStatus(`Library check failed: ${error.message}`, 'error');
      }
    }

    async function toggleLike() {
      const uri = state.currentUri;
      if (!uri || state.likeRequest) return;

      state.likeRequest = (async () => {
        try {
          if (state.currentLiked) {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'DELETE' });
            setHeartVisual(false);
          } else {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'PUT' });
            setHeartVisual(true);
          }
        } catch (error) {
          setStatus(`Like update failed: ${error.message}`, 'error');
        } finally {
          state.likeRequest = null;
        }
      })();

      return state.likeRequest;
    }

    function updateTrackFromState(playbackState) {
      if (!playbackState || !playbackState.track_window?.current_track) return;
      const current = playbackState.track_window.current_track;
      const image = current.album?.images?.[0]?.url || DEFAULT_ART;
      const artist = (current.artists || []).map(artist => artist.name).join(', ');
      const contextName = playbackState.context?.metadata?.context_description || current.album?.name || 'Spotify';

      els.albumArt.src = image;
      els.bgArt.src = image;
      els.trackName.textContent = current.name || 'Unknown track';
      els.artistName.textContent = artist || 'Unknown artist';
      els.metaTop.textContent = contextName;
      setPlayPauseVisual(!!playbackState.paused);

      const newUri = current.uri || '';
      if (newUri && newUri !== state.currentUri) {
        state.currentUri = newUri;
        syncLikedState(newUri);
      }

      updateTransportButtons(true);
      renderProgress();
    }

    async function hydratePlaybackState() {
      if (!state.player) return;
      try {
        const playbackState = await state.player.getCurrentState();
        if (!playbackState) return;
        state.playbackState = playbackState;
        state.lastPlayerSnapshotAt = Date.now();
        updateTrackFromState(playbackState);
        setStatus('Ready', 'good');
      } catch (error) {
        console.error(error);
      }
    }

    async function activateAudio() {
      if (!state.player) return;
      try {
        await state.player.activateElement();
        state.activated = true;
        updateAudioButton();
        setStatus('Audio activated', 'good');
        setOverlay(state.deviceId ? 'transfer' : 'hidden');
      } catch (error) {
        state.activated = false;
        updateAudioButton();
        setStatus(`Audio activation failed: ${error.message}`, 'error');
      }
    }

    async function transferPlayback() {
      if (!state.deviceId) {
        setStatus('Spotify device is not ready', 'warn');
        return;
      }
      try {
        await spotifyFetch('/v1/me/player', {
          method: 'PUT',
          body: JSON.stringify({ device_ids: [state.deviceId], play: true })
        });
        setStatus('Playback transferred', 'good');
        setOverlay('hidden');
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        await new Promise(resolve => setTimeout(resolve, 900));
        await hydratePlaybackState();
      } catch (error) {
        setStatus(`Transfer failed: ${error.message}`, 'error');
      }
    }

    function signOut() {
      [
        STORAGE_KEYS.accessToken,
        STORAGE_KEYS.refreshToken,
        STORAGE_KEYS.expiresAt,
        STORAGE_KEYS.codeVerifier,
        STORAGE_KEYS.oauthState,
        STORAGE_KEYS.overlayDismissed
      ].forEach(removeSaved);

      if (state.player) {
        try { state.player.disconnect(); } catch (_) {}
      }

      state.player = null;
      state.deviceId = null;
      state.ready = false;
      state.activated = false;
      state.playbackState = null;
      state.currentUri = '';
      state.currentLiked = false;
      updateAuxButtons();
      clearTrack();
      updateAudioButton();
      setOverlay('signin');
      setStatus('Signed out', 'warn');
    }

    function installPlayer() {
      if (!window.Spotify || state.player || !hasTokens()) {
        updateAuxButtons();
        return;
      }

      state.player = new Spotify.Player({
        name: APP_CONFIG.DEVICE_NAME,
        getOAuthToken: async (cb) => {
          try {
            cb(await getValidToken());
          } catch (error) {
            setStatus(`Token error: ${error.message}`, 'error');
          }
        },
        volume: state.volume,
        enableMediaSession: true
      });

      state.player.addListener('ready', async ({ device_id }) => {
        state.deviceId = device_id;
        state.ready = true;
        updateAuxButtons();
        updateTransportButtons(true);
        updateAudioButton();
        setStatus('Spotify ready', 'good');
        await syncPlayerVolume(state.volume);

        if (!state.activated) {
          const dismissed = getSaved(STORAGE_KEYS.overlayDismissed) === '1';
          setOverlay(dismissed ? 'hidden' : 'activate');
        }

        try {
          await transferPlayback();
        } catch (_) {}
      });

      state.player.addListener('not_ready', () => {
        state.ready = false;
        updateAuxButtons();
        setStatus('Spotify device offline', 'warn');
      });

      state.player.addListener('player_state_changed', (playbackState) => {
        if (!playbackState) return;
        state.playbackState = playbackState;
        state.lastPlayerSnapshotAt = Date.now();
        updateTrackFromState(playbackState);
      });

      state.player.addListener('autoplay_failed', () => {
        setStatus('Tap Activate audio', 'warn');
        setOverlay('activate');
      });

      state.player.addListener('initialization_error', ({ message }) => setStatus(`Initialization error: ${message}`, 'error'));
      state.player.addListener('authentication_error', ({ message }) => setStatus(`Authentication error: ${message}`, 'error'));
      state.player.addListener('account_error', ({ message }) => setStatus(`Account error: ${message}`, 'error'));
      state.player.addListener('playback_error', ({ message }) => setStatus(`Playback error: ${message}`, 'error'));

      state.player.connect().then(success => {
        if (!success) {
          setStatus('Spotify player could not connect', 'error');
          return;
        }
        updateAuxButtons();
      });
    }

    async function maybeHandleAuthRedirect() {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const incomingState = params.get('state');
      const error = params.get('error');

      if (normalizeUrl(location.href) !== normalizeUrl(APP_CONFIG.REDIRECT_URI)) {
        state.redirectMismatch = true;
      }

      if (error) {
        setStatus(`Spotify login failed: ${error}`, 'error');
        if (state.redirectMismatch) {
          setStatus('Redirect URI mismatch: this page is not the configured callback', 'error');
        }
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      if (!code) {
        if (state.redirectMismatch && !hasTokens()) {
          setStatus('Redirect URI is hardcoded to a different page', 'warn');
        }
        return;
      }

      const expectedState = getSaved(STORAGE_KEYS.oauthState);
      if (!incomingState || incomingState !== expectedState) {
        setStatus('Spotify login failed: invalid state', 'error');
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      try {
        setStatus('Finishing Spotify login', 'warn');
        await exchangeCodeForToken(code);
        history.replaceState({}, document.title, location.pathname);
        setStatus('Spotify login complete', 'good');
        setSaved(STORAGE_KEYS.overlayDismissed, '0');
      } catch (error) {
        setStatus(`Spotify login failed: ${error.message}`, 'error');
        history.replaceState({}, document.title, location.pathname);
      }
    }

    function attachEvents() {
      els.loginBtn.addEventListener('click', beginLogin);
      els.audioBtn.addEventListener('click', activateAudio);
      els.activateOverlayBtn.addEventListener('click', activateAudio);
      els.useDeviceBtn.addEventListener('click', transferPlayback);
      els.useDeviceOverlayBtn.addEventListener('click', transferPlayback);
      els.fullscreenBtn.addEventListener('click', toggleFullscreen);
      els.closeOverlayBtn.addEventListener('click', () => {
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        setOverlay('hidden');
      });
      els.signOutMiniBtn.addEventListener('click', signOut);

      els.prevBtn.addEventListener('click', async () => {
        if (!state.player) return;
        try { await state.player.previousTrack(); } catch (error) { setStatus(`Previous failed: ${error.message}`, 'error'); }
      });

      els.playPauseBtn.addEventListener('click', async () => {
        if (!state.player) return;
        try { await state.player.togglePlay(); } catch (error) { setStatus(`Play or pause failed: ${error.message}`, 'error'); }
      });

      els.nextBtn.addEventListener('click', async () => {
        if (!state.player) return;
        try { await state.player.nextTrack(); } catch (error) { setStatus(`Next failed: ${error.message}`, 'error'); }
      });

      els.heartBtn.addEventListener('click', toggleLike);

      els.timeline.addEventListener('input', () => {
        state.seeking = true;
        updateRangeVisual(els.timeline);
        els.currentTime.textContent = formatTime(Number(els.timeline.value));
      });

      const finishSeek = async () => {
        if (!state.player || !state.seeking) return;
        state.seeking = false;
        try {
          await state.player.seek(Number(els.timeline.value));
          await hydratePlaybackState();
        } catch (error) {
          setStatus(`Seek failed: ${error.message}`, 'error');
        }
      };

      els.timeline.addEventListener('change', finishSeek);
      els.timeline.addEventListener('pointerup', finishSeek);
      els.timeline.addEventListener('touchend', finishSeek);

      els.volumeSlider.addEventListener('input', () => {
        const volume = Number(els.volumeSlider.value) / 100;
        setVolumeUI(volume);
      });

      const finishVolume = async () => {
        const volume = Number(els.volumeSlider.value) / 100;
        await applyVolume(volume);
      };

      els.volumeSlider.addEventListener('change', finishVolume);
      els.volumeSlider.addEventListener('pointerup', finishVolume);
      els.volumeSlider.addEventListener('touchend', finishVolume);

      els.muteBtn.addEventListener('click', async () => {
        const target = state.volume > 0.001 ? 0 : (state.previousVolume > 0.001 ? state.previousVolume : 0.8);
        await applyVolume(target);
      });

      document.addEventListener('fullscreenchange', syncFullscreenButton);
      document.addEventListener('fullscreenerror', () => setStatus('Full screen failed', 'error'));
    }

    window.onSpotifyWebPlaybackSDKReady = () => {
      state.sdkReady = true;
      installPlayer();
    };

    (async function init() {
      loadSavedVolume();
      clearTrack();
      updateRangeVisual(els.timeline);
      updateRangeVisual(els.volumeSlider);
      attachEvents();
      updateAuxButtons();
      updateAudioButton();
      syncFullscreenButton();
      startProgressLoop();
      await maybeHandleAuthRedirect();

      if (hasTokens()) {
        setStatus(state.redirectMismatch ? 'Stored session found' : 'Restoring session', 'warn');
        setOverlay('hidden');
      } else {
        setOverlay('signin');
      }

      if (window.Spotify) installPlayer();
    })();
  </script>
</body>
</html>
