    const liked = syncNowPlayingLikedState();
    const durationMs = displayDurationMs();
    const positionMs = state.npScrubbing ? state.npScrubMs : displayPositionMs();
    const progress = durationMs > 0 ? Math.max(0, Math.min(100, (positionMs / durationMs) * 100)) : 0;
    ui.nowView.innerHTML = `
      <div class="np-wrap">
        <div class="np-header">
          <span class="np-context" aria-hidden="true"></span>
          <button id="npLikeBtn" class="np-like" type="button" aria-label="${liked ? 'Remove from liked songs' : 'Save to liked songs'}" title="${liked ? 'Remove from liked songs' : 'Save to liked songs'}">
            <svg viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21s-6.9-4.35-9.43-8.83C.7 8.87 2.02 4.5 6.12 4.5c2.49 0 4.24 1.39 5.88 3.67 1.64-2.28 3.39-3.67 5.88-3.67 4.1 0 5.42 4.37 3.55 7.67C18.9 16.65 12 21 12 21z"></path></svg>
          </button>
        </div>
        <div class="np-main">
          <div class="np-text">
            <div class="np-title">${escapeHtml(currentTrackTitle())}</div>
            <div class="np-artist">${escapeHtml(currentArtist())}</div>
          </div>
        </div>
        <div class="np-bottom">
          <div class="np-bar"><span style="width:${progress}%"></span></div>
          <div class="np-times"><span class="np-current-time">${escapeHtml(formatTimeMs(positionMs))}</span><span class="np-total-time">${escapeHtml(formatTimeMs(durationMs))}</span></div>
        </div>
      </div>`;
    const barWrap = ui.nowView.querySelector('.np-bar');
    state.npElements.bar = ui.nowView.querySelector('.np-bar > span');
    state.npElements.currentTimeEl = ui.nowView.querySelector('.np-current-time');
    state.npElements.totalTimeEl = ui.nowView.querySelector('.np-total-time');
    bindNowPlayingSeek(barWrap);
    const likeBtn = ui.nowView.querySelector('#npLikeBtn');
    if (likeBtn) {
      likeBtn.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        state.npLikedTrackKey = currentLikeTrackKey();
        state.npLikedState = !state.npLikedState;
        updateNowPlayingLikeButton();
        clickLegacy(legacy.heartBtn);
        setTimeout(sync, 120);
      });
    }
    ui.nowView.classList.add('active');
    ui.menuView.classList.remove('active');
    updateVisualizer();
    updateNowPlayingDynamic();
    startNowPlayingLoop();
  }

  function render(){
    parseDevices();
    if (state.view === 'nowplaying') {
      renderNowPlaying();
      return;
    }
    if (state.view === 'devices') {
      renderMenuView('Devices', buildDeviceItems());
      return;
    }
    if (state.view === 'liked') {
      renderMenuView('Liked Songs', buildLikedItems());
      return;
    }
    renderMenuView('sp0tify', buildHomeItems());
  }

  function selectStep(direction){
    if (state.view === 'nowplaying') {
      const target = volumeValue() + (direction > 0 ? 4 : -4);
      if (legacy.volumeSlider) {
        legacy.volumeSlider.value = Math.max(0, Math.min(100, target));
        legacy.volumeSlider.dispatchEvent(new Event('input', { bubbles: true }));
        legacy.volumeSlider.dispatchEvent(new Event('change', { bubbles: true }));
      }
      setTimeout(render, 120);
      return;
    }
    state.selected += direction;
    clampIndex();
    render();
  }

  function activateSelection(){
    if (state.view === 'nowplaying') {
      return;
    }
    const item = state.menuItems[state.selected];
    if (!item || item.disabled) return;
    if (item.next === 'nowplaying') {
      state.view = 'nowplaying';
      render();
      return;
    }
    if (item.next === 'devices') {
      state.view = 'devices';
      refreshDevices();
      render();
      return;
    }
    if (item.next === 'liked') {
      openLikedSongs();
      return;
    }
    if (typeof item.action === 'function') {
      Promise.resolve(item.action()).then(() => {
        setTimeout(render, 80);
        setTimeout(sync, 220);
        setTimeout(render, 360);
      }).catch((error) => {
        console.warn('Selection action failed', error);
        setTimeout(render, 120);
      });
    }
  }

  function goMenu(){
    if (state.view === 'nowplaying') {
      clearNowPlayingCache();
      stopNowPlayingLoop();
    }
    if (state.view === 'home') {
      state.selected = 0;
      render();
      return;
    }
    state.view = 'home';
    state.selected = 0;
    render();
  }

  function refreshDevices(){
    clickLegacy(legacy.connectBtn);
    setTimeout(() => clickLegacy(legacy.refreshDevicesBtn), 40);
    setTimeout(() => { parseDevices(); render(); clickLegacy(legacy.closeDevicesBtn); }, 500);
    setTimeout(() => { parseDevices(); render(); clickLegacy(legacy.closeDevicesBtn); }, 1200);
  }

  async function toggleFullscreen(){
    const root = document.documentElement;
    const active = document.fullscreenElement || document.webkitFullscreenElement;
    try {
      if (active) {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        if (root.requestFullscreen) await root.requestFullscreen({ navigationUI: 'hide' }).catch(() => root.requestFullscreen());
        else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
      }
    } catch (_) {}
    setTimeout(render, 120);
  }

  function wheelGeometry(event){
    const rect = ui.wheel.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;
    return {
      rect,
      cx,
      cy,
      dx,
      dy,
      dist: Math.sqrt(dx * dx + dy * dy) / (rect.width / 2),
      angle: Math.atan2(dy, dx)
    };
  }

  function normalizeDelta(delta){
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    return delta;
  }

  function sectorFromAngle(angle){
    const deg = (angle * 180 / Math.PI + 360) % 360;
    if (deg >= 315 || deg < 45) return 'next';
    if (deg >= 45 && deg < 135) return 'play';
    if (deg >= 135 && deg < 225) return 'prev';
    return 'menu';
  }

  function handleSectorTap(sector){
    if (sector === 'menu') { goMenu(); return; }
    if (sector === 'prev') {
      if (typeof commandPrevious === 'function') {
        commandPrevious().then(() => { if (typeof refreshPlaybackSoon === 'function') return refreshPlaybackSoon(120); }).then(() => { render(); }).catch(() => clickLegacy(legacy.prevBtn));
      } else {
        clickLegacy(legacy.prevBtn);
      }
      return;
    }
    if (sector === 'next') {
      if (typeof commandNext === 'function') {
        commandNext().then(() => { if (typeof refreshPlaybackSoon === 'function') return refreshPlaybackSoon(120); }).then(() => { render(); }).catch(() => clickLegacy(legacy.nextBtn));
      } else {
        clickLegacy(legacy.nextBtn);
      }
      return;
    }
    if (sector === 'play') {
      if (typeof commandTogglePlay === 'function') {
        commandTogglePlay().then(() => { if (typeof refreshPlaybackSoon === 'function') return refreshPlaybackSoon(120); }).then(() => { render(); }).catch(() => clickLegacy(legacy.playPauseBtn));
      } else {
        clickLegacy(legacy.playPauseBtn);
      }
      return;
    }
  }

  function onWheelDown(event){
    if (event.target === ui.center) return;
    const g = wheelGeometry(event);
    if (g.dist > 1.14) return;
    state.gestureActive = true;
    state.pointerId = event.pointerId;
    state.startAngle = g.angle;
    state.lastAngle = g.angle;
    state.accum = 0;
    state.startX = event.clientX;
    state.startY = event.clientY;
    state.startT = Date.now();
    state.startDist = g.dist;
    state.moved = false;
    if (ui.wheel.setPointerCapture) ui.wheel.setPointerCapture(event.pointerId);
    event.preventDefault();
  }

  function onWheelMove(event){
    if (event.target === ui.center) return;
    if (!state.gestureActive || event.pointerId !== state.pointerId) return;
    const g = wheelGeometry(event);
    const delta = normalizeDelta(g.angle - state.lastAngle);
    state.lastAngle = g.angle;
    const travel = Math.hypot(event.clientX - state.startX, event.clientY - state.startY);
    if (travel > 10) state.moved = true;
    if (g.dist > 0.04) {
      state.accum += delta;
      const threshold = 0.095;
      while (Math.abs(state.accum) >= threshold) {
        const dir = state.accum > 0 ? 1 : -1;
        selectStep(dir);
        state.accum -= threshold * dir;
      }
    }
    event.preventDefault();
  }

  function onWheelUp(event){
    if (event.target === ui.center) return;
    if (!state.gestureActive || event.pointerId !== state.pointerId) return;
    const g = wheelGeometry(event);
    const duration = Date.now() - state.startT;
    const travel = Math.hypot(event.clientX - state.startX, event.clientY - state.startY);
    const tapish = travel < 14 && duration < 280;
    if (tapish) {
      if (g.dist <= 0.26) activateSelection();
      else handleSectorTap(sectorFromAngle(g.angle));
    }
    state.gestureActive = false;
    state.pointerId = null;
    state.accum = 0;
    event.preventDefault();
  }

  function installParallax(){ return; }

  ui.center.addEventListener('pointerdown', (event) => {
    event.preventDefault();
    event.stopPropagation();
  }, { passive: false });
  ui.center.addEventListener('pointerup', (event) => {
    event.preventDefault();
    event.stopPropagation();
    activateSelection();
  }, { passive: false });
  ui.center.addEventListener('click', (event) => {
    event.preventDefault();
    event.stopPropagation();
  });
  ui.wheel.addEventListener('pointerdown', onWheelDown, { passive: false });
  ui.wheel.addEventListener('pointermove', onWheelMove, { passive: false });
  ui.wheel.addEventListener('pointerup', onWheelUp, { passive: false });
  ui.wheel.addEventListener('pointercancel', onWheelUp, { passive: false });
  ui.wheel.addEventListener('contextmenu', (event) => event.preventDefault());

  document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') { selectStep(-1); event.preventDefault(); }
    else if (event.key === 'ArrowDown' || event.key === 'ArrowRight') { selectStep(1); event.preventDefault(); }
    else if (event.key === 'Enter' || event.key === ' ') { activateSelection(); event.preventDefault(); }
    else if (event.key === 'Escape' || event.key.toLowerCase() === 'm') { goMenu(); event.preventDefault(); }
  });

  function computeLightHash(){
    const devices = state.devices || [];
    const activeDevice = devices.find((device) => device.active);
    return [
      isAuthed(),
      currentTrackTitle(),
      currentArtist(),
      currentContext(),
      currentArt(),
      volumeValue(),
      isShuffleOn() ? 1 : 0,
      isAudioReady() ? 1 : 0,
      isUsingThisDevice() ? 1 : 0,
      isRemoteSelected() ? 1 : 0,
      isFullscreen() ? 1 : 0,
      isPaused() ? 1 : 0,
      legacy.recommendBtn && legacy.recommendBtn.classList.contains('active') ? 1 : 0,
      state.view,
      state.selected,
      state.menuOffset,
      state.likedTracks.length,
      devices.length,
      activeDevice ? activeDevice.id : ''
    ].join('|');
  }

  function sync(){
    syncPlaybackClock();
    const hash = computeLightHash();
    if (hash === state.lastRenderHash) return;
    state.lastRenderHash = hash;
    render();
  }

  attachLikedObserver();
  render();
  startNowPlayingLoop();
  setTimeout(refreshDevices, 400);
  setInterval(sync, 900);
  setTimeout(sync, 900);
  document.addEventListener('fullscreenchange', render);
  document.addEventListener('webkitfullscreenchange', render);
})();
</script>

</body>
</html>
