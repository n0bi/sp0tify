        const dark = [];
        const saturated = [];

        for (let i = 0; i < data.length; i += 16) {
          const alpha = data[i + 3];
          if (alpha < 40) continue;
          const sample = { r: data[i], g: data[i + 1], b: data[i + 2] };
          const { s, l } = rgbToHsl(sample.r, sample.g, sample.b);
          if (l < 0.035) continue;
          all.push(sample);
          if (l > 0.52) bright.push(sample);
          if (l < 0.28) dark.push(sample);
          if (s > 0.3) saturated.push(sample);
        }

        const fallback = { r: 104, g: 84, b: 126 };
        const base = averageColors(all, fallback);
        const brightMix = averageColors(bright, base);
        const darkMix = averageColors(dark, base);
        const saturatedMix = averageColors(saturated, brightMix);

        setBackgroundGradient({
          primary: base,
          secondary: saturatedMix,
          tertiary: darkMix,
          accent: brightMix
        });
        state.gradientArtSrc = src;
      } catch (error) {
        console.warn('Background palette extraction failed', error);
        setDefaultBackground();
      }
    }

          duration: item.duration_ms || 0,
          context: input.context ? { metadata: { context_description: item.album?.name || input.context.type || 'Spotify' } } : null,
          track_window: { current_track: {
            id: item.id,
            uri: item.uri,

            duration_ms: item.duration_ms,

      if (savedSelected) {
        const found = state.devices.find(device => device.id === savedSelected);
        if (found) {

        return;
      }
      const activeId = state.playbackDeviceId;
      const selectedId = state.selectedDeviceId;
      els.deviceList.innerHTML = state.devices.map(device => {
        const isSelected = selectedId && device.id === selectedId;
        const isActive = activeId && device.id === activeId;
        const isLocal = state.deviceId && device.id === state.deviceId;
        const chips = [
          `<span class="device-chip">${device.type || 'device'}</span>`,
          isActive ? '<span class="device-chip good">Active</span>' : '',
          isLocal ? '<span class="device-chip">This browser</span>' : '',
          isSelected ? '<span class="device-chip good">Selected</span>' : '',
          device.supports_volume === false ? '<span class="device-chip">No volume API</span>' : '',
          device.is_restricted ? '<span class="device-chip">Restricted</span>' : ''
        ].filter(Boolean).join('');
        return `
          <button class="device-item ${isSelected ? 'active' : ''}" type="button" data-device-id="${device.id || ''}" ${device.is_restricted || !device.id ? 'disabled' : ''}>
            <div class="device-item-head">
              <span>${device.name || 'Unnamed device'}</span>
            </div>
            <div class="device-item-meta">${chips}</div>
          </button>

      }).join('');
      els.deviceList.querySelectorAll('[data-device-id]').forEach(button => {
        button.addEventListener('click', async () => {
          playUiClick();

            await hydratePlaybackState();
            syncPlaybackFlags().catch(() => {});
          } catch (error) {
            setStatus(`Device selection failed: ${error.message}`, 'error');
          }
        });
      });

      if (isPaused) {
        els.playPauseIcon.innerHTML = '<path d="M22 14.5v35L48 32 22 14.5z" fill="currentColor"></path>';
      } else {
        els.playPauseIcon.innerHTML = '<rect x="18" y="14" width="9" height="36" rx="2"></rect><rect x="37" y="14" width="9" height="36" rx="2"></rect>';
      }
    }

    function setHeartVisual(active) {
      state.currentLiked = !!active;
      els.heartBtn.classList.toggle('active', !!active);
      const svg = els.heartBtn.querySelector('svg');
      if (active) {
        svg.setAttribute('fill', 'currentColor');
        svg.setAttribute('stroke', 'currentColor');

        svg.setAttribute('stroke', 'currentColor');

    function setShuffleVisual(active) {
      state.shuffleEnabled = !!active;
      els.shuffleBtn.classList.toggle('active', !!active);

      els.shuffleBtn.setAttribute('title', active ? 'Shuffle on' : 'Shuffle off');
      els.shuffleBtn.setAttribute('aria-label', active ? 'Shuffle on' : 'Shuffle off');

    function setRecommendVisual(active) {
      state.discoveryQueued = !!active;
      els.recommendBtn.classList.toggle('active', !!active);
      els.recommendBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
      els.recommendBtn.setAttribute('title', active ? 'Recommended track queued' : 'Queue a recommended track');
      els.recommendBtn.setAttribute('aria-label', active ? 'Recommended track queued' : 'Queue a recommended track');
    }

    function setVolumeIcon(volume) {
      if (volume <= 0.001) {
        els.volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
      } else if (volume < 0.5) {
        els.volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path>';
      } else {
        els.volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path>';
      }
    }

    function setVolumeUI(volume, persist = true) {
      const bounded = Math.max(0, Math.min(1, Number.isFinite(volume) ? volume : 0.8));
      state.volume = bounded;
      els.volumeSlider.value = String(Math.round(bounded * 100));
      updateRangeVisual(els.volumeSlider);
      setVolumeIcon(bounded);
      if (persist) setSaved(STORAGE_KEYS.volume, String(bounded));
      if (bounded > 0.001 && persist) setSaved(STORAGE_KEYS.previousVolume, String(bounded));
    }

    function syncVolumeFromPlaybackDevice(device = null, persist = false) {
      if (!device || !Number.isFinite(device.volume_percent)) return;
      const nextVolume = Math.max(0, Math.min(1, device.volume_percent / 100));
      setVolumeUI(nextVolume, persist);
      if (nextVolume > 0.001) state.previousVolume = nextVolume;
    }

    function loadSavedVolume() {
      const savedVolume = Number(getSaved(STORAGE_KEYS.volume));
      const savedPrevious = Number(getSaved(STORAGE_KEYS.previousVolume));
      state.volume = Number.isFinite(savedVolume) && savedVolume >= 0 && savedVolume <= 1 ? savedVolume : 0.8;
      state.previousVolume = Number.isFinite(savedPrevious) && savedPrevious > 0 && savedPrevious <= 1 ? savedPrevious : Math.max(state.volume, 0.8);
      setVolumeUI(state.volume, false);
    }

    async function syncPlayerVolume(volume) {
      if (!state.player) return;
      if (state.volumeSyncPending) return state.volumeSyncPending = state.volumeSyncPending.then(() => state.player.setVolume(volume)).catch(() => state.player.setVolume(volume));
      state.volumeSyncPending = state.player.setVolume(volume)
        .catch((error) => {
          setStatus(`Volume failed: ${error.message}`, 'error');
        })
        .finally(() => {
          state.volumeSyncPending = null;
        });
      return state.volumeSyncPending;
    }

    async function applyVolume(volume) {
      setVolumeUI(volume);
      if (volume > 0.001) state.previousVolume = volume;
      try {
        await commandSetVolume(state.volume);
        syncPlaybackFlags().catch(() => {});
      } catch (error) {
        setStatus(`Volume failed: ${error.message}`, 'error');
      }
    }

    function clearTrack() {
      els.albumArt.src = DEFAULT_ART;
      els.bgArt.src = DEFAULT_ART;
      setDefaultBackground();
      els.trackName.textContent = 'Nothing playing';
      els.artistName.textContent = 'Sign in and start playback';
      els.metaTop.textContent = 'sp0tify';
      els.currentTime.textContent = '0:00';
      els.totalTime.textContent = '0:00';
      els.timeline.value = 0;
      updateRangeVisual(els.timeline);
      setHeartVisual(false);
      setShuffleVisual(false);
      setRecommendVisual(false);
      setPlayPauseVisual(true);
      updatePlaybackDeviceInfo(null);
      updateTransportButtons(false);
    }

    function resetPlaybackProgressUI(position = 0, duration = null) {
      const safePos = Math.max(0, Math.round(position || 0));
      const derivedDuration = duration == null
        ? (state.playbackState?.duration || state.playbackState?.track_window?.current_track?.duration_ms || 0)
        : Math.max(0, Math.round(duration || 0));

      if (state.playbackState) {
        state.playbackState.position = safePos;
        if (derivedDuration > 0) state.playbackState.duration = derivedDuration;
      }

      state.lastPlayerSnapshotAt = Date.now();

      if (!state.seeking) {
        const max = derivedDuration > 0 ? String(derivedDuration) : (els.timeline.max || '1000');
        const val = String(Math.min(safePos, derivedDuration || Number(max) || 1000));
        els.currentTime.textContent = formatTime(safePos);
        if (derivedDuration > 0) els.totalTime.textContent = formatTime(derivedDuration);
        if (els.timeline.max !== max) els.timeline.max = max;
        els.timeline.value = val;
        updateRangeVisual(els.timeline);
      }
    }

    function deriveNowPosition() {
      if (!state.playbackState) return 0;
      const duration = state.playbackState.duration || state.playbackState.track_window?.current_track?.duration_ms || 0;
      if (state.playbackState.paused) return Math.min(state.playbackState.position || 0, duration);
      const elapsed = Date.now() - state.lastPlayerSnapshotAt;
      return Math.min((state.playbackState.position || 0) + elapsed, duration);
    }

    function renderProgress() {
      const playback = state.playbackState;
      if (!playback) return;
      const duration = playback.duration || playback.track_window?.current_track?.duration_ms || 0;
      const position = deriveNowPosition();
      els.currentTime.textContent = formatTime(position);
      els.totalTime.textContent = formatTime(duration);
      if (!state.seeking) {
        const newMax = duration > 0 ? String(duration) : '1000';
        const newVal = String(Math.min(position, duration || 1000));
        if (els.timeline.max !== newMax) {
          els.timeline.max = newMax;
        }
        if (els.timeline.value !== newVal) {
          els.timeline.value = newVal;
          updateRangeVisual(els.timeline);
        }
      }
    }

    function startProgressLoop() {
      if (state.timelineTimer) clearInterval(state.timelineTimer);
      state.timelineTimer = setInterval(renderProgress, 250);
    }

    async function beginLogin() {
      const verifier = randomString(96);
      const challenge = base64UrlEncode(await sha256(verifier));
      const oauthState = randomString(24);

      setSaved(STORAGE_KEYS.codeVerifier, verifier);
      setSaved(STORAGE_KEYS.oauthState, oauthState);

      const params = new URLSearchParams({
        client_id: APP_CONFIG.CLIENT_ID,
        response_type: 'code',
        redirect_uri: APP_CONFIG.REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        scope: SCOPES.join(' '),
        state: oauthState,
        show_dialog: 'false'
      });

      location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const verifier = getSaved(STORAGE_KEYS.codeVerifier);
      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: APP_CONFIG.CLIENT_ID,
          grant_type: 'authorization_code',
          code,
          redirect_uri: APP_CONFIG.REDIRECT_URI,
          code_verifier: verifier
        })
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error_description || data.error || 'Token exchange failed');
      }

      setSaved(STORAGE_KEYS.accessToken, data.access_token);
      if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
      setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
      removeSaved(STORAGE_KEYS.codeVerifier);
      removeSaved(STORAGE_KEYS.oauthState);
    }

    async function refreshAccessToken() {
      if (state.refreshPromise) return state.refreshPromise;
      const refreshToken = getSaved(STORAGE_KEYS.refreshToken);
      if (!refreshToken) throw new Error('Missing refresh token');

      state.refreshPromise = fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: refreshToken,
          client_id: APP_CONFIG.CLIENT_ID
        })
      })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error_description || data.error || 'Token refresh failed');
        }
        setSaved(STORAGE_KEYS.accessToken, data.access_token);
        setSaved(STORAGE_KEYS.expiresAt, String(Date.now() + (data.expires_in * 1000) - 60000));
        if (data.refresh_token) setSaved(STORAGE_KEYS.refreshToken, data.refresh_token);
        return data.access_token;
      })
      .finally(() => {
        state.refreshPromise = null;
      });

      return state.refreshPromise;
    }

    async function getValidToken() {
      const token = getSaved(STORAGE_KEYS.accessToken);
      const expiresAt = Number(getSaved(STORAGE_KEYS.expiresAt) || 0);
      if (token && Date.now() < expiresAt) return token;
      return refreshAccessToken();
    }

    async function spotifyFetch(path, options = {}) {
      const token = await getValidToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';

      const response = await fetch(`https://api.spotify.com${path}`, {
        ...options,
        headers
      });

      if (response.status === 204) return null;

      const text = await response.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) { data = text; }

      if (!response.ok) {
        const message = data?.error?.message || data?.error_description || `Spotify API error ${response.status}`;
        throw new Error(message);
      }

      return data;
    }

    async function syncPlaybackFlags() {
      try {
        const playback = await spotifyFetch('/v1/me/player');
        if (playback && typeof playback.shuffle_state === 'boolean') {
          setShuffleVisual(playback.shuffle_state);
        }
        if (playback?.device) {
          updatePlaybackDeviceInfo(playback.device);
          syncVolumeFromPlaybackDevice(playback.device, false);
        }
      } catch (error) {
        if (!/204/.test(String(error?.message || ''))) {
          console.error(error);
        }
      }
    }

    function extractId(uriOrId) {
      if (!uriOrId) return '';
      const raw = String(uriOrId);
      if (!raw.includes(':')) return raw;
      return raw.split(':').pop() || '';
    }

    function pickRandom(items, predicate = null) {
      const pool = (items || []).filter(Boolean).filter(item => predicate ? predicate(item) : true);
      if (!pool.length) return null;
      return pool[Math.floor(Math.random() * pool.length)] || null;
    }

    async function addItemToQueue(uri) {
      const params = new URLSearchParams({ uri });
      const targetId = getCommandDeviceId();
      if (targetId) params.set('device_id', targetId);
      await spotifyFetch(`/v1/me/player/queue?${params.toString()}`, { method: 'POST' });
    }

    async function fetchRecommendationCandidate(current) {
      const trackId = extractId(current?.id || current?.uri);
      const artistIds = (current?.artists || []).map(artist => extractId(artist.id || artist.uri)).filter(Boolean);
      if (!trackId) return null;

      try {
        const params = new URLSearchParams({ limit: '20', seed_tracks: trackId });
        if (artistIds[0]) params.set('seed_artists', artistIds[0]);
        const data = await spotifyFetch(`/v1/recommendations?${params.toString()}`);
        return pickRandom(data?.tracks, item => item && item.uri && item.uri !== current?.uri && item.id !== current?.id);
      } catch (error) {
        console.warn('Recommendations unavailable, falling back', error);
      }

      const primaryArtistId = artistIds[0];
      if (primaryArtistId) {
        try {
          const data = await spotifyFetch(`/v1/artists/${primaryArtistId}/top-tracks`);
          const topTrack = pickRandom(data?.tracks, item => item && item.uri && item.uri !== current?.uri && item.id !== current?.id);
          if (topTrack) return topTrack;
        } catch (error) {
          console.warn('Artist top tracks fallback failed', error);
        }
      }

      const albumId = extractId(current?.album?.id || current?.album?.uri);
      if (albumId) {
        try {
          const data = await spotifyFetch(`/v1/albums/${albumId}/tracks?limit=50`);
          const albumTrack = pickRandom(data?.items, item => item && item.uri && item.uri !== current?.uri && item.id !== current?.id);
          if (albumTrack) return albumTrack;
        } catch (error) {
          console.warn('Album fallback failed', error);
        }
      }

      return null;
    }

    async function queueDiscoveryTrack() {
      if (state.recommendRequest) return state.recommendRequest;
      const current = state.playbackState?.track_window?.current_track;
      if (!current?.uri) {
        setStatus('Play something first', 'warn');
        return;
      }

      state.recommendRequest = (async () => {
        els.recommendBtn.classList.add('loading');
        els.recommendBtn.classList.add('active');
        try {
          const candidate = await fetchRecommendationCandidate(current);
          if (!candidate?.uri) throw new Error('No discovery track found');
          await addItemToQueue(candidate.uri);
          setRecommendVisual(true);
          const artist = (candidate.artists || []).map(artist => artist.name).filter(Boolean).join(', ');
          setStatus(`Queued ${candidate.name}${artist ? ` — ${artist}` : ''}`, 'good');
        } catch (error) {
          setRecommendVisual(false);
          setStatus(`Discovery failed: ${error.message}`, 'error');
        } finally {
          els.recommendBtn.classList.remove('loading');
          state.recommendRequest = null;
        }
      })();

      return state.recommendRequest;
    }

    async function syncLikedState(uri) {
      if (!uri) {
        setHeartVisual(false);
        els.heartBtn.disabled = true;
        return;
      }

      try {
        const result = await spotifyFetch(`/v1/me/library/contains?uris=${encodeURIComponent(uri)}`);
        const liked = Array.isArray(result) ? !!result[0] : false;
        setHeartVisual(liked);
        els.heartBtn.disabled = false;
      } catch (error) {
        setHeartVisual(false);
        setStatus(`Library check failed: ${error.message}`, 'error');
      }
    }

    async function toggleShuffle() {
      if (state.shuffleRequest) return state.shuffleRequest;
      const nextState = !state.shuffleEnabled;
      const params = new URLSearchParams({ state: String(nextState) });
      const targetId = getCommandDeviceId();
      if (targetId) params.set('device_id', targetId);

      state.shuffleRequest = (async () => {
        try {
          await spotifyFetch(`/v1/me/player/shuffle?${params.toString()}`, { method: 'PUT' });
          setShuffleVisual(nextState);
          setStatus(nextState ? 'Shuffle on' : 'Shuffle off', 'good');
          setTimeout(() => { syncPlaybackFlags().catch(() => {}); }, 250);
        } catch (error) {
          setStatus(`Shuffle failed: ${error.message}`, 'error');
        } finally {
          state.shuffleRequest = null;
        }
      })();

      return state.shuffleRequest;
    }

    async function toggleLike() {
      const uri = state.currentUri;
      if (!uri || state.likeRequest) return;

      state.likeRequest = (async () => {
        try {
          if (state.currentLiked) {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'DELETE' });
            setHeartVisual(false);
          } else {
            await spotifyFetch(`/v1/me/library?uris=${encodeURIComponent(uri)}`, { method: 'PUT' });
            setHeartVisual(true);
          }
        } catch (error) {
          setStatus(`Like update failed: ${error.message}`, 'error');
        } finally {
          state.likeRequest = null;
        }
      })();

      return state.likeRequest;
    }

    function updateTrackFromState(playbackState) {
      if (!playbackState || !playbackState.track_window?.current_track) return;
      const current = playbackState.track_window.current_track;
      const image = current.album?.images?.[0]?.url || DEFAULT_ART;
      const artist = (current.artists || []).map(artist => artist.name).join(', ');
      const contextName = playbackState.context?.metadata?.context_description || current.album?.name || 'Spotify';

      els.albumArt.src = image;
      els.bgArt.src = image;
      if (image && image !== state.gradientArtSrc) {
        extractPaletteFromImage(image);
      }
      els.trackName.textContent = current.name || 'Unknown track';
      els.artistName.textContent = artist || 'Unknown artist';
      els.metaTop.textContent = contextName;
      setPlayPauseVisual(!!playbackState.paused);
      if (playbackState.device) updatePlaybackDeviceInfo(playbackState.device);

      const newUri = current.uri || '';
      if (newUri && newUri !== state.currentUri) {
        setRecommendVisual(false);
        state.currentUri = newUri;
        syncLikedState(newUri);
        resetPlaybackProgressUI(playbackState.position || 0, playbackState.duration || current.duration_ms || 0);
      }

      updateTransportButtons(true);
      renderProgress();
    }

    async function hydratePlaybackState() {
      try {
        const playback = await spotifyFetch('/v1/me/player');
        if (playback?.device) {
          updatePlaybackDeviceInfo(playback.device);
          syncVolumeFromPlaybackDevice(playback.device, false);
        }
        if (playback?.item) {
          const normalized = normalizePlaybackState(playback, 'api');
          if (normalized) {
            state.playbackState = normalized;
            state.lastPlayerSnapshotAt = Date.now();
            updateTrackFromState(normalized);
            setStatus('Ready', 'good');
            return;
          }
        }
      } catch (error) {
        console.error(error);
      }

      if (state.player) {
        try {
          const playbackState = await state.player.getCurrentState();
          if (!playbackState) return;
          const normalized = normalizePlaybackState(playbackState, 'sdk');
          state.playbackState = normalized;
          state.lastPlayerSnapshotAt = Date.now();
          updateTrackFromState(normalized);
          syncPlaybackFlags().catch(() => {});
          setStatus('Ready', 'good');
        } catch (error) {
          console.error(error);
        }
      }
    }

    async function activateAudio() {
      if (!state.player) return;
      try {
        await state.player.activateElement();
        state.activated = true;
        updateAudioButton();
        setStatus('Audio activated', 'good');
        if (els.overlay.classList.contains('show')) setOverlay('setup');
      } catch (error) {
        state.activated = false;
        updateAudioButton();
        setStatus(`Audio activation failed: ${error.message}`, 'error');
        if (els.overlay.classList.contains('show')) setOverlay('setup');
      }
    }

    async function transferPlayback() {
      if (!state.deviceId) {
        setStatus('Spotify device is not ready', 'warn');
        return;
      }
      try {
        await spotifyFetch('/v1/me/player', {
          method: 'PUT',
          body: JSON.stringify({ device_ids: [state.deviceId], play: true })
        });
        setSelectedDevice({ id: state.deviceId, name: APP_CONFIG.DEVICE_NAME, supports_volume: true });
        setStatus('Playback transferred', 'good');
        setOverlay('hidden');
        setSaved(STORAGE_KEYS.overlayDismissed, '1');
        await new Promise(resolve => setTimeout(resolve, 900));
        await hydratePlaybackState();
        syncPlaybackFlags().catch(() => {});
      } catch (error) {
        setStatus(`Transfer failed: ${error.message}`, 'error');
      }
    }

    function signOut() {
      [
        STORAGE_KEYS.accessToken,
        STORAGE_KEYS.refreshToken,
        STORAGE_KEYS.expiresAt,
        STORAGE_KEYS.codeVerifier,
        STORAGE_KEYS.oauthState,
        STORAGE_KEYS.overlayDismissed,
        STORAGE_KEYS.selectedDeviceId
      ].forEach(removeSaved);

      if (state.player) {
        try { state.player.disconnect(); } catch (_) {}
      }

      state.player = null;
      state.deviceId = null;
      state.ready = false;
      state.activated = false;
      state.playbackState = null;
      state.currentUri = '';
      state.currentLiked = false;
      state.shuffleEnabled = false;
      state.discoveryQueued = false;
      state.selectedDeviceId = '';
      state.selectedDeviceName = '';
      state.playbackDeviceId = '';
      state.playbackDeviceName = '';
      updateAuxButtons();
      clearTrack();
      updateAudioButton();
      setOverlay('signin');
      setStatus('Signed out', 'warn');
    }

    function installPlayer() {
      if (!window.Spotify || state.player || !hasTokens()) {
        updateAuxButtons();
        return;
      }

      state.player = new Spotify.Player({
        name: APP_CONFIG.DEVICE_NAME,
        getOAuthToken: async (cb) => {
          try {
            cb(await getValidToken());
          } catch (error) {
            setStatus(`Token error: ${error.message}`, 'error');
          }
        },
        volume: state.volume,
        enableMediaSession: true
      });

      state.player.addListener('ready', async ({ device_id }) => {
        state.deviceId = device_id;
        state.ready = true;
        updateAuxButtons();
        updateTransportButtons(true);
        updateAudioButton();
        setStatus('Spotify ready', 'good');
        fetchAvailableDevices(false).catch(() => {});
        syncPlaybackFlags().catch(() => {});
        await syncPlayerVolume(state.volume);

        if (!state.activated) {
          const dismissed = getSaved(STORAGE_KEYS.overlayDismissed) === '1';
          setOverlay(dismissed ? 'hidden' : 'setup');
        }
      });

      state.player.addListener('not_ready', () => {
        state.ready = false;
        updateAuxButtons();
        setStatus('Spotify device offline', 'warn');
      });

      state.player.addListener('player_state_changed', (playbackState) => {
        if (!playbackState) return;
        if (state.selectedDeviceId && state.selectedDeviceId !== state.deviceId) return;
        const normalized = normalizePlaybackState(playbackState, 'sdk');
        state.playbackState = normalized;
        state.lastPlayerSnapshotAt = Date.now();
        updateTrackFromState(normalized);
        syncPlaybackFlags().catch(() => {});
      });

      state.player.addListener('autoplay_failed', () => {
        setStatus('Tap Activate audio', 'warn');
        setOverlay('setup');
      });

      state.player.addListener('initialization_error', ({ message }) => setStatus(`Initialization error: ${message}`, 'error'));
      state.player.addListener('authentication_error', ({ message }) => setStatus(`Authentication error: ${message}`, 'error'));
      state.player.addListener('account_error', ({ message }) => setStatus(`Account error: ${message}`, 'error'));
      state.player.addListener('playback_error', ({ message }) => setStatus(`Playback error: ${message}`, 'error'));

      state.player.connect().then(success => {
        if (!success) {
          setStatus('Spotify player could not connect', 'error');
          return;
        }
        updateAuxButtons();
      });
    }

    async function maybeHandleAuthRedirect() {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const incomingState = params.get('state');
      const error = params.get('error');

      if (normalizeUrl(location.href) !== normalizeUrl(APP_CONFIG.REDIRECT_URI)) {
        state.redirectMismatch = true;
      }

      if (error) {
        setStatus(`Spotify login failed: ${error}`, 'error');
        if (state.redirectMismatch) {
          setStatus('Redirect URI mismatch: this page is not the configured callback', 'error');
        }
        history.replaceState({}, document.title, location.pathname);
        return;
      }

      if (!code) {

  }

  async function fetchLikedSongsRemaining(offsetStart = 0, limit = 50){
    if (state.likedBackgroundLoading || !isAuthed()) return state.likedTracks;
    state.likedBackgroundLoading = true;
    try {
      let offset = offsetStart;
      const items = Array.isArray(state.likedTracks) ? state.likedTracks.slice() : [];
      while (true) {
        const data = await spotifyFetch(`/v1/me/tracks?limit=${limit}&offset=${offset}`);
        const pageItems = Array.isArray(data?.items) ? data.items.filter((item) => item && item.track && item.track.uri) : [];
        if (!pageItems.length) break;
        items.push(...pageItems);
        state.likedTracks = items.slice();
        state.likedLoaded = true;
        if (state.view === 'liked') render();
        if (!data?.next) break;
        offset += pageItems.length;
      }
      state.likedTracks = items;
      state.likedLoaded = true;
      state.likedFullyLoaded = true;
      setLikedSongsCache(items);
      return items;
    } catch (error) {
      console.warn('Liked songs background fetch failed', error);
      return state.likedTracks;
    } finally {
      state.likedBackgroundLoading = false;
    }
  }

  async function fetchPagedItems(basePath, limit = 50){
    const items = [];
    let offset = 0;
    while (true) {
      const joiner = basePath.includes('?') ? '&' : '?';
      const data = await spotifyFetch(`${basePath}${joiner}limit=${limit}&offset=${offset}`);
      const pageItems = Array.isArray(data?.items) ? data.items : [];
      items.push(...pageItems);
      if (!data?.next || !pageItems.length) break;
      offset += pageItems.length;
    }
    return items;
  }

  async function fetchLikedSongs(force = false){
    if (!isAuthed()) {
      state.likedTracks = [];
      state.likedLoaded = false;
      state.likedFullyLoaded = false;
      return [];
    }
    if (state.likedLoading) return state.likedTracks;
    if (state.likedLoaded && state.likedFullyLoaded && !force) return state.likedTracks;

    const cached = !force ? getLikedSongsCache() : [];
    if (cached.length && !state.likedLoaded) {
      state.likedTracks = cached;
      state.likedLoaded = true;
      state.likedFullyLoaded = false;
      if (state.view === 'liked') render();
    }

    state.likedLoading = true;
    try {
      const firstPage = await spotifyFetch('/v1/me/tracks?limit=50&offset=0');
      const firstItems = Array.isArray(firstPage?.items) ? firstPage.items.filter((item) => item && item.track && item.track.uri) : [];
      state.likedTracks = firstItems;
      state.likedLoaded = true;
      state.likedFullyLoaded = !firstPage?.next;
      setLikedSongsCache(firstItems);
      if (state.view === 'liked') render();
      if (firstPage?.next) {
        fetchLikedSongsRemaining(firstItems.length, 50).catch(() => {});
      }
      return state.likedTracks;
    } catch (error) {
      if (state.likedTracks.length) return state.likedTracks;
      state.likedTracks = [];
      state.likedLoaded = false;
      state.likedFullyLoaded = false;
      console.warn('Liked songs failed', error);
      return [];
    } finally {
      state.likedLoading = false;
    }
  }

  async function fetchPlaylists(force = false){
    if (!isAuthed()) {
      state.playlists = [];
      state.playlistsLoaded = false;
      return [];
    }
    if (state.playlistsLoading) return state.playlists;
    if (state.playlistsLoaded && !force) return state.playlists;
    state.playlistsLoading = true;
    try {
      const items = await fetchPagedItems('/v1/me/playlists', 50);
      state.playlists = items.filter((item) => item && item.id && item.uri);
      state.playlistsLoaded = true;
      return state.playlists;
    } catch (error) {
      state.playlists = [];
      state.playlistsLoaded = false;
      console.warn('Playlist fetch failed', error);
      return [];
    } finally {
      state.playlistsLoading = false;
    }
  }

  async function fetchPlaylistTracks(playlistId, force = false){
    if (!playlistId || !isAuthed()) return [];
    if (state.playlistTracksById[playlistId] && !force) return state.playlistTracksById[playlistId];
    const items = await fetchPagedItems(`/v1/playlists/${playlistId}/tracks`, 100);
    const clean = items.filter((item) => item && item.track && item.track.uri);
    state.playlistTracksById[playlistId] = clean;
    return clean;
  }

  function buildLikedItems(){
    if (!isAuthed()) {
      return [{ label: 'Connect Spotify', value: '', action: () => clickLegacy(legacy.loginBtn) }];
    }
    if (state.likedLoading && !state.likedLoaded) {
      return [{ label: 'Loading liked songs…', value: '', disabled: true }];
    }
    if (!state.likedTracks.length) {
      return [{ label: 'No liked songs', value: '', disabled: true }];
    }
    return state.likedTracks.map((item, index) => ({
      label: item.track.name || 'Track',
      value: ((item.track.artists || []).map((artist) => artist.name).join(', ')).slice(0, 24),
      action: () => playLikedSong(index)
    }));
  }

  async function openLikedSongs(force = false){
    state.view = 'liked';
    render();
    if (force || !state.likedLoaded) {
      await fetchLikedSongs(force);
    }
    state.selected = 0;
    render();
  }

  async function playLikedSong(index){
    const items = state.likedTracks || [];
    const picked = items[index]?.track;
    if (!picked?.uri) return;
    const restoreShuffle = isShuffleOn();
    try {
      if (isUsingThisDevice() || !getCommandDeviceId()) {
        await activateAudioAndUseDevice();
      }
      resetPlaybackProgressUI(0, picked.duration_ms || 0);
      const orderedUris = [picked.uri].concat(
        items.slice(index + 1, index + 100).map((item) => item?.track?.uri).filter(Boolean),
        items.slice(0, index).map((item) => item?.track?.uri).filter(Boolean)
      );
      if (restoreShuffle) {
        try {
          await spotifyFetch(`/v1/me/player/shuffle?state=false${getCommandDeviceId() ? `&device_id=${encodeURIComponent(getCommandDeviceId())}` : ''}`, { method: 'PUT' });
          setShuffleVisual(false);
        } catch (_) {}
      }
      await apiPlayerCommand('/v1/me/player/play', {
        method: 'PUT',
        body: { uris: orderedUris, position_ms: 0 }
      });
      if (restoreShuffle) {
        setTimeout(() => {
          spotifyFetch(`/v1/me/player/shuffle?state=true${getCommandDeviceId() ? `&device_id=${encodeURIComponent(getCommandDeviceId())}` : ''}`, { method: 'PUT' })
            .then(() => { setShuffleVisual(true); sync(); })
            .catch(() => {});
        }, 900);
      }
      state.view = 'nowplaying';
      state.selected = index;
      state.playbackClock.trackKey = extractId(picked.uri) || picked.id || '';
      state.playbackClock.positionMs = 0;
      state.playbackClock.durationMs = picked.duration_ms || 0;
      state.playbackClock.stamp = Date.now();
      state.playbackClock.playing = true;
      if (typeof refreshPlaybackSoon === 'function') {
        await refreshPlaybackSoon(120);
        await refreshPlaybackSoon(300);
      }
      syncPlaybackClock();
      render();
    } catch (error) {
      console.warn('Liked playback failed', error);
      try {
        if (typeof commandTogglePlay === 'function') await commandTogglePlay();
      } catch (_) {
        clickLegacy(legacy.playPauseBtn);
      }
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>\"]/g, (s) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[s]));
  }

  function updateVisualizer(){
    ui.viz.classList.toggle('idle', !isAuthed() || !currentTrackTitle());
    ui.viz.classList.toggle('paused', !!currentTrackTitle() && !isPlaying());

  function renderMenuView(title, items){
    clearNowPlayingCache();
    stopNowPlayingLoop();
    state.menuItems = items;
    clampIndex();
    ui.topTitle.textContent = title;
    ui.topLeft.style.opacity = '1';
    const visible = Math.max(1, Math.min(state.menuVisibleCount || 6, items.length || 1));
    const start = Math.max(0, Math.min(state.menuOffset || 0, Math.max(0, items.length - visible)));
    const end = start + visible;
    const rows = items.slice(start, end).map((item, sliceIndex) => {
      const index = start + sliceIndex;
      const classes = ['pod-row'];
      if (index === state.selected) classes.push('selected');
      const value = item.value ? `<span class="value">${escapeHtml(item.value)}</span>` : '<span class="value"></span>';
      const chev = item.next ? '<span class="chev">›</span>' : '<span class="chev"></span>';
      return `<li class="${classes.join(' ')}" data-menu-index="${index}"><span class="label">${escapeHtml(item.label)}</span>${value}${chev}</li>`;
    }).join('');
    const klass = state.view === 'devices' ? 'pod-device-list' : 'pod-menu';
    let indicator = '';
    if (items.length > visible) {
      const maxOffset = Math.max(1, items.length - visible);
      const thumbHeight = Math.max(14, ((visible / items.length) * 100));
      const top = (start / maxOffset) * (100 - thumbHeight);
      indicator = `<div class="pod-scroll-indicator" data-scroll-indicator="true" aria-label="Scroll list"><span style="height:${thumbHeight}%;top:${top}%"></span></div>`;
    }
    ui.menuView.innerHTML = rows ? `<div class="pod-list-wrap"><ul class="${klass}">${rows}</ul>${indicator}</div>` : '<div class="pod-empty">No devices found.</div>';
    void ui.menuView.offsetHeight;
    ui.menuView.classList.add('active');
    ui.nowView.classList.remove('active');
    const indicatorEl = ui.menuView.querySelector('[data-scroll-indicator="true"]');
    if (indicatorEl) attachListScrollIndicator(indicatorEl);
    updateVisualizer();
  }


  function attachListScrollIndicator(indicatorEl){
    if (!indicatorEl) return;
    const setFromClientY = (clientY) => {
      const total = state.menuItems.length || 0;
      const visible = Math.max(1, Math.min(state.menuVisibleCount || 6, total || 1));
      if (!total || total <= visible) return;
      const rect = indicatorEl.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientY - rect.top) / Math.max(1, rect.height)));
      const targetIndex = Math.max(0, Math.min(total - 1, Math.round(ratio * (total - 1))));
      state.selected = targetIndex;
      syncMenuWindow();
      render();
    };
    indicatorEl.addEventListener('pointerdown', (event) => {
      state.listScrollPointerId = event.pointerId;
      if (indicatorEl.setPointerCapture) indicatorEl.setPointerCapture(event.pointerId);
      setFromClientY(event.clientY);
      event.preventDefault();
      event.stopPropagation();
    }, { passive: false });
    indicatorEl.addEventListener('pointermove', (event) => {
      if (state.listScrollPointerId !== event.pointerId) return;
      setFromClientY(event.clientY);
      event.preventDefault();
      event.stopPropagation();
    }, { passive: false });
    const release = (event) => {
      if (state.listScrollPointerId !== event.pointerId) return;
      state.listScrollPointerId = null;
      event.preventDefault();
      event.stopPropagation();
    };
    indicatorEl.addEventListener('pointerup', release, { passive: false });
    indicatorEl.addEventListener('pointercancel', release, { passive: false });
  }

  function bindNowPlayingSeek(barEl){
    if (!barEl) return;
    const setPreviewFromClientX = (clientX) => {
      const rect = barEl.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / Math.max(1, rect.width)));
      const durationMs = displayDurationMs();
      state.npScrubMs = Math.round(durationMs * ratio);
      state.npScrubbing = true;
      updateNowPlayingDynamic();
    };
    const finishSeek = async () => {
      if (!state.npScrubbing) return;
      const targetMs = state.npScrubMs || 0;
      state.npScrubbing = false;
      state.playbackClock.positionMs = targetMs;
      state.playbackClock.stamp = Date.now();
      updateNowPlayingDynamic();
      try {
        await commandSeek(targetMs);
        if (typeof refreshPlaybackSoon === 'function') refreshPlaybackSoon(120).catch(() => {});
      } catch (error) {
        console.warn('Now playing seek failed', error);
      }
    };
    barEl.addEventListener('pointerdown', (event) => {
      state.npSeekPointerId = event.pointerId;
      if (barEl.setPointerCapture) barEl.setPointerCapture(event.pointerId);
      setPreviewFromClientX(event.clientX);
      event.preventDefault();
      event.stopPropagation();
    }, { passive: false });
    barEl.addEventListener('pointermove', (event) => {
      if (state.npSeekPointerId !== event.pointerId) return;
      setPreviewFromClientX(event.clientX);
      event.preventDefault();
      event.stopPropagation();
    }, { passive: false });
    const release = async (event) => {
      if (state.npSeekPointerId !== event.pointerId) return;
      state.npSeekPointerId = null;
      event.preventDefault();
      event.stopPropagation();
      await finishSeek();
    };
    barEl.addEventListener('pointerup', release, { passive: false });
    barEl.addEventListener('pointercancel', release, { passive: false });
  }

  function updateNowPlayingDynamic(){
    if (state.view !== 'nowplaying' || !ui.nowView.classList.contains('active') || !state.npElements.bar) return;
    const durationMs = displayDurationMs();
    const positionMs = state.npScrubbing ? state.npScrubMs : displayPositionMs();
    const progress = durationMs > 0 ? Math.max(0, Math.min(100, (positionMs / durationMs) * 100)) : 0;
    state.npElements.bar.style.width = `${progress}%`;
    if (state.npElements.currentTimeEl) state.npElements.currentTimeEl.textContent = formatTimeMs(positionMs);
    if (state.npElements.totalTimeEl) state.npElements.totalTimeEl.textContent = formatTimeMs(durationMs);
  }

  function startNowPlayingLoop(){
    if (state.nowPlayingRaf) return;
    const tick = () => {
      updateNowPlayingDynamic();
      state.nowPlayingRaf = requestAnimationFrame(tick);
    };
    state.nowPlayingRaf = requestAnimationFrame(tick);
  }

        updateNowPlayingLikeButton();
        clickLegacy(legacy.heartBtn);
        setTimeout(sync, 120);
      });
    }
    ui.nowView.classList.add('active');
    ui.menuView.classList.remove('active');

  function render(){
    parseDevices();
    if (state.view === 'nowplaying') {
      renderNowPlaying();
      return;
    }
    if (state.view === 'devices') {
      renderMenuView('Devices', buildDeviceItems());
      return;
    }
    if (state.view === 'liked') {
      renderMenuView('Liked Songs', buildLikedItems());
      return;
    }
    renderMenuView('sp0tify', buildHomeItems());
  }

  function selectStep(direction){
    playUiClick();
    if (state.view === 'nowplaying') {
      return;
    }
    state.selected += direction;
    clampIndex();
    render();
  }

  function activateSelection(){
    playUiClick();
    if (state.view === 'nowplaying') {
      return;
    }
    const item = state.menuItems[state.selected];
    if (!item || item.disabled) return;
    if (item.next === 'nowplaying') {
      state.view = 'nowplaying';
      render();
      return;
    }
    if (item.next === 'devices') {
      state.view = 'devices';
      refreshDevices();
      render();
      return;
    }
    if (item.next === 'liked') {
      openLikedSongs();
      return;
    }
    if (typeof item.action === 'function') {
      Promise.resolve(item.action()).then(() => {
        setTimeout(render, 80);
        setTimeout(sync, 220);
        setTimeout(render, 360);
      }).catch((error) => {
        console.warn('Selection action failed', error);
        setTimeout(render, 120);
      });
    }
  }

  function goMenu(){
    if (state.view === 'nowplaying') {
      clearNowPlayingCache();
      stopNowPlayingLoop();
    }
    state.view = 'home';
    state.selected = 0;
    state.menuOffset = 0;
    state.lastRenderHash = '';
    parseDevices();
    render();
    requestAnimationFrame(() => {
      if (state.view !== 'home') return;
      state.menuOffset = 0;
      parseDevices();
      render();
    });
    setTimeout(() => {
      if (state.view !== 'home') return;
      state.menuOffset = 0;
      parseDevices();
      render();
    }, 80);
  }

  function refreshDevices(){
    clickLegacy(legacy.connectBtn);
    setTimeout(() => clickLegacy(legacy.refreshDevicesBtn), 40);
    setTimeout(() => { parseDevices(); render(); clickLegacy(legacy.closeDevicesBtn); }, 500);
    setTimeout(() => { parseDevices(); render(); clickLegacy(legacy.closeDevicesBtn); }, 1200);
  }

  async function toggleFullscreen(){
    const root = document.documentElement;
    const active = document.fullscreenElement || document.webkitFullscreenElement;
    try {
      if (active) {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        if (root.requestFullscreen) await root.requestFullscreen({ navigationUI: 'hide' }).catch(() => root.requestFullscreen());
        else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
      }
    } catch (_) {}
    setTimeout(render, 120);
  }

  function wheelGeometry(event){
    const rect = ui.wheel.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;
    return {
      rect,
      cx,
      cy,
      dx,
      dy,
      dist: Math.sqrt(dx * dx + dy * dy) / (rect.width / 2),
      angle: Math.atan2(dy, dx)
    };
  }

  function normalizeDelta(delta){
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    return delta;
  }

  function sectorFromAngle(angle){
    const deg = (angle * 180 / Math.PI + 360) % 360;
    if (deg >= 315 || deg < 45) return 'next';
    if (deg >= 45 && deg < 135) return 'play';
    if (deg >= 135 && deg < 225) return 'prev';
    return 'menu';
  }

  async function handleSectorTap(sector){
    playUiClick();
    if (sector === 'menu') { goMenu(); return; }
    if (sector === 'prev') {
      try {
        if (typeof commandPrevious === 'function') await commandPrevious();
        else clickLegacy(legacy.prevBtn);
      } catch (_) {
        clickLegacy(legacy.prevBtn);
      }
      if (typeof refreshPlaybackSoon === 'function') refreshPlaybackSoon(90).catch(() => {});
      syncPlaybackClock();
      render();
      return;
    }
    if (sector === 'next') {
      try {
        if (typeof commandNext === 'function') await commandNext();
        else clickLegacy(legacy.nextBtn);
      } catch (_) {
        clickLegacy(legacy.nextBtn);
      }
      if (typeof refreshPlaybackSoon === 'function') refreshPlaybackSoon(90).catch(() => {});
      syncPlaybackClock();
      render();
      return;
    }
    if (sector === 'play') {
      try {
        if (typeof commandTogglePlay === 'function') await commandTogglePlay();
        else clickLegacy(legacy.playPauseBtn);
      } catch (_) {
        clickLegacy(legacy.playPauseBtn);
      }
      if (typeof refreshPlaybackSoon === 'function') refreshPlaybackSoon(90).catch(() => {});
      syncPlaybackClock();
      render();
      return;
    }
  }

  function onWheelDown(event){
    if (event.target === ui.center) return;
    const g = wheelGeometry(event);
    if (g.dist > 1.14) return;
    state.gestureActive = true;
    state.pointerId = event.pointerId;
    state.startAngle = g.angle;
    state.lastAngle = g.angle;
    state.accum = 0;
    state.startX = event.clientX;
    state.startY = event.clientY;
    state.startT = Date.now();
    state.startDist = g.dist;
    state.moved = false;
    if (ui.wheel.setPointerCapture) ui.wheel.setPointerCapture(event.pointerId);
    event.preventDefault();
  }

  function onWheelMove(event){
    if (event.target === ui.center) return;
    if (!state.gestureActive || event.pointerId !== state.pointerId) return;
    const g = wheelGeometry(event);
    const delta = normalizeDelta(g.angle - state.lastAngle);
    state.lastAngle = g.angle;
    const travel = Math.hypot(event.clientX - state.startX, event.clientY - state.startY);
    if (travel > 10) state.moved = true;
    if (g.dist > 0.04) {
      state.accum += delta;
      const threshold = 0.155;
      while (Math.abs(state.accum) >= threshold) {
        const dir = state.accum > 0 ? 1 : -1;
        selectStep(dir);
        state.accum -= threshold * dir;
      }
    }
    event.preventDefault();
  }

  function onWheelUp(event){
    if (event.target === ui.center) return;
    if (!state.gestureActive || event.pointerId !== state.pointerId) return;
    const g = wheelGeometry(event);
    const duration = Date.now() - state.startT;
    const travel = Math.hypot(event.clientX - state.startX, event.clientY - state.startY);
    const tapish = travel < 14 && duration < 280;
    if (tapish) {
      if (g.dist <= 0.26) activateSelection();
      else handleSectorTap(sectorFromAngle(g.angle));
    }
    state.gestureActive = false;
    state.pointerId = null;
    state.accum = 0;
    event.preventDefault();
  }

  function installParallax(){ return; }

  ui.center.addEventListener('pointerdown', (event) => {
    event.preventDefault();
    event.stopPropagation();
  }, { passive: false });
  ui.center.addEventListener('pointerup', (event) => {
    event.preventDefault();
    event.stopPropagation();
    playUiClick();
    activateSelection();
  }, { passive: false });
  ui.center.addEventListener('click', (event) => {
    event.preventDefault();
    event.stopPropagation();
  });
  ui.wheel.addEventListener('pointerdown', onWheelDown, { passive: false });
  ui.wheel.addEventListener('pointermove', onWheelMove, { passive: false });
  ui.wheel.addEventListener('pointerup', onWheelUp, { passive: false });
  ui.wheel.addEventListener('pointercancel', onWheelUp, { passive: false });
  ui.wheel.addEventListener('contextmenu', (event) => event.preventDefault());

  document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') { selectStep(-1); event.preventDefault(); }
    else if (event.key === 'ArrowDown' || event.key === 'ArrowRight') { selectStep(1); event.preventDefault(); }
    else if (event.key === 'Enter' || event.key === ' ') { activateSelection(); event.preventDefault(); }
    else if (event.key === 'Escape' || event.key.toLowerCase() === 'm') { goMenu(); event.preventDefault(); }
  });

  function computeLightHash(){
    const devices = state.devices || [];
    const activeDevice = devices.find((device) => device.active);
    return [
      isAuthed(),
      currentTrackTitle(),
      currentArtist(),
      currentContext(),
      currentArt(),
      volumeValue(),
      isShuffleOn() ? 1 : 0,
      isAudioReady() ? 1 : 0,
      isUsingThisDevice() ? 1 : 0,
      isRemoteSelected() ? 1 : 0,
      isFullscreen() ? 1 : 0,
      isPaused() ? 1 : 0,
      legacy.recommendBtn && legacy.recommendBtn.classList.contains('active') ? 1 : 0,
      state.view,
      state.selected,
      state.menuOffset,
      state.likedTracks.length,
      devices.length,
      activeDevice ? activeDevice.id : ''
    ].join('|');
  }

  function sync(){
    syncPlaybackClock();
    const hash = computeLightHash();
    if (hash === state.lastRenderHash) return;
    state.lastRenderHash = hash;
    render();
  }

  async function requestScreenWakeLock(){
    if (!('wakeLock' in navigator)) return;
    if (document.visibilityState !== 'visible') return;
    try {
      if (state.wakeLock) return;
      state.wakeLock = await navigator.wakeLock.request('screen');
      state.wakeLockRequested = true;
      state.wakeLock.addEventListener('release', () => {
        state.wakeLock = null;
      });
    } catch (_) {
      state.wakeLock = null;
    }
  }

  async function releaseScreenWakeLock(){
    if (!state.wakeLock) return;
    try {
      await state.wakeLock.release();
    } catch (_) {}
    state.wakeLock = null;
  }

  attachLikedObserver();
  render();
  startNowPlayingLoop();
  setTimeout(refreshDevices, 400);
  setInterval(sync, 900);
  setTimeout(sync, 900);
  requestScreenWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestScreenWakeLock();
    else releaseScreenWakeLock();
  });
  window.addEventListener('pageshow', requestScreenWakeLock);
  document.addEventListener('pointerdown', requestScreenWakeLock, { passive: true });
  document.addEventListener('fullscreenchange', () => { render(); requestScreenWakeLock(); });
  document.addEventListener('webkitfullscreenchange', () => { render(); requestScreenWakeLock(); });
})();
</script></body></html>
