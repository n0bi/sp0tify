<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Y2K Digicam Camera</title>
  <style>
    :root {
      --bg: #050507;
      --panel: rgba(14, 14, 18, 0.9);
      --line: rgba(255,255,255,.08);
      --text: #f5f5f7;
      --muted: rgba(255,255,255,.68);
      --shadow: 0 24px 60px rgba(0,0,0,.4);
      --radius: 30px;
      --button-shadow: 0 12px 30px rgba(0,0,0,.28);
      --preview-filter: none;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(255,255,255,.06), transparent 25%), linear-gradient(180deg, #11131a, #050507 72%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 10px;
    }

    .app {
      width: 100%;
      min-height: calc(100dvh - 20px);
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .camera-shell {
      width: min(100%, 960px);
      min-height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .viewer {
      position: relative;
      flex: 1 1 auto;
      min-height: min(72dvh, 920px);
      overflow: hidden;
      border-radius: var(--radius);
      background: #000;
      border: 1px solid rgba(255,255,255,.08);
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    video {
      filter: var(--preview-filter);
      transition: filter .25s ease, transform .25s ease;
    }

    .viewer.fisheye-preview video {
      transform: scale(1.08);
      filter: var(--preview-filter) contrast(1.06);
    }

    .viewer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0) 16%, rgba(0,0,0,.08) 100%);
      mix-blend-mode: screen;
    }

    .viewer.fisheye-preview::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.12) 58%, rgba(0,0,0,.42) 100%);
      z-index: 2;
    }

    #output {
      display: none;
      cursor: pointer;
      z-index: 1;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .mode-badge,
    .icon-btn,
    .toast {
      position: absolute;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 10px 30px rgba(0,0,0,.24);
      background: rgba(0,0,0,.4);
      color: rgba(255,255,255,.96);
    }

    .mode-badge {
      left: 12px;
      top: 12px;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      line-height: 1;
    }

    .icon-btn {
      right: 12px;
      top: 12px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      pointer-events: auto;
      display: grid;
      place-items: center;
      cursor: pointer;
      appearance: none;
      font: inherit;
    }

    .icon-btn:active { transform: scale(.98); }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toast {
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      white-space: nowrap;
      display: none;
      max-width: calc(100% - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 2px 2px 4px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .mode-row::-webkit-scrollbar { display: none; }

    .mode-chip,
    .pill-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
      white-space: nowrap;
      box-shadow: var(--button-shadow);
    }

    .mode-chip:active,
    .pill-btn:active { transform: scale(.98); }

    .mode-chip.active {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.22);
    }

    .capture-row {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .capture-btn {
      appearance: none;
      width: 74px;
      height: 74px;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,.9);
      background: transparent;
      padding: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      transition: transform .15s ease, opacity .15s ease;
    }

    .capture-btn::before {
      content: "";
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background: #ff3b30;
      box-shadow: inset 0 -10px 16px rgba(0,0,0,.14), inset 0 10px 14px rgba(255,255,255,.14);
    }

    .capture-btn:active { transform: scale(.97); }
    .capture-btn:disabled { opacity: .55; cursor: wait; }

    .capture-actions {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .capture-actions.show { display: flex; }

    .hidden { display: none !important; }

    .subtle {
      color: var(--muted);
    }

    @media (max-width: 720px) {
      body { padding: 0; }
      .app { min-height: 100dvh; }
      .camera-shell {
        width: 100%;
        border-radius: 0;
        min-height: 100dvh;
        padding: 8px;
      }
      .viewer {
        min-height: calc(100dvh - 158px);
        border-radius: 24px;
      }
      .mode-chip,
      .pill-btn {
        padding: 11px 13px;
        font-size: 14px;
      }
      .capture-btn {
        width: 76px;
        height: 76px;
      }
      .capture-btn::before {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <div class="camera-shell" id="cameraShell">
      <div class="viewer" id="viewer">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
        <div class="hud">
          <div id="modeBadge" class="mode-badge">Disposable flash</div>
          <button id="fullscreenBtn" class="icon-btn" type="button" aria-label="Toggle fullscreen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5"></path>
              <path d="M16 3h5v5"></path>
              <path d="M21 16v5h-5"></path>
              <path d="M8 21H3v-5"></path>
            </svg>
          </button>
          <div id="toast" class="toast"></div>
        </div>
      </div>

      <div class="controls">
        <div class="mode-row" id="modeRow" aria-label="Camera looks"></div>

        <div class="capture-row">
          <button id="captureBtn" class="capture-btn" type="button" aria-label="Capture photo" disabled></button>
          <div id="captureActions" class="capture-actions" aria-live="polite">
            <button id="retakeBtn" class="pill-btn" type="button">Retake</button>
            <button id="saveBtn" class="pill-btn" type="button">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const output = document.getElementById('output');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const saveBtn = document.getElementById('saveBtn');
    const captureActions = document.getElementById('captureActions');
    const viewer = document.getElementById('viewer');
    const modeBadge = document.getElementById('modeBadge');
    const modeRow = document.getElementById('modeRow');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const toast = document.getElementById('toast');
    const appRoot = document.getElementById('appRoot');

    let stream = null;
    let captured = false;
    let lastBlobUrl = '';
    let toastTimer = 0;

    const MODES = {
      disposable: {
        label: 'Disposable flash',
        previewFilter: 'contrast(1.06) saturate(1.08) brightness(1.02) sepia(.08)',
        maxLongEdge: 1380,
        jpegQualityDay: 0.5,
        jpegQualityNight: 0.38,
        outputQuality: 0.9,
        base: {
          contrast: [1.02, 1.14],
          exposure: [1.06, 1.18],
          saturation: [1.0, 1.12],
          warmthR: [1.03, 1.12],
          warmthG: [0.99, 1.04],
          warmthB: [0.9, 0.98],
          blackLift: [8, 18],
          highlightPush: [0.2, 0.32],
          noise: [12, 22],
          colorNoise: [6, 12],
          vignette: [0.14, 0.22],
          hotspot: [0.12, 0.24],
          chromaShift: [1.0, 1.7],
          sharpen: [0.08, 0.16],
          flashBloom: [0.18, 0.32],
          coolBoost: [0.0, 0.0],
          magentaBoost: [0.0, 0.0],
          barrel: 0
        }
      },
      ccd: {
        label: 'CCD digicam daylight',
        previewFilter: 'contrast(0.98) saturate(0.94) brightness(1.05) hue-rotate(-3deg)',
        maxLongEdge: 1440,
        jpegQualityDay: 0.56,
        jpegQualityNight: 0.42,
        outputQuality: 0.92,
        base: {
          contrast: [0.9, 1.0],
          exposure: [1.02, 1.08],
          saturation: [0.86, 0.96],
          warmthR: [0.95, 1.0],
          warmthG: [1.0, 1.05],
          warmthB: [1.03, 1.12],
          blackLift: [9, 16],
          highlightPush: [0.08, 0.14],
          noise: [7, 13],
          colorNoise: [3, 7],
          vignette: [0.08, 0.14],
          hotspot: [0.02, 0.05],
          chromaShift: [0.7, 1.2],
          sharpen: [0.11, 0.19],
          flashBloom: [0.0, 0.02],
          coolBoost: [2, 8],
          magentaBoost: [0.0, 0.0],
          barrel: 0
        }
      },
      fisheye: {
        label: 'Fisheye Y2K club',
        previewFilter: 'contrast(1.08) saturate(1.14) brightness(1.02) hue-rotate(5deg)',
        maxLongEdge: 1280,
        jpegQualityDay: 0.44,
        jpegQualityNight: 0.34,
        outputQuality: 0.89,
        base: {
          contrast: [1.04, 1.18],
          exposure: [1.04, 1.16],
          saturation: [1.02, 1.14],
          warmthR: [1.01, 1.08],
          warmthG: [0.95, 1.02],
          warmthB: [0.96, 1.04],
          blackLift: [10, 18],
          highlightPush: [0.18, 0.28],
          noise: [14, 24],
          colorNoise: [6, 12],
          vignette: [0.2, 0.32],
          hotspot: [0.08, 0.18],
          chromaShift: [1.4, 2.2],
          sharpen: [0.08, 0.15],
          flashBloom: [0.08, 0.16],
          coolBoost: [0.0, 3.0],
          magentaBoost: [4.0, 10.0],
          barrel: 0.22
        }
      }
    };

    const STATE = {
      mode: 'disposable'
    };

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min = 0, max = 255) {
      return Math.max(min, Math.min(max, v));
    }

    function showToast(message, sticky = false) {
      toast.textContent = message;
      toast.style.display = 'block';
      clearTimeout(toastTimer);
      if (!sticky) {
        toastTimer = window.setTimeout(() => {
          toast.style.display = 'none';
        }, 1800);
      }
    }

    function hideToast() {
      clearTimeout(toastTimer);
      toast.style.display = 'none';
    }

    function setMode(modeKey) {
      STATE.mode = modeKey;
      const mode = MODES[modeKey];
      modeBadge.textContent = mode.label;
      document.documentElement.style.setProperty('--preview-filter', mode.previewFilter);
      viewer.classList.toggle('fisheye-preview', modeKey === 'fisheye');

      Array.from(modeRow.querySelectorAll('.mode-chip')).forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === modeKey);
      });
    }

    function buildModeButtons() {
      const fragment = document.createDocumentFragment();
      Object.entries(MODES).forEach(([key, value]) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'mode-chip';
        button.textContent = value.label;
        button.dataset.mode = key;
        button.addEventListener('click', () => {
          if (captured) return;
          setMode(key);
        });
        fragment.appendChild(button);
      });
      modeRow.appendChild(fragment);
      setMode(STATE.mode);
    }

    function fitSize(w, h, maxLongEdge) {
      const longEdge = Math.max(w, h);
      if (longEdge <= maxLongEdge) return { width: w, height: h };
      const scale = maxLongEdge / longEdge;
      return {
        width: Math.round(w * scale),
        height: Math.round(h * scale)
      };
    }

    function sceneStats(data) {
      let lum = 0;
      let sat = 0;
      let samples = 0;

      for (let i = 0; i < data.length; i += 32) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        lum += 0.2126 * r + 0.7152 * g + 0.0722 * b;
        sat += max === 0 ? 0 : (max - min) / max;
        samples++;
      }

      return {
        luminance: lum / samples,
        saturation: sat / samples
      };
    }

    function ranged(profile, key) {
      const [min, max] = profile.base[key];
      return rand(min, max);
    }

    function getProfile(modeKey, stats) {
      const mode = MODES[modeKey];
      const lowLight = stats.luminance < 96;
      const baseContrast = ranged(mode, 'contrast');
      const baseExposure = ranged(mode, 'exposure');
      const baseSat = ranged(mode, 'saturation');

      return {
        lowLight,
        contrast: lowLight ? baseContrast + 0.03 : baseContrast,
        exposure: lowLight ? baseExposure + 0.08 : baseExposure,
        saturation: lowLight ? baseSat + 0.05 : baseSat,
        warmthR: ranged(mode, 'warmthR'),
        warmthG: ranged(mode, 'warmthG'),
        warmthB: ranged(mode, 'warmthB'),
        blackLift: ranged(mode, 'blackLift'),
        highlightPush: ranged(mode, 'highlightPush'),
        noise: lowLight ? ranged(mode, 'noise') + 3 : ranged(mode, 'noise'),
        colorNoise: lowLight ? ranged(mode, 'colorNoise') + 1 : ranged(mode, 'colorNoise'),
        vignette: ranged(mode, 'vignette'),
        hotspot: lowLight ? ranged(mode, 'hotspot') + 0.04 : ranged(mode, 'hotspot'),
        chromaShift: ranged(mode, 'chromaShift'),
        jpegQuality: lowLight ? mode.jpegQualityNight : mode.jpegQualityDay,
        sharpen: ranged(mode, 'sharpen'),
        flashBloom: ranged(mode, 'flashBloom'),
        coolBoost: ranged(mode, 'coolBoost'),
        magentaBoost: ranged(mode, 'magentaBoost'),
        barrel: mode.base.barrel,
        outputQuality: mode.outputQuality,
        modeLabel: mode.label
      };
    }

    function drawSourceFrame(canvas, width, height) {
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(video, 0, 0, width, height);
      return ctx;
    }

    function applyBarrelWarp(sourceCanvas, amount) {
      if (!amount) return sourceCanvas;

      const width = sourceCanvas.width;
      const height = sourceCanvas.height;
      const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
      const srcFrame = srcCtx.getImageData(0, 0, width, height);
      const src = srcFrame.data;

      const warpedCanvas = document.createElement('canvas');
      warpedCanvas.width = width;
      warpedCanvas.height = height;
      const dstCtx = warpedCanvas.getContext('2d', { willReadFrequently: true });
      const dstFrame = dstCtx.createImageData(width, height);
      const dst = dstFrame.data;

      const cx = width / 2;
      const cy = height / 2;
      const maxRadius = Math.sqrt(cx * cx + cy * cy);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = (x - cx) / maxRadius;
          const dy = (y - cy) / maxRadius;
          const r2 = dx * dx + dy * dy;
          const factor = 1 - amount * r2;
          const sx = Math.round(cx + (x - cx) * factor);
          const sy = Math.round(cy + (y - cy) * factor);
          const di = ((y * width) + x) * 4;

          if (sx < 0 || sy < 0 || sx >= width || sy >= height) {
            dst[di + 3] = 255;
            continue;
          }

          const si = ((sy * width) + sx) * 4;
          dst[di] = src[si];
          dst[di + 1] = src[si + 1];
          dst[di + 2] = src[si + 2];
          dst[di + 3] = 255;
        }
      }

      dstCtx.putImageData(dstFrame, 0, 0);
      return warpedCanvas;
    }

    function downsampleSoft(ctx, sourceCanvas, width, height) {
      const softCanvas = document.createElement('canvas');
      softCanvas.width = Math.max(1, Math.round(width * 0.74));
      softCanvas.height = Math.max(1, Math.round(height * 0.74));
      const softCtx = softCanvas.getContext('2d');
      softCtx.drawImage(sourceCanvas, 0, 0, softCanvas.width, softCanvas.height);
      ctx.drawImage(softCanvas, 0, 0, softCanvas.width, softCanvas.height, 0, 0, width, height);
    }

    function primaryColorPass(imageData, width, height, profile) {
      const data = imageData.data;
      const cx = width / 2;
      const cy = height / 2;
      const maxDist = Math.sqrt(cx * cx + cy * cy);

      for (let i = 0; i < data.length; i += 4) {
        const px = (i / 4) % width;
        const py = Math.floor((i / 4) / width);
        const dx = px - cx;
        const dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
        const radial = Math.min(1, dist);

        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];

        r = ((r - 128) * profile.contrast + 128) * profile.exposure;
        g = ((g - 128) * profile.contrast + 128) * profile.exposure;
        b = ((b - 128) * profile.contrast + 128) * profile.exposure;

        r = (r - 128) * profile.saturation + 128;
        g = (g - 128) * profile.saturation + 128;
        b = (b - 128) * profile.saturation + 128;

        r = r * profile.warmthR + profile.blackLift + profile.magentaBoost;
        g = g * profile.warmthG + profile.blackLift * 0.85;
        b = b * profile.warmthB + profile.blackLift + profile.coolBoost;

        const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        const hot = profile.hotspot * Math.pow(1 - radial, 2.4);
        const vig = 1 - profile.vignette * Math.pow(radial, 1.85);

        if (luma > 168) {
          const bump = (luma - 168) * profile.highlightPush;
          r += bump;
          g += bump;
          b += bump;
        }

        const monoNoise = rand(-profile.noise, profile.noise);
        const cNoiseR = rand(-profile.colorNoise, profile.colorNoise);
        const cNoiseG = rand(-profile.colorNoise, profile.colorNoise);
        const cNoiseB = rand(-profile.colorNoise, profile.colorNoise);

        r = (r + monoNoise + cNoiseR) * vig + hot * 255;
        g = (g + monoNoise + cNoiseG) * vig + hot * 248;
        b = (b + monoNoise + cNoiseB) * vig + hot * 244;

        data[i] = clamp(r);
        data[i + 1] = clamp(g);
        data[i + 2] = clamp(b);
      }

      return imageData;
    }

    function chromaticAberrationPass(imageData, width, height, profile) {
      const src = new Uint8ClampedArray(imageData.data);
      const data = imageData.data;
      const cx = width / 2;
      const cy = height / 2;
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      const index = (x, y) => ((y * width) + x) * 4;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
          if (dist < 0.22) continue;

          const shift = Math.max(0, Math.round(profile.chromaShift * dist));
          const rx = Math.max(0, Math.min(width - 1, x + Math.sign(dx) * shift));
          const bx = Math.max(0, Math.min(width - 1, x - Math.sign(dx) * shift));
          const ry = Math.max(0, Math.min(height - 1, y + Math.sign(dy) * shift));
          const by = Math.max(0, Math.min(height - 1, y - Math.sign(dy) * shift));

          const i = index(x, y);
          const ir = index(rx, ry);
          const ib = index(bx, by);

          data[i] = src[ir];
          data[i + 2] = src[ib + 2];
        }
      }

      return imageData;
    }

    function flashBloomPass(ctx, width, height, amount) {
      if (amount <= 0.01) return;

      const bloomCanvas = document.createElement('canvas');
      bloomCanvas.width = Math.max(1, Math.round(width * 0.28));
      bloomCanvas.height = Math.max(1, Math.round(height * 0.28));
      const bctx = bloomCanvas.getContext('2d');
      bctx.filter = `blur(${Math.max(8, Math.round(width * 0.014))}px) brightness(${1 + amount * 1.8})`;
      bctx.drawImage(ctx.canvas, 0, 0, bloomCanvas.width, bloomCanvas.height);

      ctx.save();
      ctx.globalAlpha = 0.22 + amount * 0.35;
      ctx.filter = `blur(${Math.max(8, Math.round(width * 0.006))}px)`;
      ctx.drawImage(bloomCanvas, 0, 0, bloomCanvas.width, bloomCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function sharpenPass(ctx, width, height, amount) {
      const base = ctx.getImageData(0, 0, width, height);
      const blurredCanvas = document.createElement('canvas');
      blurredCanvas.width = Math.max(1, Math.round(width * 0.85));
      blurredCanvas.height = Math.max(1, Math.round(height * 0.85));
      const bctx = blurredCanvas.getContext('2d');
      bctx.drawImage(ctx.canvas, 0, 0, blurredCanvas.width, blurredCanvas.height);

      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = width;
      tmpCanvas.height = height;
      const tctx = tmpCanvas.getContext('2d');
      tctx.drawImage(blurredCanvas, 0, 0, blurredCanvas.width, blurredCanvas.height, 0, 0, width, height);

      const blur = tctx.getImageData(0, 0, width, height);
      const bd = base.data;
      const sd = blur.data;

      for (let i = 0; i < bd.length; i += 4) {
        bd[i] = clamp(bd[i] + (bd[i] - sd[i]) * amount);
        bd[i + 1] = clamp(bd[i + 1] + (bd[i + 1] - sd[i + 1]) * amount);
        bd[i + 2] = clamp(bd[i + 2] + (bd[i + 2] - sd[i + 2]) * amount);
      }

      ctx.putImageData(base, 0, 0);
    }

    async function jpegCrunch(canvas, quality) {
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
      if (!blob) return;
      const img = await createImageBitmap(blob);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.close();
    }

    function drawVignette(ctx, width, height, strength) {
      const gradient = ctx.createRadialGradient(width / 2, height / 2, Math.min(width, height) * 0.18, width / 2, height / 2, Math.max(width, height) * 0.72);
      gradient.addColorStop(0, 'rgba(0,0,0,0)');
      gradient.addColorStop(0.65, `rgba(0,0,0,${strength * 0.12})`);
      gradient.addColorStop(1, `rgba(0,0,0,${strength * 0.46})`);
      ctx.save();
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    async function processFrame() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;

      captureBtn.disabled = true;
      showToast('Processing…', true);

      const mode = MODES[STATE.mode];
      const fitted = fitSize(vw, vh, mode.maxLongEdge);
      let sourceCanvas = document.createElement('canvas');
      let sourceCtx = drawSourceFrame(sourceCanvas, fitted.width, fitted.height);

      if (STATE.mode === 'fisheye') {
        sourceCanvas = applyBarrelWarp(sourceCanvas, mode.base.barrel);
        sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
      }

      const scan = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
      const stats = sceneStats(scan.data);
      const profile = getProfile(STATE.mode, stats);

      output.width = sourceCanvas.width;
      output.height = sourceCanvas.height;
      const octx = output.getContext('2d', { willReadFrequently: true });

      octx.clearRect(0, 0, output.width, output.height);
      downsampleSoft(octx, sourceCanvas, output.width, output.height);

      let frame = octx.getImageData(0, 0, output.width, output.height);
      frame = primaryColorPass(frame, output.width, output.height, profile);
      frame = chromaticAberrationPass(frame, output.width, output.height, profile);
      octx.putImageData(frame, 0, 0);

      flashBloomPass(octx, output.width, output.height, profile.flashBloom);
      sharpenPass(octx, output.width, output.height, profile.sharpen);
      drawVignette(octx, output.width, output.height, profile.vignette);
      await jpegCrunch(output, profile.jpegQuality);

      video.style.display = 'none';
      output.style.display = 'block';
      captured = true;
      captureBtn.classList.add('hidden');
      captureActions.classList.add('show');
      hideToast();
      showToast('Tap save to download');
      modeBadge.textContent = profile.modeLabel;
      captureBtn.disabled = false;
    }

    function retake() {
      output.style.display = 'none';
      video.style.display = 'block';
      captured = false;
      captureActions.classList.remove('show');
      captureBtn.classList.remove('hidden');
      hideToast();
      setMode(STATE.mode);
    }

    async function saveCurrentImage() {
      const quality = MODES[STATE.mode].outputQuality;
      const blob = await new Promise(resolve => output.toBlob(resolve, 'image/jpeg', quality));
      if (!blob) return;

      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = lastBlobUrl;
      a.download = `${STATE.mode}_${Date.now()}.jpg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      showToast('Saved');
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('Camera not available in this browser', true);
        return;
      }

      const preferred = {
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1440 }
        }
      };

      const fallback = {
        audio: false,
        video: true
      };

      try {
        stream = await navigator.mediaDevices.getUserMedia(preferred);
      } catch (err) {
        try {
          stream = await navigator.mediaDevices.getUserMedia(fallback);
        } catch (err2) {
          console.error(err2);
          showToast('Camera permission denied or no camera found', true);
          return;
        }
      }

      video.srcObject = stream;

      try {
        await video.play();
      } catch (err) {
        console.error(err);
        showToast('Could not start camera preview', true);
        return;
      }

      captureBtn.disabled = false;
      hideToast();
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await appRoot.requestFullscreen();
        }
      } catch (err) {
        console.error(err);
        showToast('Fullscreen blocked by this browser');
      }
    }

    captureBtn.addEventListener('click', async () => {
      if (captured) return;
      await processFrame();
    });

    retakeBtn.addEventListener('click', retake);
    saveBtn.addEventListener('click', saveCurrentImage);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.style.opacity = document.fullscreenElement ? '0.92' : '1';
    });

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(track => track.stop());
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
    });

    buildModeButtons();
    startCamera();
  </script>
</body>
</html>
